<title>English Master — B1 to C1</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* High-contrast dark palette — clearly distinct levels */
  --bg:#080c14;--s1:#0f1623;--s2:#162032;--s3:#1c2b44;--s4:#233557;
  --ln:#1a2d47;--ln2:#2a4266;
  /* Crisper text */
  --t1:#f1f5fb;--t2:#94a3b8;--t3:#4b6080;
  /* Accent colors — slightly more vibrant */
  --bl:#4f8ef7;--vi:#7c5cf5;--gr:#22d67c;--tl:#18d4d4;
  --am:#f6bc18;--or:#f27030;--ro:#f03870;--pk:#d030f0;
  --f:"Inter",system-ui,sans-serif;--fp:"Playfair Display",Georgia,serif;
  --r:12px;--r2:16px;
  /* New design tokens */
  --shadow-sm:0 1px 3px rgba(0,0,0,.4);
  --shadow-md:0 4px 16px rgba(0,0,0,.5);
  --shadow-lg:0 8px 32px rgba(0,0,0,.6);
  --shadow-glow-bl:0 4px 20px rgba(79,142,247,.2);
  --shadow-glow-gr:0 4px 20px rgba(34,214,124,.2);
}
/* ══ LIGHT MODE ══ */
.light-mode{
  --bg:#f0f4f8;--s1:#ffffff;--s2:#f1f5f9;--s3:#e2e8f0;--s4:#cbd5e1;
  --ln:#cbd5e1;--ln2:#94a3b8;
  --t1:#0f172a;--t2:#475569;--t3:#94a3b8;
}
.light-mode .brand-logo{box-shadow:0 4px 12px rgba(79,142,247,.3)}
.light-mode .card{background:#fff;border-color:#e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.light-mode .card2{background:#f8fafc;border-color:#e2e8f0}
.light-mode .qopt{background:#f8fafc;border-color:#e2e8f0}
.light-mode #nav{background:rgba(255,255,255,.95);border-color:#e2e8f0}
.light-mode .tab:hover{background:#f1f5f9}
.light-mode .btn.bgh{background:#f1f5f9;border-color:#e2e8f0;color:#475569}
.light-mode .btn.bgh:hover{background:#e2e8f0}
.light-mode .hcard{background:#fff;border-color:#e2e8f0}
.light-mode .hs{background:#fff;border-color:#e2e8f0}
.light-mode .vsb,.light-mode .tsb{background:#fff;border-color:#e2e8f0}
.light-mode .vmb{color:#475569}
.light-mode .vmb.on{background:#f0f7ff;border-color:#4f8ef7}
.light-mode .trt{background:#f8fafc;border-color:#e2e8f0}
.light-mode .trt:hover{background:#f1f5f9}
.light-mode input,.light-mode textarea,.light-mode select{background:#f8fafc;border-color:#e2e8f0;color:#0f172a}
.light-mode .scard{background:#fff;border-color:#e2e8f0}
.light-mode .rcard{background:#fff;border-color:#e2e8f0}
.light-mode .gch{background:#fff;border-color:#e2e8f0}

html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--f);overflow:hidden;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:var(--f);border:none;background:none;color:inherit;transition:all .18s ease}
button:active{transform:scale(.96)}
input,textarea,select{font-family:var(--f);outline:none;color:var(--t1);transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--bl)!important}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--ln2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--t3)}

#app{display:flex;flex-direction:column;height:100vh}
#nav{display:flex;align-items:center;background:var(--s1);border-bottom:1px solid var(--ln);height:54px;padding:0 16px;flex-shrink:0;gap:4px;z-index:100;backdrop-filter:blur(10px)}
.brand{display:flex;align-items:center;gap:10px;margin-right:10px;flex-shrink:0}
.brand-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--bl),var(--vi));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:var(--shadow-glow-bl)}
.brand-name{font-family:var(--fp);font-size:15px;color:var(--t1);font-weight:600}
.brand-sub{font-size:9px;color:var(--t3);letter-spacing:2px;display:block;margin-top:-2px}
.tabs{display:flex;overflow-x:auto;flex:1}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:5px 13px;border-bottom:2px solid transparent;font-size:11px;font-weight:500;color:var(--t3);white-space:nowrap;transition:all .18s;border-radius:4px 4px 0 0}
.tab:hover{color:var(--t2);background:var(--s2)}
.tab.on{color:var(--bl);border-bottom-color:var(--bl);background:rgba(79,142,247,.06)}
.nav-r{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}
.lv-b{background:linear-gradient(135deg,var(--am),var(--or));border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;color:#1a0d00}
.xpw{width:68px}
.xpt{font-size:9px;color:var(--t3);margin-bottom:2px}
.xpb{height:4px;background:var(--s3);border-radius:2px}
.xpf{height:100%;background:linear-gradient(90deg,var(--am),var(--or));border-radius:2px;transition:width .4s}
#pwab{display:none;padding:4px 11px;background:var(--bl);border-radius:6px;color:#fff;font-size:10px;font-weight:600}

#cnt{flex:1;overflow:hidden}
.pnl{display:none;height:100%;overflow-y:auto}
.fpnl{display:none;height:100%}

.card{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:18px;box-shadow:var(--shadow-sm)}
.card2{background:var(--s2);border:1px solid var(--ln);border-radius:var(--r);padding:14px}
.c-ok{background:rgba(34,214,124,.06);border-color:rgba(34,214,124,.2)}
.c-warn{background:rgba(246,188,24,.06);border-color:rgba(246,188,24,.2)}
.c-info{background:rgba(79,142,247,.06);border-color:rgba(79,142,247,.2)}
.c-err{background:rgba(240,56,112,.06);border-color:rgba(240,56,112,.2)}

.btn{padding:9px 20px;border-radius:10px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:all .18s ease;letter-spacing:.01em}
.btn:hover{filter:brightness(1.12);transform:translateY(-1px)}
.btn:active{transform:scale(.96) translateY(0);filter:brightness(.95)}
.bp{background:linear-gradient(135deg,var(--bl),var(--vi));color:#fff;box-shadow:var(--shadow-glow-bl)}
.bp:hover{box-shadow:0 6px 24px rgba(79,142,247,.35)}
.bg{background:linear-gradient(135deg,var(--gr),var(--tl));color:#030f08;box-shadow:var(--shadow-glow-gr)}
.bgh{border:1px solid var(--ln2);color:var(--t2);background:var(--s2)}
.bgh:hover{background:var(--s3);border-color:var(--t3);color:var(--t1)}
/* Success button */
.bgr{background:rgba(34,214,124,.12);border:1px solid rgba(34,214,124,.3);color:var(--gr)}
.bgr:hover{background:rgba(34,214,124,.2)}
/* Warning button */
.bam{background:rgba(246,188,24,.12);border:1px solid rgba(246,188,24,.3);color:var(--am)}
.bam:hover{background:rgba(246,188,24,.2)}
.br{border:1px solid rgba(240,56,112,.5);color:var(--ro);background:rgba(240,56,112,.06)}
.bsm{padding:5px 13px;font-size:11px;border-radius:8px}
.bxs{padding:3px 9px;font-size:10px;border-radius:6px}

.tag{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.02em}
.pb{background:var(--s3);border-radius:6px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .4s}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}

.fx{display:flex}.col{flex-direction:column}.ac{align-items:center}.jb{justify-content:space-between}.jc{justify-content:center}.fw{flex-wrap:wrap}
.g4u{gap:4px}.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}.g16{gap:16px}
.mb4{margin-bottom:4px}.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}
.mt4{margin-top:4px}.mt6{margin-top:6px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.tc{text-align:center}.tr{text-align:right}
.b{font-weight:600}.sb{font-weight:500}.it{font-style:italic}.mono{font-family:monospace}.fp{font-family:var(--fp)}
.f9{font-size:9px}
/* Typography scale helpers */
.txt-xs{font-size:11px;line-height:1.5}
.txt-sm{font-size:12px;line-height:1.6}
.txt-base{font-size:14px;line-height:1.6}
.txt-lg{font-size:16px;line-height:1.5;font-weight:600}
.txt-xl{font-size:20px;line-height:1.3;font-weight:700}
.txt-2xl{font-size:24px;line-height:1.2;font-weight:700}
/* Semantic text */
.label{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--t3)}
.caption{font-size:11px;color:var(--t3);line-height:1.5}
.body{font-size:13px;color:var(--t2);line-height:1.7}
.body-sm{font-size:12px;color:var(--t2);line-height:1.7}.f10{font-size:10px}.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}.f14{font-size:14px}.f16{font-size:16px}.f18{font-size:18px}.f20{font-size:20px}.f22{font-size:22px}.f24{font-size:24px}.f28{font-size:28px}.f32{font-size:32px}
.c1{color:var(--t1)}.c2{color:var(--t2)}.c3{color:var(--t3)}
.cbl{color:var(--bl)}.cvi{color:var(--vi)}.cgr{color:var(--gr)}.ctl{color:var(--tl)}.cam{color:var(--am)}.cor{color:var(--or)}.cro{color:var(--ro)}.cpk{color:var(--pk)}
.w100{width:100%}.mxa{margin-left:auto}
.sl{font-size:9px;font-weight:700;letter-spacing:3.5px;color:var(--t3);text-transform:uppercase;opacity:.8}
.more-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 6px;background:var(--s2);border-radius:10px;color:var(--t2);font-size:10px;font-weight:500;border:1px solid var(--ln);cursor:pointer;transition:all .15s}
.more-item span:first-child{font-size:20px}
.more-item:hover{background:var(--s3);color:var(--t1);border-color:var(--ln2)}
.sec{padding:24px;max-width:880px;margin:0 auto}
/* Consistent section header */
.sec-hd{margin-bottom:20px}
.sec-hd .label{margin-bottom:6px}
.sec-hd h2{font-size:20px;font-weight:700;color:var(--t1);margin:0}
.sec-hd p{font-size:13px;color:var(--t3);margin-top:4px;line-height:1.6}
/* Content divider */
.divider{height:1px;background:var(--ln);margin:16px 0}
/* Empty state */
.empty-state{text-align:center;padding:48px 24px;color:var(--t3)}
.empty-state .empty-ico{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:13px;line-height:1.6}
.quick-btn{transition:all .15s ease!important}
.quick-btn:hover{border-color:var(--ln2)!important;color:var(--t1)!important;background:var(--s3)!important;transform:translateY(-1px)}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--s1);border:1px solid var(--ln2);border-radius:12px;padding:11px 22px;font-size:13px;font-weight:500;z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.05)}
#toast.on{transform:translateX(-50%) translateY(0)}
#achpop{position:fixed;top:62px;right:16px;background:var(--s1);border:1px solid var(--am);border-radius:12px;padding:12px 16px;z-index:9998;transform:translateX(240px);transition:transform .4s;box-shadow:0 6px 24px rgba(245,183,34,.15);max-width:260px}
#achpop.on{transform:translateX(0)}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.85)}60%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fu{animation:fadeUp .25s ease}
.pop{animation:popIn .3s ease}
.pulse{animation:pulse 2s infinite}

/* HOME */
.hgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.hcard{border-radius:var(--r2);padding:20px;cursor:pointer;transition:all .22s ease;border:1px solid var(--ln);background:var(--s1)}
.hcard:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--ln2)}
.hcard-ico{font-size:28px;margin-bottom:10px}
.hstats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
.hs{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:14px 8px;text-align:center;transition:all .15s}
.hs:hover{border-color:var(--ln2);background:var(--s2)}
.hs-v{font-family:var(--fp);font-size:22px;font-weight:600;margin-bottom:2px}
.hs-l{font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase}
.today-box{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r2);padding:16px}
.td-t{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:6px;transition:all .13s}
.td-t.done{background:#051a0a;border-color:#22c77a2a}
.tck{width:20px;height:20px;border-radius:50%;border:2px solid var(--t3);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .15s}
.td-t.done .tck{background:var(--gr);border-color:var(--gr);color:#051a0a}

/* VOCAB */
.vsb{width:192px;background:var(--s1);border-right:1px solid var(--ln);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.vsb-h{padding:14px 14px 10px;border-bottom:1px solid var(--ln)}
.vmb{display:flex;align-items:center;gap:8px;width:100%;padding:8px 14px;border-left:3px solid transparent;font-size:12px;color:var(--t3);text-align:left;transition:all .13s}
.vmb.on{background:var(--s2);border-left-color:var(--bl);color:var(--t1)}
.vmb:hover{background:var(--s2)}
.vm{flex:1;overflow-y:auto;padding:18px}
.wc{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:14px;margin-bottom:8px;transition:border-color .15s}
.wc:hover{border-color:var(--ln2)}
.qcard{width:100%;max-width:580px;background:var(--s1);border:1px solid var(--ln);border-radius:var(--r2);padding:28px;box-shadow:var(--shadow-md);animation:fadeUp .2s ease}
/* Quiz progress bar — more prominent */
.quiz-progress{height:4px;background:var(--s3);border-radius:4px;overflow:hidden;margin-bottom:20px}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--bl),var(--gr));border-radius:4px;transition:width .4s ease}
/* Quiz counter badge */
.quiz-counter{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:var(--s2);border:1px solid var(--ln);border-radius:20px;font-size:11px;color:var(--t3);margin-bottom:16px}
/* Correct/Wrong answer feedback */
.qopt-correct{border-color:var(--gr)!important;background:rgba(34,214,124,.08)!important;color:var(--gr)!important}
.qopt-wrong{border-color:var(--ro)!important;background:rgba(240,56,112,.08)!important;color:var(--ro)!important}
.qopt{width:100%;padding:12px 16px;border-radius:10px;text-align:left;font-size:13px;margin-bottom:8px;cursor:pointer;transition:all .15s;border:1px solid var(--ln);background:var(--s2);line-height:1.5}
.qopt:hover{border-color:var(--bl);background:rgba(79,142,247,.06);transform:translateX(3px)}

/* TENSES */
.tsb{width:185px;background:var(--s1);border-right:1px solid var(--ln);overflow-y:auto;flex-shrink:0;padding:8px 0;transition:width .2s ease}
.tsb.collapsed,.vsb.collapsed{width:0!important;overflow:hidden!important;border-right:none!important;padding:0!important;min-width:0!important}
.sb-toggle{position:absolute;top:10px;right:-14px;width:26px;height:26px;border-radius:50%;background:var(--s1);border:1px solid var(--ln);color:var(--t3);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.sb-toggle:hover{background:var(--s2);color:var(--t1)}
.sb-open-btn{padding:8px 6px;background:var(--s2);border:none;border-right:1px solid var(--ln);color:var(--t3);font-size:10px;cursor:pointer;writing-mode:vertical-lr;letter-spacing:1px;flex-shrink:0;display:none}
.sb-open-btn:hover{background:var(--s3);color:var(--t1)}
.tsb-h{padding:12px 14px 10px;border-bottom:1px solid var(--ln);margin-bottom:6px}
.tnb{display:block;width:100%;text-align:left;padding:7px 12px;border-left:3px solid transparent;font-size:11px;color:var(--t3);transition:all .12s}
.tnb.on{background:var(--s2)}
.tnb:hover{background:var(--s2)}
.tmain{flex:1;overflow-y:auto;padding:20px 24px}
.ttab{padding:6px 14px;border-bottom:2px solid transparent;font-size:11px;font-weight:500;color:var(--t3);cursor:pointer;transition:all .12s}
.ttab.on{border-bottom-color:var(--tc,var(--bl));color:var(--tc,var(--bl))}
.tqo{width:100%;padding:8px 12px;border-radius:6px;text-align:left;font-size:12px;font-family:monospace;margin-bottom:6px;cursor:pointer;transition:all .12s;border:1px solid var(--ln)}

/* GRAMMAR */
.gch{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:18px;cursor:pointer;transition:all .18s ease;margin-bottom:10px;position:relative;overflow:hidden}
.gch::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--vi);opacity:0;transition:opacity .15s}
.gch:hover{border-color:var(--ln2);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.gch:hover::before{opacity:1}
.geo{width:100%;padding:9px 12px;border-radius:7px;text-align:left;font-size:13px;margin-bottom:7px;cursor:pointer;transition:all .12s;border:1px solid var(--ln)}

/* WRITING */
.wtpl{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:18px;cursor:pointer;margin-bottom:10px;transition:all .18s ease;position:relative;overflow:hidden}
.wtpl::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--or);opacity:0;transition:opacity .15s}
.wtpl:hover{border-color:var(--ln2);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.wtpl:hover::before{opacity:1}

/* READING */
.rcard{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:18px;cursor:pointer;margin-bottom:10px;transition:all .18s ease;position:relative;overflow:hidden}
.rcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--tl);opacity:0;transition:opacity .15s}
.rcard:hover{border-color:var(--ln2);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.rcard:hover::before{opacity:1}
.rbody{font-size:14px;line-height:1.9;color:var(--t2)}
.rbody p{margin-bottom:14px}
.rbody strong{color:var(--t1)}
.rbody em{color:var(--tl);font-style:normal;cursor:pointer;border-bottom:1px dashed rgba(32,200,200,.4)}
.rqo{width:100%;padding:10px 14px;border-radius:7px;text-align:left;font-size:13px;margin-bottom:7px;cursor:pointer;transition:all .12s;border:1px solid var(--ln)}

/* SPEAKING */
.scard{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:18px;cursor:pointer;margin-bottom:10px;transition:all .18s ease;box-shadow:var(--shadow-sm)}
.scard:hover{border-color:var(--ln2);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.phrase-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--s2);border:1px solid var(--ln);border-radius:8px;margin-bottom:7px;cursor:pointer;transition:all .13s}
.phrase-item:hover{border-color:var(--ln2)}

/* TRACKER */
.trnav{display:flex;background:var(--s1);border-bottom:1px solid var(--ln);flex-shrink:0;overflow-x:auto}
.trnav::-webkit-scrollbar{display:none}
.trnbt{padding:8px 14px;border-bottom:2px solid transparent;font-size:11px;font-weight:500;color:var(--t3);white-space:nowrap;cursor:pointer;transition:all .15s}
.trnbt.on{border-bottom-color:var(--bl);color:var(--bl)}
.trcnt{flex:1;overflow-y:auto;padding:18px 20px;max-width:760px}
.trt{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;cursor:pointer;border:1px solid var(--ln);margin-bottom:8px;transition:all .18s ease;background:var(--s2)}
.trt:hover{border-color:var(--ln2);background:var(--s3)}
.trt.done{background:rgba(34,214,124,.05);border-color:rgba(34,214,124,.25)}
.trck{width:22px;height:22px;border-radius:50%;border:2px solid var(--t3);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .15s}
.trt.done .trck{background:var(--gr);border-color:var(--gr);color:#051a0a}
.hm{display:flex;flex-wrap:wrap;gap:3px}
.hmc{width:12px;height:12px;border-radius:2px}
.wlr{display:flex;gap:10px;padding:9px 12px;background:var(--s2);border:1px solid var(--ln);border-radius:8px;margin-bottom:6px;align-items:flex-start}

/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.ss{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:14px;text-align:center}
.ss-v{font-family:var(--fp);font-size:22px;font-weight:600;margin-bottom:3px}
.ss-l{font-size:9px;color:var(--t3);letter-spacing:1px}
.cbox{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:16px;margin-bottom:14px}

/* SETTINGS */
.setrow{display:flex;align-items:center;justify-content:space-between;padding:14px;background:var(--s1);border:1px solid var(--ln);border-radius:8px;margin-bottom:8px}
.tgl{width:44px;height:24px;background:var(--ln2);border-radius:12px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--gr)}
.tgl::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s}
.tgl.on::after{transform:translateX(20px)}

body.light{--bg:#f0f2f8;--s1:#fff;--s2:#f4f6fc;--s3:#e8eaf5;--s4:#dde0f0;--ln:#dde0f0;--ln2:#c5c8e8;--t1:#1a1b2e;--t2:#4a4b6a;--t3:#8a8baa}

body.light .c-warn{background:#fffbf0;border-color:#e8d5a0}

/* ═══ LESSONS ═══ */
.lesson-card{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r2);padding:20px;margin-bottom:12px}
.lesson-step{display:flex;align-items:flex-start;gap:12px;padding:14px;background:var(--s2);border:1px solid var(--ln);border-radius:var(--r);margin-bottom:10px;transition:all .2s ease;box-shadow:var(--shadow-sm)}
.lesson-step.active{border-color:var(--bl);background:rgba(79,142,247,.06);box-shadow:0 0 0 1px rgba(79,142,247,.2),var(--shadow-sm)}

.lesson-step.active .step-num{background:var(--bl);color:#fff}
.lesson-step.done .step-num{background:var(--gr);color:#051a0a}
.xp-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;background:var(--am)1a;border:1px solid var(--am)33;color:var(--am);font-size:10px;font-weight:700}

/* ═══ BUILDER ═══ */
.builder-word{display:inline-flex;align-items:center;padding:8px 14px;background:var(--s2);border:1px solid var(--ln2);border-radius:8px;font-size:14px;cursor:pointer;margin:4px;transition:all .15s;user-select:none}
.builder-word:hover{background:var(--s3);border-color:var(--bl)}
.builder-word.used{opacity:.3;cursor:not-allowed}
.builder-word.selected{background:var(--bl)1a;border-color:var(--bl);color:var(--bl)}
.drop-zone{min-height:52px;background:var(--s2);border:2px dashed var(--ln2);border-radius:var(--r);padding:8px;display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-bottom:12px;transition:all .15s}
.drop-zone.has-words{border-color:var(--bl)44;background:var(--s3)}
.placed-word{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:var(--bl)1a;border:1px solid var(--bl)44;border-radius:7px;font-size:13px;cursor:pointer;color:var(--bl)}

'use strict';

/* ══ STORAGE ══ */
const DB={
  get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};

/* ══ SPEECH API ══ */
function speak(text,lang='en-GB'){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang;u.rate=0.85;u.pitch=1;
  // Try to find a good English voice

  if(en)u.voice=en;
  window.speechSynthesis.speak(u);
}

function getAPIKey(){
  const stored=DB.get('anthropic_key','');
  if(stored)return stored;
  // Default key (replace with your own in Settings)
  return '';
}

function hasAPIKey(){
  return !!getAPIKey();
}

async function callAI(systemPrompt, userContent, maxTokens=800){
  const key = getAPIKey();
  if(!key){
    showAPIKeyModal();
    throw new Error('NO_API_KEY');
  }
  const response = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens: maxTokens,
      system: systemPrompt,
      messages:[{role:'user',content: userContent}]
    })
  });

  if(!response.ok){
    const err = await response.json().catch(()=>({error:{message:'Unknown error'}}));
    if(response.status===401){
      DB.set('anthropic_key','');
      showAPIKeyModal('invalid');
      throw new Error('INVALID_KEY');
    }
    throw new Error(err.error?.message||'API error '+response.status);
  }

  const data = await response.json();
  return data.content?.[0]?.text||'';
}

const LVLS=[
  {n:'Beginner',x:0},{n:'Elementary',x:150},{n:'Pre-Intermediate',x:400},
  {n:'Intermediate',x:800},{n:'Upper-Intermediate',x:1400},{n:'Advanced',x:2200},
  {n:'Proficient',x:3200},{n:'Expert',x:4500},{n:'Master',x:6000},{n:'Legend',x:8000}
];
function getXP(){return DB.get('xp',0)}
function addXP(n){
  const old=getXP(),nw=old+n;DB.set('xp',nw);
  if(getLv(nw)>getLv(old))showAch('🎉 Level Up! '+LVLS[getLv(nw)].n);
  updXP();
  // Floating XP indicator for big gains
  if(n>=8){
    const fl=document.createElement('div');
    fl.className='xp-float';
    fl.textContent='+'+n+' XP ⭐';
    fl.style.left=(window.innerWidth/2-36)+'px';
    fl.style.top=(window.innerHeight*0.55)+'px';
    document.body.appendChild(fl);
    setTimeout(()=>fl.remove(),900);
  }
}
function getLv(x){let l=0;for(let i=0;i<LVLS.length;i++)if(x>=LVLS[i].x)l=i;return l}
function updXP(){
  const x=getXP(),lv=getLv(x),ld=LVLS[lv];
  const nx=LVLS[lv+1]?LVLS[lv+1].x:ld.x+2000;
  const p=Math.min(((x-ld.x)/(nx-ld.x))*100,100);
  document.getElementById('xp-lv').textContent='Lv '+(lv+1);
  document.getElementById('xp-txt').textContent=x+' XP';
  document.getElementById('xp-f').style.width=p+'%'
}

/* ══ HELPERS ══ */
function todayK(){return new Date().toISOString().split('T')[0]}
function getLast90(){const d=[];for(let i=89;i>=0;i--){const x=new Date();x.setDate(x.getDate()-i);d.push(x.toISOString().split('T')[0])}return d}
function getLast7(){const d=[];for(let i=6;i>=0;i--){const x=new Date();x.setDate(x.getDate()-i);d.push(x.toISOString().split('T')[0])}return d}
function calcStreak(){
  const comp=DB.get('comp',{});let s=0;const d=new Date();
  if((comp[todayK()]||[]).length<3)d.setDate(d.getDate()-1);
  while(true){const k=d.toISOString().split('T')[0];if((comp[k]||[]).length<3)break;s++;d.setDate(d.getDate()-1)}
  return s
}

function getAllW(){
  const av=typeof AVIATION_VOCAB!=='undefined'&&DB.get('av_enabled',false)?AVIATION_VOCAB:[];
  return [...WORDS,...DB.get('customW',[]),...DB.get('custom_words',[]),...av];
}
function getWB(){return DB.get('wb',{})}
function getWS(id){return getWB()[id]||{sc:0,st:0,nr:0,seen:0}}
function setWS(id,correct){
  const wb=getWB(),old=wb[id]||{sc:0,st:0,nr:0,seen:0};
  // SM-2 intervals: wrong=10min, then 1/3/7/14/30 days
  const SM_MS=[600000,86400000,259200000,604800000,1209600000,2592000000];
  const ns=correct?Math.min(old.st+1,5):0;
  const sc=correct?Math.min(5,old.sc+1):Math.max(0,old.sc-1);
  // Wrong answers come back sooner based on error count
  const errors=DB.get('errors',{});
  const errCount=(errors[id]?.count||0);
  let nextMs=SM_MS[ns];
  if(!correct && errCount>=3) nextMs=300000; // 5 min if chronic error
  else if(!correct && errCount>=2) nextMs=600000; // 10 min
  wb[id]={sc,st:ns,nr:Date.now()+nextMs,seen:old.seen+1};
  DB.set('wb',wb);
  if(correct){ addXP(sc>=3?15:sc>=1?10:8); }
  else { addXP(2); trackError(id,'vocab'); }
}
function learnedW(){return getAllW().filter(w=>getWS(w.id).sc>=3)}
function dueW(){
  const n=Date.now();
  return getAllW().filter(w=>{
    const s=getWS(w.id);
    // Due if: seen before AND (nextReview passed OR score < 3 and not seen today)
    if(s.seen===0)return false;
    if(s.nr<=n)return true;
    return false;
  });
}
function sortedW(cat='all'){
  const pool=cat==='all'?getAllW():getAllW().filter(w=>w.cat===cat);
  const n=Date.now();
  return[...pool].sort((a,b)=>{
    const pa=getWS(a.id),pb=getWS(b.id);
    const ad=pa.nr<=n?0:1,bd=pb.nr<=n?0:1;
    if(ad!==bd)return ad-bd;if(pa.sc!==pb.sc)return pa.sc-pb.sc;return pa.seen-pb.seen
  })
}

function startQ(el,mode){
  const cat=VS.cat==='all'?'all':VS.cat;
  // Check for saved session
  const saved=DB.get('quiz_session',null);
  if(saved&&saved.mode===mode&&saved.cat===cat&&saved.sess&&saved.sess.length>0&&saved.idx<saved.sess.length){
    // Resume saved session - verify words still exist
    const allIds=new Set(getAllW().map(w=>w.id));
    if(saved.sess.every(w=>allIds.has(w.id))){
      VS.q=saved;rQCard(el);return;
    }
  }
  // Smart selection: 70% due/weak + 30% new unseen
  const allPool=sortedW(cat);
  const duePool=allPool.filter(w=>{const s=getWS(w.id);return s.seen>0&&s.nr<=Date.now();});
  const weakPool=allPool.filter(w=>{const s=getWS(w.id);return s.seen>0&&s.sc<3&&s.nr>Date.now();});
  const newPool=allPool.filter(w=>getWS(w.id).seen===0);
  // Build session: prioritize due → weak → new
  const sess=[...duePool.slice(0,4),...weakPool.slice(0,3),...newPool.slice(0,3)].slice(0,10);
  const finalSess=sess.length>=5?sess:allPool.slice(0,10);
  LIVES=MAX_LIVES;VS.q={mode,cat,sess:finalSess,idx:0,res:[],fl:false,opts:[],sel:-1,fill:'',fd:false};
  if(!VS.q.sess.length){el.innerHTML=`<div style="text-align:center;padding:40px"><div class="f16 c2">Ξεκίνα να μαθαίνεις λέξεις! <button class="btn bp bsm" onclick="VS.mode='add';rVocab()">Προσθήκη</button></div></div>`;return;}
  DB.set('quiz_session',{mode,cat,sess:VS.q.sess,idx:0,res:[],fl:false,opts:[],sel:-1,fill:'',fd:false});
  rQCard(el);
}

function effMode(i){const m=VS.q.mode;if(m!=='mx')return m;return['fc','mc','fi'][i%3]}

function genOpts(w){
  return[...getAllW().filter(x=>x.id!==w.id).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.g),w.g].sort(()=>Math.random()-.5)
}

function vMCQ(i){
  if(VS.q.sel>=0)return;
  VS.q.sel=i;
  const vm=document.getElementById('vm');vm&&rQCard(vm);
  const correct=VS.q.opts[i]===VS.q.sess[VS.q.idx].g;
  setTimeout(()=>vRec(correct),800)
}

function vRec(correct, userInput){
  const cw=VS.q.sess[VS.q.idx];
  // Typo detection: if wrong but very close (edit distance ≤2), treat as correct
  let isTypo=false;
  if(!correct&&userInput&&typeof levenshtein==='function'){
    const dist=levenshtein(userInput.trim().toLowerCase(),(cw.w||'').toLowerCase());
    if(dist<=2&&dist>0){isTypo=true;correct=true;toast('👀 Σχεδόν σωστό — typo ανιχνεύτηκε! "'+cw.w+'"','var(--am)');}
  }
  setWS(cw.id,correct);
  if(!correct){trackError(cw.id,VS.q.mode);if(loseHeart())return;}
  VS.q.res.push({word:cw,correct,typo:isTypo});
  const lc=learnedW().length;
  if(VS.q.res.length===1&&getWS(cw.id).seen===1)unlockAch('w1');
  if(lc>=10)unlockAch('w10');if(lc>=50)unlockAch('w50');if(lc>=100)unlockAch('w100');if(lc>=200)unlockAch('w200');
  // Update daily tracker word count
  const today=todayK();
  const wCount=DB.get('wcount_'+today,0)+1;
  DB.set('wcount_'+today,wCount);
  const nxt=VS.q.idx+1;
  if(nxt>=VS.q.sess.length){DB.delete?DB.delete('quiz_session'):localStorage.removeItem('quiz_session');showQRes(document.getElementById('vm'));return;}
  VS.q.idx=nxt;VS.q.fl=false;VS.q.opts=[];VS.q.sel=-1;VS.q.fill='';VS.q.fd=false;
  DB.set('quiz_session',{...VS.q});
  rQCard(document.getElementById('vm'))
}

function vNext(){
  const nxt=VS.q.idx+1;
  if(nxt>=VS.q.sess.length){DB.delete?DB.delete('quiz_session'):localStorage.removeItem('quiz_session');showQRes(document.getElementById('vm'));return;}
  VS.q.idx=nxt;VS.q.fl=false;VS.q.opts=[];VS.q.sel=-1;VS.q.fill='';VS.q.fd=false;
  DB.set('quiz_session',{...VS.q});
  rQCard(document.getElementById('vm'));
}

function startErrorPractice(){

function resetWordError(id){
  const errors=DB.get('errors',{});

}

function addCW(){
  const w=document.getElementById('aw')?.value.trim(),g=document.getElementById('ag')?.value.trim();
  if(!w||!g){toast('Συμπλήρωσε λέξη και μετάφραση','var(--ro)');return;}
  const cws=DB.get('customW',[]);
  cws.push({id:'c'+Date.now(),w,g,p:document.getElementById('ap')?.value||'word',cat:document.getElementById('ac')?.value||'custom',e:document.getElementById('ae')?.value||`${w} — νέα λέξη.`,d:2,f:[]});
  DB.set('customW',cws);
  // Initialize word state so it appears in review tomorrow
  const wb=getWB();
  wb[cws[cws.length-1].id]={sc:0,st:0,nr:Date.now()+86400000,seen:0};
  DB.set('wb',wb);
  toast('✓ Λέξη προστέθηκε! Θα εμφανιστεί στο Quiz αύριο.','var(--gr)');
  addXP(5);VS.mode='all';rVocab();
}
function delCW(id){
  if(!confirm('Διαγραφή;'))return;
  DB.set('customW',DB.get('customW',[]).filter(w=>w.id!==id));rVocab();
}

let TST={idx:0,tab:'theory',qa:{},qs:false,qsc:null,ta:{},tc:{},tips:false,cmp:0};
function rTenses(){
  const el=document.getElementById('tenses');
  const isOpen=DB.get('tsb_open',true);
  el.innerHTML=`
    ${!isOpen?`<button onclick="DB.set('tsb_open',true);rTenses()" style="width:36px;flex-shrink:0;background:var(--s2);border:none;border-right:1px solid var(--ln);color:var(--t2);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;writing-mode:vertical-lr;letter-spacing:1px;padding:10px 4px">Μενού</button>`:''}
    <div class="tsb ${isOpen?'':'tsb-hidden'}" id="tsb"></div>
    <div class="tmain fu" id="tmn"></div>
  `;
  if(isOpen) buildTSB();
  rTM();
}
function buildTSB(){
  const sb=document.getElementById('tsb');
  if(!sb)return;
  sb.innerHTML=
    `<div class="tsb-h">
      <div class="fx ac jb mb4">
        <div class="sl">TENSES</div>
        <button onclick="DB.set('tsb_open',false);rTenses()" style="padding:1px 7px;background:none;border:1px solid var(--ln2);border-radius:10px;color:var(--t3);font-size:10px;cursor:pointer">✕</button>
      </div>
      <div class="fp f13 b" style="color:#f0eef8">Επίλεξε χρόνο:</div>
    </div>`+
    TENSES.map((t,i)=>`<button class="tnb ${TST.idx===i&&TST.tab!=='cmp'?'on':''}" onclick="TST.idx=${i};TST.tab='theory';resetTQ();rTM()" style="border-left-color:${TST.idx===i&&TST.tab!=='cmp'?t.col:'transparent'}">
      <div class="f10 b" style="color:${TST.idx===i&&TST.tab!=='cmp'?t.col:'var(--t3)'}">${t.name}</div>
      <div class="f9 c3 mono">${t.tag}</div>
    </button>`).join('')+
    `<button class="tnb ${TST.tab==='cmp'?'on':''}" onclick="TST.tab='cmp';rTM()" style="border-left-color:${TST.tab==='cmp'?'var(--am)':'transparent'};border-top:1px solid var(--ln);margin-top:6px;padding-top:10px">
      <div class="f10 b" style="color:${TST.tab==='cmp'?'var(--am)':'var(--t3)'}">⚖ Σύγκριση Χρόνων</div>
      <div class="f9 c3">Confusable pairs</div>
    </button>`;
}
function resetTQ(){TST.qa={};TST.qs=false;TST.qsc=null;TST.ta={};TST.tc={};TST.tips=false;}
function rTM(){
  const mn=document.getElementById('tmn');if(!mn)return;
  buildTSB();
  if(TST.tab==='cmp'){rTCmp(mn);return;}
  const t=TENSES[TST.idx];
  document.documentElement.style.setProperty('--tc',t.col);
  // Mobile collapse button for sidebar
  const mobileToggleBtn=`<button onclick="DB.set('tsb_open',!DB.get('tsb_open',true));rTenses()" 
    class="mobile-tsb-toggle"
    style="padding:4px 12px;background:var(--s2);border:1px solid var(--ln);border-radius:20px;color:var(--t3);font-size:10px;cursor:pointer;margin-bottom:8px">
    ${DB.get('tsb_open',true)?'▲ Κλείσε χρόνους':'▼ Επίλεξε χρόνο ('+TENSES[TST.idx].name+')'}
  </button>`;
  const tabs=['theory','forms','ex','tr','quiz'].map(id=>{
    const ls={theory:'Θεωρία',forms:'Τύποι',ex:'Παραδείγματα',tr:'Μετάφραση',quiz:`Quiz (${t.quiz.length})`};
    return `<button class="ttab ${TST.tab===id?'on':''}" onclick="TST.tab='${id}';resetTQ();rTM()">${ls[id]}</button>`;
  }).join('');
  let body='';
  if(TST.tab==='theory'){
    body=`
    <!-- USES -->

    ${t.uses.map((u,i)=>`<div style="margin-bottom:10px;padding-bottom:10px;${i<t.uses.length-1?'border-bottom:1px solid var(--ln)':''}">
      <div class="f12 b mb4" style="color:${t.col}">${i+1}. ${u.t}</div>
      <div class="f13 mb2" style="padding:8px 12px;background:var(--s3);border-left:3px solid ${t.col}44;border-radius:0 7px 7px 0">"${u.e}"</div>
      ${u.g?`<div class="f11 c3 it" style="padding-left:12px">🇬🇷 ${u.g}</div>`:''}
    </div>`).join('')}</div>

    <!-- SIGNAL WORDS -->
    <div class="card mb10"><div class="sl mb8" style="color:var(--vi)">🔑 SIGNAL WORDS — ΛΕΞΕΙΣ-ΚΛΕΙΔΙΑ</div>
    <div class="fx fw g6">${t.kw.map(k=>`<span class="tag" style="background:var(--vi)1a;border:1px solid var(--vi)33;color:var(--vi)">${k}</span>`).join('')}</div></div>

    <!-- TIPS -->
    ${t.tips&&t.tips.length?`<div class="card c-ok mb10">
      <div class="sl mb8 cgr">💡 TIPS & ΠΑΓΙΔΕΣ</div>
      ${t.tips.map(tp=>`<div class="f12 mb6" style="color:var(--t2);line-height:1.6;padding:5px 10px;border-left:2px solid var(--gr)33;border-radius:0 6px 6px 0">${tp}</div>`).join('')}
    </div>`:''}

    <!-- COMMON MISTAKES -->
    ${t.mistakes&&t.mistakes.length?`<div class="card mb10" style="border-color:var(--ro)22">
      <div class="sl mb10 cro">⚠ ΚΟΙΝΑ ΛΑΘΗ ΕΛΛΗΝΩΝ</div>
      ${t.mistakes.map(m=>`<div style="margin-bottom:10px;padding:10px;background:var(--s2);border-radius:8px">
        <div class="f12 mb4"><span style="color:var(--ro);text-decoration:line-through">✗ ${m.wrong}</span></div>
        <div class="f12 b mb4" style="color:var(--gr)">✓ ${m.right}</div>
        <div class="f11 c3">📌 ${m.why||m.way||''}</div>
      </div>`).join('')}
    </div>`:''}

    <!-- MORE EXAMPLES -->
    ${t.examples&&t.examples.length?`<div class="card" style="border-color:${t.col}22">
      <div class="sl mb10" style="color:${t.col}">📝 ΠΕΡΙΣΣΟΤΕΡΑ ΠΑΡΑΔΕΙΓΜΑΤΑ</div>
      ${t.examples.map((e,i)=>`<div class="f12 c2 mb6" style="padding:7px 12px;background:var(--s2);border-left:2px solid ${t.col}33;border-radius:0 7px 7px 0">
        <span class="f10 b" style="color:${t.col};margin-right:6px">${i+1}.</span>${e}
        <button onclick="speak('${e.replace(/'/g,"\'")}')" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:10px;margin-left:6px">🔊</button>
      </div>`).join('')}
    </div>`:''}
  `;
  } else if(TST.tab==='forms'){
    body=t.forms.map(([l,v])=>`<div class="card mb8 fu"><div class="f10 b mb8" style="color:${t.col}">${l}</div><div class="mono f12 c2" style="line-height:1.7;padding-left:10px;border-left:2px solid ${t.col}44">${v}</div></div>`).join('');
  } else if(TST.tab==='ex'){
    const exArr=t.examples||t.ex||[];
    body=exArr.map((e,i)=>`<div class="card mb8 fu">
      <div class="fx ac g10">
        <span class="fp f13 b" style="color:${t.col};min-width:20px">${i+1}</span>
        <div style="flex:1">
          <div class="f14 mb4" style="line-height:1.6">${typeof e==='string'?e:e.en}</div>
          ${typeof e==='object'&&e.gr?`<div class="f11 c3 it">🇬🇷 ${e.gr}</div>`:''}
        </div>
        <button onclick="speak('${typeof e==='string'?e.replace(/'/g,"\'"):(e.en||'').replace(/'/g,"\'")}')" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px">🔊</button>
      </div>
    </div>`).join('');
  } else if(TST.tab==='tr'){
    const trArr=t.tr||t.uses||[];
    if(!t.tr){body=`<div class="card c-info"><div class="f12 c2">Χρησιμοποίησε τα παραδείγματα από τη Θεωρία για μετάφραση!</div></div>`;} else
    body=`<div class="f12 c2 mb14">Μετέφρασε στα αγγλικά:</div>`+
    t.tr.map((tr,i)=>`<div class="card mb10 fu"><div class="f14 mb10 it" style="color:${t.col}">🇬🇷 ${tr.gr}</div>
    <textarea id="tt${i}" rows="2" oninput="TST.ta[${i}]=this.value" ${TST.tc[i]?'disabled':''} placeholder="Γράψε εδώ τη μετάφρασή σου..." style="width:100%;background:var(--s2);border:1px solid var(--ln);border-radius:7px;color:var(--t1);font-size:13px;padding:9px;font-family:var(--f);line-height:1.5;resize:none;margin-bottom:8px">${TST.ta[i]||''}</textarea>
    ${!TST.tc[i]?`<button id="tr_btn_${i}" onclick="TST.tc[${i}]=true;rTM()" style="padding:7px 16px;background:${t.col};border:none;border-radius:6px;color:#07080f;font-size:10px;font-weight:700;cursor:pointer">ΑΠΟΚΑΛΥΨΗ</button>`:
    `<div class="card c-ok"><div class="sl mb4">ΑΠΑΝΤΗΣΗ</div><div class="f13" style="color:var(--gr)">🇬🇧 ${tr.en}</div></div>`}
    </div>`).join('');
  } else {
    const qrows=t.quiz.map((q,qi)=>{
      const opts=q.opts.map(opt=>{
        let bg='var(--s2)',br='var(--ln)',col='var(--t2)';
        if(TST.qa[qi]===opt){bg='var(--s3)';br=t.col;col=t.col;}
        if(TST.qs){if(opt===q.a){bg='#051a0a';br='#22c77a44';col='var(--gr)';}else if(TST.qa[qi]===opt){bg='#1a0508';br='#f0387044';col='var(--ro)';}}
        return `<button class="tqo" onclick="if(!TST.qs){TST.qa[${qi}]='${opt.replace(/'/g,"\\'")}';rTM()}" style="background:${bg};border-color:${br};color:${col}">${opt}</button>`;
      }).join('');
      return `<div class="card mb10 fu"><div class="f13 mb10" style="line-height:1.6"><span class="fp b" style="color:${t.col};margin-right:7px">${qi+1}.</span>${q.q}</div><div class="g2 mb8">${opts}</div>${TST.qs?`<div class="f11"><span style="color:${TST.qa[qi]===q.a?'var(--gr)':'var(--ro)'}">${TST.qa[qi]===q.a?'✓ Σωστό! ':'✗ Σωστό: "'+q.a+'" — '}</span><span class="c3">${q.ex}</span></div>`:''}
        ${TST.qs&&TST.qa[qi]!==q.a?renderEMAButton(q.q,TST.qa[qi]||'',q.a,TENSES[TST.idx].name):''}</div>`;
    }).join('');
    const allA=Object.keys(TST.qa).length>=t.quiz.length;
    body=qrows+(!TST.qs
      ?`<button onclick="if(${allA}){let sc=0;TENSES[TST.idx].quiz.forEach((q,i)=>{if(TST.qa[i]===q.a)sc++});TST.qsc=sc;TST.qs=true;const td=DB.get('tDone',[]);if(!td.includes(TST.idx)){td.push(TST.idx);DB.set('tDone',td);}
  const tPct=Math.round(sc/TENSES[TST.idx].quiz.length*100);
  if(tPct===100){setTimeout(()=>showCelebration('🏆 '+TENSES[TST.idx].name+'!','Τέλειο σκορ! '+sc+'/'+TENSES[TST.idx].quiz.length+' απαντήσεις.',sc*5,'TST.idx=(TST.idx+1)%TENSES.length;TST.tab=\'theory\';resetTQ();rTM()','Επόμενος χρόνος'),400);}
  else if(tPct>=60){setTimeout(()=>showCelebration(TENSES[TST.idx].name+' — Καλά!',sc+'/'+TENSES[TST.idx].quiz.length+' σωστές. Καλή πρόοδος!',sc*5,null,null),400);}
  else{toast('Quiz: '+sc+'/'+TENSES[TST.idx].quiz.length+' — +'+sc*5+' XP','var(--bl)');}const tKey=['present_simple','present_continuous','simple_past','past_continuous','present_perfect','pp_continuous','past_perfect','future_will','future_going_to'][TST.idx]||'present_simple';if(sc>=Math.ceil(TENSES[TST.idx].quiz.length*0.6))setTimeout(()=>showForcedOutput(tKey,'tense'),1200);rTM()}" style="padding:10px 22px;background:${t.col};border:none;border-radius:7px;color:#07080f;font-weight:700;font-size:11px;cursor:pointer;opacity:${allA?1:0.4}">Ελέγξτε →</button>`
      :`<div class="fx ac g12"><div class="card" style="border:2px solid ${TST.qsc===t.quiz.length?'var(--am)':TST.qsc>=Math.ceil(t.quiz.length*.6)?'var(--gr)':'var(--bl)'}">
         <span class="f11 c3">Αποτέλεσμα: </span><span class="fp f20 b" style="color:${TST.qsc===t.quiz.length?'var(--am)':TST.qsc>=Math.ceil(t.quiz.length*.6)?'var(--gr)':'var(--bl)'}">${TST.qsc}/${t.quiz.length}</span>
         </div><button onclick="resetTQ();rTM()" style="padding:9px 16px;border:1px solid ${t.col};border-radius:7px;color:${t.col};background:transparent;cursor:pointer;font-size:10px;font-weight:700">ΕΠΑΝΑΛΗΨΗ</button></div>`);
  }
  mn.innerHTML=`<div style="max-width:720px;margin:0 auto">
    ${mobileToggleBtn}
    <div class="fx ac g10 mb16">
      <div style="width:6px;height:32px;background:${t.col};border-radius:3px;flex-shrink:0"></div>

  </div>`;
}

function rTCmp(mn){
  mn.innerHTML=`<div style="max-width:760px;margin:0 auto" class="fu">

if(pct>=80){setTimeout(()=>showCelebration('✓ '+t.t+' — Τέλεια! ✓!',gramMsg+' '+sc+'/'+t.exercises.length+' σωστές.',sc*8,'GST.topic=null;rGrammar()','Επόμενο κεφάλαιο'),400);}

          </div>

function rWTopic(){
  const el=document.getElementById('writing');
  const t=WRITING.find(x=>x.id===WST.topic);if(!t)return;
  const tabs=['structure','phrases','templates','practice'].map(id=>{
    const ls={structure:'Δομή',phrases:'Φράσεις',templates:'📧 Templates',practice:'Εξάσκηση'};
    return `<button class="ttab ${WST.tab===id?'on':''}" onclick="WST.tab='${id}';rWTopic()" style="--tc:${t.col}">${ls[id]}</button>`;
  }).join('');
  let body='';
  if(WST.tab==='structure'){
    body=t.structure.map((s,i)=>`<div class="card mb10 fu">
      <div class="fx ac g8 mb8">
        <span class="tag b f9" style="background:${t.col}1a;border:1px solid ${t.col}33;color:${t.col}">${i+1}</span>
        <div class="fp f13 b">${s.p}</div>
      </div>
      <div class="f12 c3 it mb8">${s.tip}</div>
      ${s.ex.map(e=>`<div class="f12 c2 mb4" style="padding-left:12px;border-left:2px solid ${t.col}33">"${e}"</div>`).join('')}
    </div>`).join('');
  } else if(WST.tab==='phrases'){
    body=Object.entries(t.phrases).map(([section,phrases])=>`<div class="card mb10 fu">
      <div class="sl mb10" style="color:${t.col}">${section.toUpperCase()}</div>
      ${phrases.map(ph=>`<div class="fx ac g8 mb6 p8" style="background:var(--s2);border-radius:7px;cursor:pointer" onclick="copyTxt('${ph.replace(/'/g,"\\'")}')">
        <div class="f12 c2" style="flex:1">"${ph}"</div>
        <span class="f9 c3">📋</span>
      </div>`).join('')}
    </div>`).join('');
  } else if(WST.tab==='templates'){
    body=`<div class="fu">
      <div class="f12 c2 mb16" style="line-height:1.6">Έτοιμα email templates — αντιγραφή με ένα κλικ και προσαρμογή!</div>
      ${EMAIL_TEMPLATES.map(et=>`<div class="card mb10">
        <div class="fx ac jb mb8">
          <div><div class="fp f13 b mb1" style="color:${t.col}">${et.title}</div>
          <span class="tag f9" style="background:${t.col}1a;border:1px solid ${t.col}33;color:${t.col}">${et.level}</span></div>
          <button onclick="copyTxt('${et.lines.join('\\n').replace(/'/g,"\\'")}')  " class="btn bgh bsm">📋 Αντιγραφή</button>
        </div>
        <div style="background:var(--s2);border-radius:8px;padding:12px;font-family:monospace;font-size:11px;color:var(--t2);line-height:1.8;white-space:pre-wrap">${et.lines.join('\n')}</div>
      </div>`).join('')}
    </div>`;
  } else {
    const saved=DB.get('wp_'+t.id,'');
        const checklist=[
      {id:'c1',label:'Χρησιμοποίησα connectors (however, therefore, although...)'},
      {id:'c2',label:'Έγραψα τουλάχιστον 2 παραγράφους'},
      {id:'c3',label:'Χρησιμοποίησα ποικιλία χρόνων'},
      {id:'c4',label:'Ξεκινώ προτάσεις διαφορετικά'},
      {id:'c5',label:'Έχω opening και closing phrase'},
      {id:'c6',label:'Δεν επανέλαβα ίδιες λέξεις'},
    ];
    const savedChecks=DB.get('wpc_'+WST.topic,{});
    const checkScore=Object.values(savedChecks).filter(Boolean).length;
    body=`<div class="g2 fu" style="align-items:start;gap:14px">
      <div class="card">
        <div class="sl mb8" style="color:${t.col}">ΕΞΑΣΚΗΣΗ</div>
        <div class="f12 c2 mb12" style="line-height:1.7">Χρησιμοποίησε τη δομή και τις φράσεις. Τσέκαρε το checklist μετά!</div>
        <textarea id="wptx" rows="14" placeholder="Γράψε εδώ..." style="width:100%;background:var(--s2);border:1px solid var(--ln);border-radius:8px;color:var(--t1);font-size:13px;padding:12px;font-family:var(--f);line-height:1.7;resize:vertical">${saved}</textarea>
        <div class="fx jb ac mt10">
          <div class="f11 c3">💾 Αποθηκεύεται αυτόματα</div>
          <div class="fx g8">
            <button onclick="getAIWritingFeedback()" class="btn bp bsm" id="ai-feedback-btn">🤖 AI Feedback</button>
            <button onclick="document.getElementById('wptx').value='';DB.set('wp_'+WST.topic,'')" class="btn bgh bsm">Ξεκινήστε πάλι</button>
          </div>
        </div>
        <div id="ai-feedback-result" style="margin-top:12px"></div>
      </div>
      <div>
        <div class="card mb12">
          <div class="sl mb10" style="color:${t.col}">✅ CHECKLIST ΠΟΙΟΤΗΤΑΣ</div>
          ${checklist.map(item=>'<div onclick="toggleWriteCheck(\''+WST.topic+'\',\''+item.id+'\')" style="display:flex;align-items:center;gap:8px;padding:8px;border-radius:7px;cursor:pointer;margin-bottom:4px;background:'+(savedChecks[item.id]?'#051a0a':'var(--s2)')+';border:1px solid '+(savedChecks[item.id]?'#22c77a33':'var(--ln)')+';transition:all .15s"><div style="width:18px;height:18px;border-radius:4px;border:2px solid '+(savedChecks[item.id]?'var(--gr)':'var(--t3)')+';background:'+(savedChecks[item.id]?'var(--gr)':'transparent')+';display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;color:#051a0a">'+(savedChecks[item.id]?'✓':'')+'</div><span class="f11" style="color:'+(savedChecks[item.id]?'var(--gr)':'var(--t2)')+'">'+item.label+'</span></div>').join('')}
          <div class="mt10 pt10" style="border-top:1px solid var(--ln)">
            <div class="sl mb4">ΑΥΤΟΑΞΙΟΛΟΓΗΣΗ</div>
            <div class="fp f22 b" style="color:${checkScore>=5?'var(--gr)':checkScore>=3?'var(--am)':'var(--ro)'}">${checkScore}/6</div>
            <div class="f10 c3 mt4">${checkScore>=5?'Εξαιρετικό!':checkScore>=3?'Καλά — συνέχισε!':'Χρειάζεται δουλειά'}</div>
          </div>
        </div>
        <div class="card c-info">
          <div class="sl mb8 cbl">💡 ΑΝΑΒΑΘΜΙΣΕ ΤΟ ΛΕΞΙΛΟΓΙΟ</div>
          <div class="f11 c2" style="line-height:1.9">
            ✗ very good → ✓ <strong>excellent / outstanding</strong><br>
            ✗ very bad → ✓ <strong>problematic / detrimental</strong><br>
            ✗ very important → ✓ <strong>crucial / essential</strong><br>
            ✗ a lot of → ✓ <strong>numerous / a great deal of</strong><br>
            ✗ I think → ✓ <strong>I believe / In my opinion</strong>
          </div>
        </div>
      </div>
    </div>`;
  }
  el.innerHTML=`<div class="sec fu">
    <button onclick="WST.topic=null;rWriting()" style="color:var(--t3);font-size:11px;background:none;border:none;cursor:pointer;margin-bottom:16px">← Πίσω</button>
    <div class="fx ac jb mb16">
      <div class="fx ac g10"><span style="font-size:26px">${t.ic}</span><div><div class="fp f16 b" style="color:${t.col}">${t.t}</div><div class="f11 c3">${t.desc}</div></div></div>
      <span class="tag f9" style="background:${t.col}1a;border:1px solid ${t.col}33;color:${t.col}">${t.lv}</span>
    </div>
    <div class="fx mb16" style="border-bottom:1px solid var(--ln)">${tabs}</div>${body}
  </div>`;
  if(WST.tab==='practice'){
    const ta=document.getElementById('wptx');
    if(ta)ta.addEventListener('input',()=>DB.set('wp_'+WST.topic,ta.value));
  }
}

function toggleWriteCheck(topicId,checkId){
  const checks=DB.get('wpc_'+topicId,{});
  checks[checkId]=!checks[checkId];
  DB.set('wpc_'+topicId,checks);
  rWTopic();
}

   <p>Habits are formed through a three-step process called the "habit loop." First, there is a <em>cue</em> — something that <em>triggers</em> the behaviour. Then comes the routine — the behaviour itself. Finally, there is a reward, which reinforces the cycle and makes the brain want to repeat it.</p>

  {id:'r3',t:'The Digital Revolution and Communication',lv:'B2',col:'var(--am)',time:'3 min',
   text:`<p>Digital technology has fundamentally <em>transformed</em> the way we communicate. Within a single generation, we have moved from handwritten letters to instant global messaging. While this has brought <em>undeniable</em> advantages, it has also introduced significant challenges.</p>
   <p>Advocates of digital communication point out that we are now more <em>connected</em> than at any point in history. We can video-call family on the other side of the world, <em>collaborate</em> with international colleagues in real time, and access information within seconds.</p>
   <p>However, critics argue that this constant <em>connectivity</em> comes at a psychological cost. The pressure to always be available, respond immediately, and curate a perfect online presence can lead to anxiety and feelings of <em>inadequacy</em>. Studies increasingly link heavy social media use with lower levels of life satisfaction.</p>
   <p>The solution, many psychologists suggest, is not to <em>abandon</em> technology, but to use it more <em>mindfully</em>. Establishing clear digital boundaries — such as keeping phones away during meals or designating technology-free hours — can help restore a healthier, more balanced relationship with our devices.</p>`,
   vocab:['transformed','undeniable','collaborate','connectivity','inadequacy','abandon','mindfully'],
   qs:[
     {q:'What has digital technology fundamentally changed?',opts:['The economy','The way we communicate','Education systems','Healthcare'],a:'The way we communicate',ex:'"Digital technology has fundamentally transformed the way we communicate"'},
     {q:'What psychological cost is mentioned?',opts:['Physical health problems','Financial stress','Anxiety and feelings of inadequacy','Memory loss'],a:'Anxiety and feelings of inadequacy',ex:'"can lead to anxiety and feelings of inadequacy"'},
     {q:'What does "mindfully" suggest?',opts:['Slowly and carefully','With full awareness and intention','Automatically','Reluctantly'],a:'With full awareness and intention',ex:'"mindfully" = με επίγνωση και πρόθεση'},
     {q:'What solution do psychologists recommend?',opts:['Stop using technology completely','Use technology more mindfully with clear boundaries','Limit to one device per person','Only use technology for work'],a:'Use technology more mindfully with clear boundaries',ex:'"use it more mindfully... Establishing clear digital boundaries"'},
   ]},
  {id:'r4',t:'The Psychology of Learning a Language',lv:'B2-C1',col:'var(--vi)',time:'4 min',
   text:`<p>Learning a new language is frequently described as one of the most <em>rewarding</em> yet demanding <em>endeavours</em> an adult can <em>undertake</em>. Beyond the obvious practical benefits, neuroscientific research reveals that bilingualism has profound effects on the brain itself.</p>
   <p>Studies consistently show that bilingual individuals demonstrate superior <em>cognitive flexibility</em> — the ability to switch between tasks, think creatively, and resist distraction. Regular use of two language systems appears to <em>strengthen</em> key neural <em>pathways</em> and may even delay the onset of cognitive decline in later life.</p>
   <p>Despite these compelling benefits, many adult learners find themselves stuck in what linguists call the "silent period" — a phase during which they understand far more than they can <em>express</em>. This perfectly natural stage often generates considerable <em>frustration</em> and leads learners to conclude, incorrectly, that they lack the necessary <em>aptitude</em>.</p>
   <p>The path beyond this plateau does not lie in studying more grammar rules in isolation, but in <em>actively engaging</em> with the language through reading, listening, speaking — imperfectly at first — and writing regularly. Crucially, the willingness to make mistakes and learn from them <em>accelerates</em> progress far more effectively than passive study ever could.</p>`,
   vocab:['rewarding','endeavours','undertake','cognitive','frustration','aptitude','actively','accelerates'],
   qs:[
     {q:'What does research show about bilingual people?',opts:['They earn more money','They have superior cognitive flexibility','They are better at mathematics','They learn faster as children'],a:'They have superior cognitive flexibility',ex:'"bilingual individuals demonstrate superior cognitive flexibility"'},
     {q:'What is the "silent period" in language learning?',opts:['When you stop practising','When you understand more than you can express','When you focus only on writing','When you are too tired to study'],a:'When you understand more than you can express',ex:'"they understand far more than they can express"'},
     {q:'What does the text say is the key to progress beyond the plateau?',opts:['Studying more grammar','Using a professional teacher','Actively engaging through all four skills','Memorising vocabulary lists'],a:'Actively engaging through all four skills',ex:'"actively engaging with the language through reading, listening, speaking... and writing"'},
     {q:'What does the text say about making mistakes?',opts:['They should be avoided','They slow down progress','They are more effective than passive study','They cause frustration'],a:'They are more effective than passive study',ex:'"the willingness to make mistakes and learn from them accelerates progress far more effectively than passive study"'},
   ]},
  {id:'r5',t:'Emotional Intelligence in the Workplace',lv:'C1',col:'var(--ro)',time:'4 min',
   text:`<p>Emotional intelligence — the capacity to recognise, understand, manage and effectively use emotions in ourselves and others — has emerged as one of the most highly <em>valued</em> skills in the contemporary workplace. While technical expertise and academic qualifications remain important, research consistently demonstrates that emotional intelligence is a stronger <em>predictor</em> of professional success than IQ alone.</p>
   <p>At its core, emotional intelligence <em>comprises</em> four key <em>competencies</em>: self-awareness, self-regulation, social awareness and relationship management. Self-aware individuals recognise how their emotions influence their thinking and behaviour. Self-regulation enables people to manage <em>impulses</em> and respond rather than react to difficult situations.</p>
   <p>Social awareness — often described as <em>empathy</em> — allows us to understand the emotional states of those around us, which is particularly valuable in leadership, negotiation and conflict resolution. Finally, relationship management involves using all these skills to inspire, influence and <em>cultivate</em> meaningful professional connections.</p>
   <p>The encouraging finding from decades of research is that, unlike IQ, emotional intelligence can be significantly developed through <em>deliberate</em> practice and self-reflection. Leaders who invest in developing their emotional intelligence tend to create more <em>cohesive</em> teams, resolve conflicts more effectively, and achieve superior long-term outcomes.</p>`,
   vocab:['valued','predictor','comprises','competencies','empathy','cultivate','deliberate','cohesive'],
   qs:[
     {q:'What does research say about emotional intelligence vs IQ?',opts:['IQ is more important for success','They are equally important','EI is a stronger predictor of professional success','EI is only important for managers'],a:'EI is a stronger predictor of professional success',ex:'"emotional intelligence is a stronger predictor of professional success than IQ alone"'},
     {q:'How many key competencies does EI comprise?',opts:['Two','Three','Four','Five'],a:'Four',ex:'"emotional intelligence comprises four key competencies: self-awareness, self-regulation, social awareness and relationship management"'},
     {q:'What does "empathy" allow us to do?',opts:['Control other people','Understand the emotional states of others','Avoid conflict','Make better decisions'],a:'Understand the emotional states of others',ex:'"Social awareness — often described as empathy — allows us to understand the emotional states of those around us"'},
     {q:'What makes EI different from IQ according to the text?',opts:['EI decreases with age','EI cannot be measured','EI can be developed through practice','EI is only relevant for some professions'],a:'EI can be developed through practice',ex:'"unlike IQ, emotional intelligence can be significantly developed through deliberate practice"'},
   ]},

  {id:'r6',t:'The Future of Remote Work',lv:'B1-B2',col:'var(--tl)',time:'3 min',
   text:`<p>The COVID-19 pandemic <em>fundamentally</em> changed how millions of people around the world work. What began as a temporary emergency measure has <em>evolved</em> into a permanent shift in workplace culture. Remote work, once considered a privilege, has become a standard expectation for many employees.</p>
   <p>The benefits are <em>undeniable</em>. Employees report higher levels of job satisfaction, better work-life balance, and reduced commuting costs. For employers, remote work opens access to a global talent pool and can significantly reduce office overhead costs. Studies show that productivity often <em>increases</em> when people work from home, particularly for tasks requiring deep concentration.</p>
   <p>However, remote work is not without its <em>drawbacks</em>. Many workers struggle with feelings of isolation and find it difficult to separate professional and personal life. Collaboration and creativity can suffer when teams are not physically together. Junior employees, in particular, may miss out on the informal mentoring that naturally occurs in office environments.</p>
   <p>Most companies are now <em>adopting</em> a hybrid model — a combination of office and remote work. This approach attempts to capture the benefits of both arrangements while minimising the drawbacks. The key to success lies in clear communication, trust between managers and employees, and the right technological infrastructure.</p>`,
   vocab:['fundamentally','evolved','undeniable','drawbacks','adopting'],
   qs:[
     {q:'What does the text say about productivity when working from home?',opts:['It always decreases','It often increases for tasks needing concentration','It stays exactly the same','It depends on the company'],a:'It often increases for tasks needing concentration',ex:'"productivity often increases when people work from home, particularly for tasks requiring deep concentration"'},
     {q:'What is a major drawback of remote work mentioned in the text?',opts:['Higher costs','Isolation and difficulty separating work from personal life','Lower salaries','Longer working hours'],a:'Isolation and difficulty separating work from personal life',ex:'"Many workers struggle with feelings of isolation and find it difficult to separate professional and personal life"'},
     {q:'Who may particularly miss out due to remote work?',opts:['Senior managers','Experienced employees','Junior employees','Part-time workers'],a:'Junior employees',ex:'"Junior employees, in particular, may miss out on the informal mentoring that naturally occurs in office environments"'},
     {q:'What is a hybrid model?',opts:['Fully remote work','Only office work','A combination of office and remote work','Working from different countries'],a:'A combination of office and remote work',ex:'"Most companies are now adopting a hybrid model — a combination of office and remote work"'},
   ]},
  {id:'r7',t:'The Importance of Financial Literacy',lv:'B2',col:'var(--gr)',time:'3 min',
   text:`<p>Financial literacy — the ability to understand and manage personal finances effectively — is one of the most valuable yet <em>neglected</em> skills in modern education. Despite its critical importance, many people reach adulthood without a solid understanding of <em>fundamental</em> concepts such as budgeting, saving, investing, and managing debt.</p>
   <p>The consequences of financial <em>illiteracy</em> are significant. People who lack financial knowledge are more likely to accumulate debt, make poor investment decisions, and struggle to save for retirement. They are also more vulnerable to financial scams and predatory lending practices that can have devastating long-term effects.</p>
   <p>Fortunately, developing financial literacy does not require a degree in economics. Understanding a few key principles can make a substantial difference. These include: living within your means, building an emergency fund, avoiding high-interest debt, and <em>consistently</em> setting aside money for long-term goals.</p>
   <p>Governments and organisations around the world are increasingly recognising the importance of financial education. Some countries have introduced financial literacy programmes into school <em>curricula</em>, while banks and employers are offering workshops and resources to help people make better financial decisions. The evidence is clear: financially literate individuals are better equipped to navigate economic challenges and achieve lasting financial stability.</p>`,
   vocab:['neglected','fundamental','illiteracy','consistently','curricula'],
   qs:[
     {q:'What is financial literacy?',opts:['The ability to count money','Understanding and managing personal finances effectively','A university degree in finance','The ability to earn a high salary'],a:'Understanding and managing personal finances effectively',ex:'"Financial literacy — the ability to understand and manage personal finances effectively"'},
     {q:'According to the text, what are financially illiterate people more vulnerable to?',opts:['Unemployment','Financial scams and predatory lending','Health problems','Poor education'],a:'Financial scams and predatory lending',ex:'"They are also more vulnerable to financial scams and predatory lending practices"'},
     {q:'Which principle is NOT mentioned as key to financial literacy?',opts:['Living within your means','Building an emergency fund','Investing in property','Avoiding high-interest debt'],a:'Investing in property',ex:'The text mentions: living within means, emergency fund, avoiding high-interest debt, saving for long-term goals'},
     {q:'How are governments responding to this issue?',opts:['By reducing taxes','Introducing financial literacy into school curricula','Printing more money','Offering free loans'],a:'Introducing financial literacy into school curricula',ex:'"Some countries have introduced financial literacy programmes into school curricula"'},
   ]},
  {id:'r8',t:'Social Media and Mental Health',lv:'B2-C1',col:'var(--ro)',time:'4 min',
   text:`<p>The relationship between social media use and mental health has become one of the most <em>scrutinised</em> topics in contemporary psychology. As platforms such as Instagram, TikTok and Twitter have become central to daily life — particularly for younger generations — researchers have been working to understand their psychological impact.</p>
   <p>The evidence presents a nuanced picture. On the one hand, social media enables people to maintain connections, access support communities, and express their identity. For individuals in isolated circumstances, online communities can provide a vital sense of belonging. Furthermore, platforms have been used effectively to raise awareness about mental health issues and <em>destigmatise</em> seeking help.</p>
   <p>On the other hand, research consistently links heavy social media use — particularly passive scrolling — with increased rates of anxiety, loneliness, and depression. The mechanism appears to involve <em>unfavourable</em> social comparisons: seeing carefully curated images of others' lives can generate feelings of <em>inadequacy</em> and low self-worth. Cyberbullying presents an additional and serious risk, particularly for adolescents.</p>
   <p>Experts recommend a mindful approach rather than complete abstinence. Setting clear time limits, being selective about the accounts you follow, and actively engaging rather than passively consuming content are all <em>strategies</em> shown to mitigate negative effects. The goal is not to eliminate social media but to develop a healthier, more intentional relationship with it.</p>`,
   vocab:['scrutinised','destigmatise','unfavourable','inadequacy','strategies'],
   qs:[
     {q:'What does "passive scrolling" refer to in this context?',opts:['Actively creating content','Reading content without engaging or interacting','Scrolling quickly through pages','Using social media for work'],a:'Reading content without engaging or interacting',ex:'Passive scrolling = consuming content without active engagement, linked to anxiety and depression'},
     {q:'What mechanism links social media to negative mental health outcomes?',opts:['Addiction to notifications','Unfavourable social comparisons from curated images','Too much screen time generally','Lack of real-life friends'],a:'Unfavourable social comparisons from curated images',ex:'"seeing carefully curated images of others lives can generate feelings of inadequacy and low self-worth"'},
     {q:'What is the positive aspect of social media for isolated individuals?',opts:['It replaces real friendships','It provides entertainment','It provides a vital sense of belonging','It improves physical health'],a:'It provides a vital sense of belonging',ex:'"For individuals in isolated circumstances, online communities can provide a vital sense of belonging"'},
     {q:'What approach do experts recommend?',opts:['Complete avoidance of social media','Mindful use with clear limits and active engagement','Using only one platform','Only using social media for work'],a:'Mindful use with clear limits and active engagement',ex:'"Experts recommend a mindful approach rather than complete abstinence. Setting clear time limits... actively engaging rather than passively consuming"'},
   ]},

let RST={art:null,ra:{},rs:false,rsc:null};

  unlockAch('rd1');
  const el=document.getElementById('reading');
  if(!RST.art){
    el.innerHTML=`<div class="sec fu">
      <div class="sl mb4 cam">READING COMPREHENSION</div>
      <div class="fp f16 b mb6">Ανάγνωση & Κατανόηση</div>

      ${READINGS.map(a=>`<div class="rcard">
        <div class="fx ac jb mb8" onclick="RST.art='${a.id}';RST.ra={};RST.rs=false;RST.rsc=null;rReading()">
          <div class="fp f13 b" style="color:${a.col}">${a.t}</div>
          <div class="fx ac g6">
            <span class="tag f9" style="background:${a.col}1a;border:1px solid ${a.col}33;color:${a.col}">${a.lv}</span>
            <span class="tag f9" style="background:var(--s2);border:1px solid var(--ln2);color:var(--t3)">⏱ ${a.time}</span>
            <span class="tag f9" style="background:var(--s2);border:1px solid var(--ln2);color:var(--t3)">❓ ${a.qs.length}Q</span>
          </div>
        </div>
        <p class="f11 c3" style="line-height:1.5" onclick="RST.art='${a.id}';RST.ra={};RST.rs=false;RST.rsc=null;rReading()">${a.text.replace(/<[^>]+>/g,'').substring(0,170)}...</p>
        ${a.vocab.length?`<div class="mt8 fx g6 ac fw"><span class="f9 c3">Λέξεις:</span>${a.vocab.map(v=>`<span class="tag f9" style="background:var(--gr)1a;border:1px solid var(--gr)33;color:var(--gr)">${v}</span>`).join('')}</div>`:''}
      </div>`).join('')}
    </div>`;
  } else {
    const a=READINGS.find(x=>x.id===RST.art);
    const qRows=a.qs.map((q,i)=>{
      const opts=q.opts.map(opt=>{
        let bg='var(--s2)',br='var(--ln)',col='var(--t2)';
        if(RST.ra[i]===opt){bg='var(--s3)';br=a.col;col=a.col;}
        if(RST.rs){if(opt===q.a){bg='#051a0a';br='#22c77a44';col='var(--gr)';}else if(RST.ra[i]===opt){bg='#1a0508';br='#f0387044';col='var(--ro)';}}
        return `<button class="rqo" onclick="if(!RST.rs){RST.ra[${i}]='${opt.replace(/'/g,"\\'")}';rReading()}" style="background:${bg};border-color:${br};color:${col}">${opt}</button>`;
      }).join('');
      return `<div class="card mb10"><div class="f13 mb10" style="line-height:1.6"><span class="fp b" style="color:${a.col};margin-right:7px">${i+1}.</span>${q.q}</div>${opts}${RST.rs?`<div class="mt8 f11"><span style="color:${RST.ra[i]===q.a?'var(--gr)':'var(--ro)'}">${RST.ra[i]===q.a?'✓ Σωστό! ':'✗ Σωστό: "'+q.a+'" — '}</span><span class="c3">${q.ex}</span></div>`:''}</div>`;
    }).join('');
    const allA=Object.keys(RST.ra).length>=a.qs.length;
    el.innerHTML=`<div class="sec fu">
      <button onclick="RST.art=null;rReading()" style="color:var(--t3);font-size:11px;background:none;border:none;cursor:pointer;margin-bottom:16px">← Πίσω</button>
      <div class="fx ac g8 mb6">
        <span class="tag f9" style="background:${a.col}1a;border:1px solid ${a.col}33;color:${a.col}">${a.lv}</span>
        <span class="tag f9" style="background:var(--s2);border:1px solid var(--ln2);color:var(--t3)">⏱ ${a.time}</span>
      </div>
      <div class="fp f16 b mb4" style="color:${a.col}">${a.t}</div>
      ${a.vocab.length?`<div class="card c-ok mb12 fx ac g8 fw"><span class="f10 c2">💡 Κλικ για αποθήκευση στο Vocabular:</span>${a.vocab.map(v=>`<button onclick="saveFromR('${v}')" style="padding:3px 9px;border-radius:20px;border:1px solid var(--gr)44;background:var(--gr)1a;color:var(--gr);font-size:10px;font-weight:600;cursor:pointer">+ ${v}</button>`).join('')}</div>`:''}
      <div class="card mb20 rbody">${a.text}</div>
      <div class="sl mb12">COMPREHENSION QUESTIONS</div>
      ${qRows}
      ${!RST.rs
        ?`<button onclick="if(${allA}){let c=0;READINGS.find(x=>x.id===RST.art).qs.forEach((q,i)=>{if(RST.ra[i]===q.a)c++});RST.rsc=c;RST.rs=true;addXP(c*10);
  const rd=DB.get('rdDone',[]);if(!rd.includes(RST.art)){rd.push(RST.art);DB.set('rdDone',rd);}
  if(c===READINGS.find(x=>x.id===RST.art).qs.length)toast('✓ Τέλειο! +'+c*10+' XP','var(--gr)');
  else toast('Αποτέλεσμα: '+c+'/'+READINGS.find(x=>x.id===RST.art).qs.length+' — +'+c*10+' XP','var(--bl)');
  rReading()}" style="padding:10px 22px;background:${a.col};border:none;border-radius:7px;color:#07080f;font-weight:700;font-size:11px;cursor:pointer;opacity:${allA?1:0.4}">Ελέγξτε →</button>`
        :`<div class="fx ac g12"><div class="card" style="border:2px solid ${RST.rsc===a.qs.length?'var(--am)':'var(--gr)'}">
           <span class="f11 c3">Αποτέλεσμα: </span><span class="fp f20 b" style="color:${RST.rsc===a.qs.length?'var(--am)':'var(--gr)'}">${RST.rsc}/${a.qs.length}</span>
           </div><button onclick="RST.ra={};RST.rs=false;RST.rsc=null;rReading()" style="padding:9px 16px;border:1px solid ${a.col};border-radius:7px;color:${a.col};background:transparent;cursor:pointer;font-size:10px;font-weight:700">ΞΑΝΑ</button></div>`}
    </div>`;
  }
}

function saveFromR(word){
  const all=getAllW();
  if(all.find(w=>w.w===word)){toast('"'+word+'" ήδη στο Vocabular ✓','var(--gr)');return;}
  const cws=DB.get('customW',[]);
  const newId='r'+Date.now();
  cws.push({id:newId,w:word,g:'(πρόσθεσε μετάφραση στο Vocabular)',p:'word',cat:'b2_daily',e:'"'+word+'" — found while reading.',d:2,f:[]});
  DB.set('customW',cws);
  // Schedule for review
  const wb=getWB();
  wb[newId]={sc:0,st:0,nr:Date.now()+3600000,seen:0}; // review in 1 hour
  DB.set('wb',wb);
  toast('✓ "'+word+'" → Vocabular! Θα εμφανιστεί στο Quiz σύντομα.','var(--gr)');
  addXP(3);
}

let SIMST={conv:null,turn:0,sel:null,done:false,score:0};

function rSimulator(el){
  if(!SIMST.conv){
    el.innerHTML=`<div class="fp f13 b mb16">Conversation Simulator — Επίλεξε σενάριο</div>
      <p class="f12 c2 mb16" style="line-height:1.6">Διάλεξε τη σωστή απάντηση σε πραγματικές συνομιλίες. Μάθε φυσικές εκφράσεις στο context.</p>
      <div class="g3">
        ${CONVERSATIONS.map(cv=>`<div class="scard" onclick="SIMST.conv='${cv.id}';SIMST.turn=0;SIMST.sel=null;SIMST.done=false;SIMST.score=0;rSpeaking()">
          <div style="font-size:28px;margin-bottom:8px">${cv.ic}</div>
          <div class="fp f13 b mb4" style="color:var(--gr)">${cv.title}</div>
          <div class="tag f9" style="background:var(--gr)1a;border:1px solid var(--gr)33;color:var(--gr)">${cv.level}</div>
          <div class="f10 c3 mt8">${cv.turns.length} turns</div>
        </div>`).join('')}
      </div>`;
    return;
  }

  const cv=CONVERSATIONS.find(x=>x.id===SIMST.conv);
  const turn=cv.turns[SIMST.turn];
  const isLast=SIMST.turn>=cv.turns.length-1;
  const pct=Math.round((SIMST.turn/cv.turns.length)*100);

  if(SIMST.done){
    el.innerHTML=`<div style="text-align:center;padding:20px" class="fu">
      <div style="font-size:48px;margin-bottom:12px" class="pop">${SIMST.score===cv.turns.length?'🏆':'🎯'}</div>
      <div class="fp f18 b mb4" style="color:${SIMST.score===cv.turns.length?'var(--am)':'var(--gr)'}">${SIMST.score===cv.turns.length?'Τέλειο!':'Καλό!'}</div>
      <div class="fp f24 b mb8">${SIMST.score}/${cv.turns.length}</div>
      <div class="f12 c2 mb16">${Math.round((SIMST.score/cv.turns.length)*100)}% σωστές απαντήσεις</div>
      <div class="fx jc g10">
        <button onclick="SIMST.conv='${cv.id}';SIMST.turn=0;SIMST.sel=null;SIMST.done=false;SIMST.score=0;rSpeaking()" class="btn bp">↺ Ξανά</button>
        <button onclick="SIMST.conv=null;rSpeaking()" class="btn bgh">← Επιστροφή</button>
      </div>
    </div>`;
    addXP(SIMST.score*10);
    return;
  }

  el.innerHTML=`<div style="max-width:640px;margin:0 auto">
    <div class="fx ac jb mb12">
      <button onclick="SIMST.conv=null;rSpeaking()" style="color:var(--t3);font-size:11px;background:none;border:none;cursor:pointer">← Πίσω</button>
      <span class="tag f9" style="background:var(--gr)1a;border:1px solid var(--gr)33;color:var(--gr)">${cv.ic} ${cv.title}</span>
      <span class="f11 c3">${SIMST.turn+1}/${cv.turns.length}</span>
    </div>
    <div class="pb mb16" style="height:4px"><div class="pf" style="width:${pct}%;background:linear-gradient(90deg,var(--gr),var(--tl))"></div></div>

    <!-- Interviewer/Speaker bubble -->
    <div style="display:flex;gap:10px;margin-bottom:16px">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${cv.ic}</div>
      <div style="background:var(--s2);border:1px solid var(--ln);border-radius:0 12px 12px 12px;padding:12px 14px;max-width:85%">
        <div class="f10 b c3 mb4">${turn.speaker}</div>
        <div class="f13" style="line-height:1.6">${turn.text}</div>
      </div>
    </div>

    <!-- Options -->
    <div class="f11 c3 mb8">Επίλεξε την καλύτερη απάντηση:</div>
    ${turn.options.map((opt,i)=>{
      let bg='var(--s2)',br='var(--ln)',col='var(--t2)',prefix='';
      if(SIMST.sel===i&&SIMST.sel!==null){
        if(i===turn.correct){bg='#051a0a';br='#22c77a44';col='var(--gr)';prefix='✓ ';}
        else{bg='#1a0508';br='#f0387044';col='var(--ro)';prefix='✗ ';}
      } else if(SIMST.sel!==null&&i===turn.correct){
        bg='#051a0a';br='#22c77a44';col='var(--gr)';prefix='✓ ';
      }
      return `<div onclick="${SIMST.sel===null?'simSelect('+i+')':''}" style="padding:10px 14px;border-radius:8px;margin-bottom:8px;cursor:${SIMST.sel===null?'pointer':'default'};background:${bg};border:1px solid ${br};color:${col};transition:all .15s;font-size:13px;line-height:1.5">${prefix}${opt}</div>`;
    }).join('')}

    <!-- Feedback -->
    ${SIMST.sel!==null?`<div style="padding:10px 14px;background:${SIMST.sel===turn.correct?'#051a0a':'#1a0508'};border:1px solid ${SIMST.sel===turn.correct?'#22c77a44':'#f0387044'};border-radius:8px;margin-bottom:12px">
      <div class="f12" style="color:${SIMST.sel===turn.correct?'var(--gr)':'var(--ro)'}">💡 ${turn.feedback}</div>
    </div>
    <button onclick="simNext(${isLast})" class="btn bp">${isLast?'Τέλος ✓':'Επόμενο →'}</button>`:''}
  </div>`;
}

function simSelect(i){
  if(SIMST.sel!==null)return;
  const cv=CONVERSATIONS.find(x=>x.id===SIMST.conv);
  const turn=cv.turns[SIMST.turn];
  SIMST.sel=i;
  if(i===turn.correct)SIMST.score++;
  rSpeaking();
}

function simNext(isLast){
  if(isLast){SIMST.done=true;}
  else{SIMST.turn++;SIMST.sel=null;}
  rSpeaking();
}
