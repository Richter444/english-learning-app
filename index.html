<title>English Master — B1 to C1</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* High-contrast dark palette — clearly distinct levels */
  --bg:#080c14;--s1:#0f1623;--s2:#162032;--s3:#1c2b44;--s4:#233557;
  --ln:#1a2d47;--ln2:#2a4266;
  /* Crisper text */
  --t1:#f1f5fb;--t2:#94a3b8;--t3:#4b6080;
  /* Accent colors — slightly more vibrant */
  --bl:#4f8ef7;--vi:#7c5cf5;--gr:#22d67c;--tl:#18d4d4;
  --am:#f6bc18;--or:#f27030;--ro:#f03870;--pk:#d030f0;
  --f:"Inter",system-ui,sans-serif;--fp:"Playfair Display",Georgia,serif;
  --r:12px;--r2:16px;
  /* New design tokens */
  --shadow-sm:0 1px 3px rgba(0,0,0,.4);
  --shadow-md:0 4px 16px rgba(0,0,0,.5);
  --shadow-lg:0 8px 32px rgba(0,0,0,.6);
  --shadow-glow-bl:0 4px 20px rgba(79,142,247,.2);
  --shadow-glow-gr:0 4px 20px rgba(34,214,124,.2);
}
/* ══ LIGHT MODE ══ */
.light-mode{
  --bg:#f0f4f8;--s1:#ffffff;--s2:#f1f5f9;--s3:#e2e8f0;--s4:#cbd5e1;
  --ln:#cbd5e1;--ln2:#94a3b8;
  --t1:#0f172a;--t2:#475569;--t3:#94a3b8;
}
.light-mode .brand-logo{box-shadow:0 4px 12px rgba(79,142,247,.3)}
.light-mode .card{background:#fff;border-color:#e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.light-mode .card2{background:#f8fafc;border-color:#e2e8f0}
.light-mode .qopt{background:#f8fafc;border-color:#e2e8f0}
.light-mode #nav{background:rgba(255,255,255,.95);border-color:#e2e8f0}
.light-mode .tab:hover{background:#f1f5f9}
.light-mode .btn.bgh{background:#f1f5f9;border-color:#e2e8f0;color:#475569}
.light-mode .btn.bgh:hover{background:#e2e8f0}
.light-mode .hcard{background:#fff;border-color:#e2e8f0}
.light-mode .hs{background:#fff;border-color:#e2e8f0}
.light-mode .vsb,.light-mode .tsb{background:#fff;border-color:#e2e8f0}
.light-mode .vmb{color:#475569}
.light-mode .vmb.on{background:#f0f7ff;border-color:#4f8ef7}
.light-mode .trt{background:#f8fafc;border-color:#e2e8f0}
.light-mode .trt:hover{background:#f1f5f9}
.light-mode input,.light-mode textarea,.light-mode select{background:#f8fafc;border-color:#e2e8f0;color:#0f172a}
.light-mode .scard{background:#fff;border-color:#e2e8f0}
.light-mode .rcard{background:#fff;border-color:#e2e8f0}
.light-mode .gch{background:#fff;border-color:#e2e8f0}

html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--f);overflow:hidden;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:var(--f);border:none;background:none;color:inherit;transition:all .18s ease}
button:active{transform:scale(.96)}
input,textarea,select{font-family:var(--f);outline:none;color:var(--t1);transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--bl)!important}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--ln2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--t3)}

#app{display:flex;flex-direction:column;height:100vh}
#nav{display:flex;align-items:center;background:var(--s1);border-bottom:1px solid var(--ln);height:54px;padding:0 16px;flex-shrink:0;gap:4px;z-index:100;backdrop-filter:blur(10px)}
.brand{display:flex;align-items:center;gap:10px;margin-right:10px;flex-shrink:0}
.brand-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--bl),var(--vi));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:var(--shadow-glow-bl)}
.brand-name{font-family:var(--fp);font-size:15px;color:var(--t1);font-weight:600}
.brand-sub{font-size:9px;color:var(--t3);letter-spacing:2px;display:block;margin-top:-2px}
.tabs{display:flex;overflow-x:auto;flex:1}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:5px 13px;border-bottom:2px solid transparent;font-size:11px;font-weight:500;color:var(--t3);white-space:nowrap;transition:all .18s;border-radius:4px 4px 0 0}
.tab:hover{color:var(--t2);background:var(--s2)}
.tab.on{color:var(--bl);border-bottom-color:var(--bl);background:rgba(79,142,247,.06)}
.nav-r{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}
.lv-b{background:linear-gradient(135deg,var(--am),var(--or));border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;color:#1a0d00}
.xpw{width:68px}
.xpt{font-size:9px;color:var(--t3);margin-bottom:2px}
.xpb{height:4px;background:var(--s3);border-radius:2px}
.xpf{height:100%;background:linear-gradient(90deg,var(--am),var(--or));border-radius:2px;transition:width .4s}
#pwab{display:none;padding:4px 11px;background:var(--bl);border-radius:6px;color:#fff;font-size:10px;font-weight:600}

#cnt{flex:1;overflow:hidden}
.pnl{display:none;height:100%;overflow-y:auto}
.fpnl{display:none;height:100%}

.card{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:18px;box-shadow:var(--shadow-sm)}
.card2{background:var(--s2);border:1px solid var(--ln);border-radius:var(--r);padding:14px}
.c-ok{background:rgba(34,214,124,.06);border-color:rgba(34,214,124,.2)}
.c-warn{background:rgba(246,188,24,.06);border-color:rgba(246,188,24,.2)}
.c-info{background:rgba(79,142,247,.06);border-color:rgba(79,142,247,.2)}
.c-err{background:rgba(240,56,112,.06);border-color:rgba(240,56,112,.2)}

.btn{padding:9px 20px;border-radius:10px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:all .18s ease;letter-spacing:.01em}
.btn:hover{filter:brightness(1.12);transform:translateY(-1px)}
.btn:active{transform:scale(.96) translateY(0);filter:brightness(.95)}
.bp{background:linear-gradient(135deg,var(--bl),var(--vi));color:#fff;box-shadow:var(--shadow-glow-bl)}
.bp:hover{box-shadow:0 6px 24px rgba(79,142,247,.35)}
.bg{background:linear-gradient(135deg,var(--gr),var(--tl));color:#030f08;box-shadow:var(--shadow-glow-gr)}
.bgh{border:1px solid var(--ln2);color:var(--t2);background:var(--s2)}
.bgh:hover{background:var(--s3);border-color:var(--t3);color:var(--t1)}
/* Success button */
.bgr{background:rgba(34,214,124,.12);border:1px solid rgba(34,214,124,.3);color:var(--gr)}
.bgr:hover{background:rgba(34,214,124,.2)}
/* Warning button */
.bam{background:rgba(246,188,24,.12);border:1px solid rgba(246,188,24,.3);color:var(--am)}
.bam:hover{background:rgba(246,188,24,.2)}
.br{border:1px solid rgba(240,56,112,.5);color:var(--ro);background:rgba(240,56,112,.06)}
.bsm{padding:5px 13px;font-size:11px;border-radius:8px}
.bxs{padding:3px 9px;font-size:10px;border-radius:6px}

.tag{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.02em}
.pb{background:var(--s3);border-radius:6px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .4s}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}

.fx{display:flex}.col{flex-direction:column}.ac{align-items:center}.jb{justify-content:space-between}.jc{justify-content:center}.fw{flex-wrap:wrap}
.g4u{gap:4px}.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}.g16{gap:16px}
.mb4{margin-bottom:4px}.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}
.mt4{margin-top:4px}.mt6{margin-top:6px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.tc{text-align:center}.tr{text-align:right}
.b{font-weight:600}.sb{font-weight:500}.it{font-style:italic}.mono{font-family:monospace}.fp{font-family:var(--fp)}
.f9{font-size:9px}
/* Typography scale helpers */
.txt-xs{font-size:11px;line-height:1.5}
.txt-sm{font-size:12px;line-height:1.6}
.txt-base{font-size:14px;line-height:1.6}
.txt-lg{font-size:16px;line-height:1.5;font-weight:600}
.txt-xl{font-size:20px;line-height:1.3;font-weight:700}
.txt-2xl{font-size:24px;line-height:1.2;font-weight:700}
/* Semantic text */
.label{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--t3)}
.caption{font-size:11px;color:var(--t3);line-height:1.5}
.body{font-size:13px;color:var(--t2);line-height:1.7}
.body-sm{font-size:12px;color:var(--t2);line-height:1.7}.f10{font-size:10px}.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}.f14{font-size:14px}.f16{font-size:16px}.f18{font-size:18px}.f20{font-size:20px}.f22{font-size:22px}.f24{font-size:24px}.f28{font-size:28px}.f32{font-size:32px}
.c1{color:var(--t1)}.c2{color:var(--t2)}.c3{color:var(--t3)}
.cbl{color:var(--bl)}.cvi{color:var(--vi)}.cgr{color:var(--gr)}.ctl{color:var(--tl)}.cam{color:var(--am)}.cor{color:var(--or)}.cro{color:var(--ro)}.cpk{color:var(--pk)}
.w100{width:100%}.mxa{margin-left:auto}
.sl{font-size:9px;font-weight:700;letter-spacing:3.5px;color:var(--t3);text-transform:uppercase;opacity:.8}
.more-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 6px;background:var(--s2);border-radius:10px;color:var(--t2);font-size:10px;font-weight:500;border:1px solid var(--ln);cursor:pointer;transition:all .15s}
.more-item span:first-child{font-size:20px}
.more-item:hover{background:var(--s3);color:var(--t1);border-color:var(--ln2)}
.sec{padding:24px;max-width:880px;margin:0 auto}
/* Consistent section header */
.sec-hd{margin-bottom:20px}
.sec-hd .label{margin-bottom:6px}
.sec-hd h2{font-size:20px;font-weight:700;color:var(--t1);margin:0}
.sec-hd p{font-size:13px;color:var(--t3);margin-top:4px;line-height:1.6}
/* Content divider */
.divider{height:1px;background:var(--ln);margin:16px 0}
/* Empty state */
.empty-state{text-align:center;padding:48px 24px;color:var(--t3)}
.empty-state .empty-ico{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:13px;line-height:1.6}
.quick-btn{transition:all .15s ease!important}
.quick-btn:hover{border-color:var(--ln2)!important;color:var(--t1)!important;background:var(--s3)!important;transform:translateY(-1px)}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--s1);border:1px solid var(--ln2);border-radius:12px;padding:11px 22px;font-size:13px;font-weight:500;z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.05)}
#toast.on{transform:translateX(-50%) translateY(0)}
#achpop{position:fixed;top:62px;right:16px;background:var(--s1);border:1px solid var(--am);border-radius:12px;padding:12px 16px;z-index:9998;transform:translateX(240px);transition:transform .4s;box-shadow:0 6px 24px rgba(245,183,34,.15);max-width:260px}
#achpop.on{transform:translateX(0)}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.85)}60%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fu{animation:fadeUp .25s ease}
.pop{animation:popIn .3s ease}
.pulse{animation:pulse 2s infinite}

/* HOME */
.hgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.hcard{border-radius:var(--r2);padding:20px;cursor:pointer;transition:all .22s ease;border:1px solid var(--ln);background:var(--s1)}
.hcard:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--ln2)}
.hcard-ico{font-size:28px;margin-bottom:10px}
.hstats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
.hs{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:14px 8px;text-align:center;transition:all .15s}
.hs:hover{border-color:var(--ln2);background:var(--s2)}
.hs-v{font-family:var(--fp);font-size:22px;font-weight:600;margin-bottom:2px}
.hs-l{font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase}
.today-box{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r2);padding:16px}
.td-t{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:6px;transition:all .13s}
.td-t.done{background:#051a0a;border-color:#22c77a2a}
.tck{width:20px;height:20px;border-radius:50%;border:2px solid var(--t3);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .15s}
.td-t.done .tck{background:var(--gr);border-color:var(--gr);color:#051a0a}

/* VOCAB */
.vsb{width:192px;background:var(--s1);border-right:1px solid var(--ln);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.vsb-h{padding:14px 14px 10px;border-bottom:1px solid var(--ln)}
.vmb{display:flex;align-items:center;gap:8px;width:100%;padding:8px 14px;border-left:3px solid transparent;font-size:12px;color:var(--t3);text-align:left;transition:all .13s}
.vmb.on{background:var(--s2);border-left-color:var(--bl);color:var(--t1)}
.vmb:hover{background:var(--s2)}
.vm{flex:1;overflow-y:auto;padding:18px;padding-bottom:24px}
.wc{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:14px;margin-bottom:8px;transition:border-color .15s}
.wc:hover{border-color:var(--ln2)}
.qcard{width:100%;max-width:580px;background:var(--s1);border:1px solid var(--ln);border-radius:var(--r2);padding:28px;box-shadow:var(--shadow-md);animation:fadeUp .2s ease}
/* Quiz progress bar — more prominent */
.quiz-progress{height:4px;background:var(--s3);border-radius:4px;overflow:hidden;margin-bottom:20px}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--bl),var(--gr));border-radius:4px;transition:width .4s ease}
/* Quiz counter badge */
.quiz-counter{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:var(--s2);border:1px solid var(--ln);border-radius:20px;font-size:11px;color:var(--t3);margin-bottom:16px}
/* Correct/Wrong answer feedback */
.qopt-correct{border-color:var(--gr)!important;background:rgba(34,214,124,.08)!important;color:var(--gr)!important}
.qopt-wrong{border-color:var(--ro)!important;background:rgba(240,56,112,.08)!important;color:var(--ro)!important}
.qopt{width:100%;padding:12px 16px;border-radius:10px;text-align:left;font-size:13px;margin-bottom:8px;cursor:pointer;transition:all .15s;border:1px solid var(--ln);background:var(--s2);line-height:1.5}
.qopt:hover{border-color:var(--bl);background:rgba(79,142,247,.06);transform:translateX(3px)}

/* TENSES */
.tsb{width:185px;background:var(--s1);border-right:1px solid var(--ln);overflow-y:auto;flex-shrink:0;padding:8px 0;transition:width .2s ease}
.tsb.collapsed,.vsb.collapsed{width:0!important;overflow:hidden!important;border-right:none!important;padding:0!important;min-width:0!important}
.sb-toggle{position:absolute;top:10px;right:-14px;width:26px;height:26px;border-radius:50%;background:var(--s1);border:1px solid var(--ln);color:var(--t3);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.sb-toggle:hover{background:var(--s2);color:var(--t1)}
.sb-open-btn{padding:8px 6px;background:var(--s2);border:none;border-right:1px solid var(--ln);color:var(--t3);font-size:10px;cursor:pointer;writing-mode:vertical-lr;letter-spacing:1px;flex-shrink:0;display:none}
.sb-open-btn:hover{background:var(--s3);color:var(--t1)}
.tsb-h{padding:12px 14px 10px;border-bottom:1px solid var(--ln);margin-bottom:6px}
.tnb{display:block;width:100%;text-align:left;padding:7px 12px;border-left:3px solid transparent;font-size:11px;color:var(--t3);transition:all .12s}
.tnb.on{background:var(--s2)}
.tnb:hover{background:var(--s2)}
.tmain{flex:1;overflow-y:auto;padding:20px 24px}
.ttab{padding:6px 14px;border-bottom:2px solid transparent;font-size:11px;font-weight:500;color:var(--t3);cursor:pointer;transition:all .12s}
.ttab.on{border-bottom-color:var(--tc,var(--bl));color:var(--tc,var(--bl))}
.tqo{width:100%;padding:8px 12px;border-radius:6px;text-align:left;font-size:12px;font-family:monospace;margin-bottom:6px;cursor:pointer;transition:all .12s;border:1px solid var(--ln)}

/* GRAMMAR */
.gch{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:18px;cursor:pointer;transition:all .18s ease;margin-bottom:10px;position:relative;overflow:hidden}
.gch::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--vi);opacity:0;transition:opacity .15s}
.gch:hover{border-color:var(--ln2);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.gch:hover::before{opacity:1}
.geo{width:100%;padding:9px 12px;border-radius:7px;text-align:left;font-size:13px;margin-bottom:7px;cursor:pointer;transition:all .12s;border:1px solid var(--ln)}

/* WRITING */
.wtpl{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:18px;cursor:pointer;margin-bottom:10px;transition:all .18s ease;position:relative;overflow:hidden}
.wtpl::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--or);opacity:0;transition:opacity .15s}
.wtpl:hover{border-color:var(--ln2);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.wtpl:hover::before{opacity:1}

/* READING */
.rcard{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:18px;cursor:pointer;margin-bottom:10px;transition:all .18s ease;position:relative;overflow:hidden}
.rcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--tl);opacity:0;transition:opacity .15s}
.rcard:hover{border-color:var(--ln2);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.rcard:hover::before{opacity:1}
.rbody{font-size:14px;line-height:1.9;color:var(--t2)}
.rbody p{margin-bottom:14px}
.rbody strong{color:var(--t1)}
.rbody em{color:var(--tl);font-style:normal;cursor:pointer;border-bottom:1px dashed rgba(32,200,200,.4)}
.rqo{width:100%;padding:10px 14px;border-radius:7px;text-align:left;font-size:13px;margin-bottom:7px;cursor:pointer;transition:all .12s;border:1px solid var(--ln)}

/* SPEAKING */
.scard{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:18px;cursor:pointer;margin-bottom:10px;transition:all .18s ease;box-shadow:var(--shadow-sm)}
.scard:hover{border-color:var(--ln2);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.phrase-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--s2);border:1px solid var(--ln);border-radius:8px;margin-bottom:7px;cursor:pointer;transition:all .13s}
.phrase-item:hover{border-color:var(--ln2)}

/* TRACKER */
.trnav{display:flex;background:var(--s1);border-bottom:1px solid var(--ln);flex-shrink:0;overflow-x:auto}
.trnav::-webkit-scrollbar{display:none}
.trnbt{padding:8px 14px;border-bottom:2px solid transparent;font-size:11px;font-weight:500;color:var(--t3);white-space:nowrap;cursor:pointer;transition:all .15s}
.trnbt.on{border-bottom-color:var(--bl);color:var(--bl)}
.trcnt{flex:1;overflow-y:auto;padding:18px 20px;max-width:760px}
.trt{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;cursor:pointer;border:1px solid var(--ln);margin-bottom:8px;transition:all .18s ease;background:var(--s2)}
.trt:hover{border-color:var(--ln2);background:var(--s3)}
.trt.done{background:rgba(34,214,124,.05);border-color:rgba(34,214,124,.25)}
.trck{width:22px;height:22px;border-radius:50%;border:2px solid var(--t3);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .15s}
.trt.done .trck{background:var(--gr);border-color:var(--gr);color:#051a0a}
.hm{display:flex;flex-wrap:wrap;gap:3px}
.hmc{width:12px;height:12px;border-radius:2px}
.wlr{display:flex;gap:10px;padding:9px 12px;background:var(--s2);border:1px solid var(--ln);border-radius:8px;margin-bottom:6px;align-items:flex-start}

/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.ss{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:14px;text-align:center}
.ss-v{font-family:var(--fp);font-size:22px;font-weight:600;margin-bottom:3px}
.ss-l{font-size:9px;color:var(--t3);letter-spacing:1px}
.cbox{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r);padding:16px;margin-bottom:14px}

/* SETTINGS */
.setrow{display:flex;align-items:center;justify-content:space-between;padding:14px;background:var(--s1);border:1px solid var(--ln);border-radius:8px;margin-bottom:8px}
.tgl{width:44px;height:24px;background:var(--ln2);border-radius:12px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--gr)}
.tgl::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s}
.tgl.on::after{transform:translateX(20px)}

body.light{--bg:#f0f2f8;--s1:#fff;--s2:#f4f6fc;--s3:#e8eaf5;--s4:#dde0f0;--ln:#dde0f0;--ln2:#c5c8e8;--t1:#1a1b2e;--t2:#4a4b6a;--t3:#8a8baa}
body.light .c-ok{background:#edfaf4;border-color:#a3d9b8}
body.light .c-warn{background:#fffbf0;border-color:#e8d5a0}
body.light .c-info{background:#eef3ff;border-color:#a3b8e8}


/* ═══ LESSONS ═══ */
.lesson-card{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r2);padding:20px;margin-bottom:12px}
.lesson-step{display:flex;align-items:flex-start;gap:12px;padding:14px;background:var(--s2);border:1px solid var(--ln);border-radius:var(--r);margin-bottom:10px;transition:all .2s ease;box-shadow:var(--shadow-sm)}
.lesson-step.active{border-color:var(--bl);background:rgba(79,142,247,.06);box-shadow:0 0 0 1px rgba(79,142,247,.2),var(--shadow-sm)}
.lesson-step.done{background:rgba(34,214,124,.05);border-color:rgba(34,214,124,.25)}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;color:var(--t3)}
.lesson-step.active .step-num{background:var(--bl);color:#fff}
.lesson-step.done .step-num{background:var(--gr);color:#051a0a}
.xp-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;background:var(--am)1a;border:1px solid var(--am)33;color:var(--am);font-size:10px;font-weight:700}

/* ═══ BUILDER ═══ */
.builder-word{display:inline-flex;align-items:center;padding:8px 14px;background:var(--s2);border:1px solid var(--ln2);border-radius:8px;font-size:14px;cursor:pointer;margin:4px;transition:all .15s;user-select:none}
.builder-word:hover{background:var(--s3);border-color:var(--bl)}
.builder-word.used{opacity:.3;cursor:not-allowed}
.builder-word.selected{background:var(--bl)1a;border-color:var(--bl);color:var(--bl)}
.drop-zone{min-height:52px;background:var(--s2);border:2px dashed var(--ln2);border-radius:var(--r);padding:8px;display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-bottom:12px;transition:all .15s}
.drop-zone.has-words{border-color:var(--bl)44;background:var(--s3)}
.placed-word{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:var(--bl)1a;border:1px solid var(--bl)44;border-radius:7px;font-size:13px;cursor:pointer;color:var(--bl)}
.placed-word:hover{background:var(--ro)1a;border-color:var(--ro)44;color:var(--ro)}

/* ═══ ERROR TRACKER ═══ */
.err-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s2);border:1px solid var(--ln);border-radius:8px;margin-bottom:6px}
.err-count{width:28px;height:28px;border-radius:50%;background:var(--ro)1a;border:1px solid var(--ro)33;color:var(--ro);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}


/* ═══ COLLAPSIBLE SIDEBAR ═══ */
@media(min-width:701px){
  .tsb-hidden{width:0!important;overflow:hidden!important;border:none!important;padding:0!important;flex-shrink:0}
  .vsb-hidden{width:0!important;overflow:hidden!important;border:none!important;padding:0!important;flex-shrink:0}
}
@media(max-width:700px){
  .tsb-hidden{height:0!important;overflow:hidden!important;border:none!important;padding:0!important;min-height:0!important;margin:0!important}
  .vsb-hidden{height:0!important;overflow:hidden!important;border:none!important;padding:0!important;min-height:0!important;margin:0!important}
  .mobile-tsb-toggle,.mobile-vsb-toggle{display:inline-flex!important}
}

/* ═══ PWA / MOBILE ═══ */
@media(display-mode:standalone){
  #nav{padding-top:env(safe-area-inset-top,0px)}
  #cnt{padding-bottom:env(safe-area-inset-bottom,0px)}
}
/* Safe area for iPhone notch */
@supports(padding:env(safe-area-inset-top)){
  #nav{padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right))}
}
/* Touch improvements */
button,a,.card,.rcard,.scard,.gch,.wcard,.hcard{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
/* Prevent text selection on tap */
.tab,.btn,.vmb,.ttab,.trnbt{user-select:none;-webkit-user-select:none}
/* Smooth scroll on iOS */
.pnl,.fpnl,.vsb,.tsb{-webkit-overflow-scrolling:touch}
/* Larger touch targets on mobile */
.mobile-tsb-toggle,.mobile-vsb-toggle{display:none}
@media(max-width:700px){
  .mobile-tsb-toggle,.mobile-vsb-toggle{display:inline-flex!important}

  .tab{padding:8px 10px;font-size:10px}
  .btn{padding:10px 16px}
  .tck,.trck{width:26px;height:26px}
  .hcard{padding:16px}
  .hcard h3{font-size:14px}
  input,textarea,select{font-size:16px!important;max-width:100%} /* prevents iOS zoom */
}


/* ═══ MOBILE BOTTOM NAV ═══ */
#mobile-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:var(--s1);
  border-top:1px solid var(--ln);
  padding:6px 0 calc(6px + env(safe-area-inset-bottom,0px));
  z-index:1000;
  display:grid;grid-template-columns:repeat(5,1fr);
}
.mnb{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 4px;background:none;border:none;color:var(--t3);
  font-size:10px;cursor:pointer;transition:all .15s;
  -webkit-tap-highlight-color:transparent;border-radius:10px;
}
.mnb:active{background:var(--s2)}
.mnb.on{color:var(--bl)}
.mnb.on .mn-ic{transform:scale(1.1)}
.mn-ic{font-size:22px;line-height:1;transition:transform .15s}
.mn-lb{font-size:9px;font-weight:500;letter-spacing:.2px}

@media(min-width:701px){
  #mobile-nav{display:none!important}
  #mobile-more{display:none!important}
}

@media(max-width:700px){
  /* ═══ MOBILE SCROLL FIX ═══ */
  /* #cnt is the scrollable container on mobile */
  #cnt{
    overflow-y:auto!important;
    overflow-x:hidden!important;
    height:calc(100dvh - 44px - 56px)!important;
    -webkit-overflow-scrolling:touch;
  }
  /* Panels grow with content, don't restrict height */
  .pnl{
    height:auto!important;
    min-height:100%!important;
    overflow-y:visible!important;
    padding-bottom:100px!important;
  }
  /* Flex panels (Vocab, Tenses) */
  .fpnl{
    height:auto!important;
    min-height:100%!important;
    overflow-y:visible!important;
    padding-bottom:100px!important;
  }
  
  /* Nav bar */
  .tabs{display:none}
  #nav{height:44px;padding:0 12px}
  .brand-name{font-size:13px}
  .brand-sub{display:none}
  .xpw{display:none}
  #pwab{display:none!important}
  
  /* Bottom safe area — handled by height calc above */
  
  /* Sidebars → stack vertically */
  .vsb{width:100%!important;border-right:none;border-bottom:1px solid var(--ln);flex-direction:row;flex-wrap:wrap;max-height:none;overflow-x:auto;overflow-y:hidden;padding:6px}
  .vsb-h{padding:4px 8px!important;display:flex!important;align-items:center;gap:8px;min-width:fit-content}
  .vmb{padding:6px 10px;border-left:none;border-bottom:2px solid transparent;font-size:11px;flex-shrink:0;border-radius:20px}
  .vmb.on{background:var(--s3);border-bottom-color:var(--bl);border-radius:20px}
  .vm{overflow-y:visible!important;flex:1}
  
  /* Tenses sidebar */
  .tsb{width:100%!important;flex-direction:row;overflow-x:auto;overflow-y:hidden;padding:6px;border-right:none;border-bottom:1px solid var(--ln)}
  .tsb-h{padding:4px 8px!important;display:flex!important;align-items:center;justify-content:space-between;min-width:fit-content}
  .tnb{padding:6px 12px;border-left:none;border-bottom:2px solid transparent;white-space:nowrap;font-size:11px}
  .tmain{padding:14px;overflow-y:visible!important}
  
  /* Tracker nav */
  .trnav{overflow-x:auto}
  .trnbt{font-size:10px;padding:8px 10px;white-space:nowrap}
  .trcnt{padding:12px}
  
  /* Grids → single column */
  .g2,.g3,.g4,.g5{grid-template-columns:1fr!important}
  .sgrid{grid-template-columns:repeat(2,1fr)!important}
  .hstats{grid-template-columns:repeat(3,1fr)!important}
  .hgrid{grid-template-columns:1fr!important}
  
  /* Cards */
  .card,.card2{padding:12px}
  .sec{padding:16px 14px 100px!important}
  
  /* Quiz */
  .qcard{padding:16px}
  
  /* Stats grid */
  .sgrid{grid-template-columns:repeat(2,1fr)}
  
  /* Heatmap smaller cells */
  .hmc{width:9px;height:9px}
  
  /* Conversations sidebar in Speaking */
  .phrase-item{padding:8px 10px}
  
  /* Sentence builder words */
  .builder-word{padding:6px 10px;font-size:13px}
  .placed-word{padding:5px 10px;font-size:12px}
  
  /* Buttons full width in some contexts */
  .qcard .btn{width:100%;justify-content:center}
  /* Quiz card bottom padding */
  .qcard{padding-bottom:80px!important}
  /* Ensure forms have bottom padding */
  form,.form{padding-bottom:80px}
  
  /* Font sizes */
  .fp.f32{font-size:24px!important}
  .fp.f24{font-size:20px!important}
  .fp.f20{font-size:17px!important}
  .fp.f18{font-size:15px!important}
  .fp.f16{font-size:14px!important}
  
  /* fpnl = flex panels need height adjustment */
  .fpnl{flex-direction:column;overflow-y:auto;height:auto}
  .fpnl .vm,.fpnl .tmain{overflow-y:visible;flex:none;min-height:300px}
  
  /* Home cards */
  .hcard{padding:14px}
  .hcard h3{font-size:13px}
  .hcard p{font-size:11px}
  
  /* Modal sheets */
  #fo-modal>div,#er-modal>div,#il-modal>div,#cefr-modal>div,
  #weekly-modal>div,#ea-modal>div,#onboard-modal>div,#apikey-modal>div,
  #placement-modal>div,#lb-modal>div,#cert-modal>div,#quick-modal>div,
  #pron-modal>div,#email-improve-modal>div,#celeb-modal>div{
    max-width:100%!important;
    border-radius:20px 20px 0 0!important;
    position:absolute;bottom:0;left:0;right:0;
    max-height:88vh;overflow-y:auto;
    padding-bottom:calc(24px + env(safe-area-inset-bottom,0px))!important;
  }
  #fo-modal,#er-modal,#il-modal,#cefr-modal,
  #weekly-modal,#ea-modal,#onboard-modal,#apikey-modal,
  #placement-modal,#lb-modal,#cert-modal,#quick-modal,
  #pron-modal,#email-improve-modal,#celeb-modal{
    align-items:flex-end!important;
  }
  
  /* AI Conversation */
  #chat-hist{max-height:220px}
}

@keyframes streakPop{0%{transform:scale(1)}30%{transform:scale(1.4) rotate(-5deg)}60%{transform:scale(1.2) rotate(3deg)}100%{transform:scale(1)}}
@keyframes streakGlow{0%,100%{box-shadow:0 0 8px rgba(246,188,24,.4)}50%{box-shadow:0 0 24px rgba(246,188,24,.8),0 0 40px rgba(242,112,48,.3)}}
.streak-fire{display:inline-block;animation:streakPop .6s ease,streakGlow 2s ease 0.6s infinite}
@keyframes xpFloat{0%{transform:translateY(0);opacity:1}80%{transform:translateY(-50px);opacity:.4}100%{transform:translateY(-60px);opacity:0}}
.xp-float{animation:xpFloat .9s ease forwards;position:fixed;font-size:14px;font-weight:700;color:var(--am);pointer-events:none;z-index:9999;text-shadow:0 2px 8px rgba(246,188,24,.5)}
.more-item-new{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--s2);border:1px solid var(--ln);border-radius:10px;cursor:pointer;color:var(--t2);text-align:left;transition:all .15s}
.more-item-new:hover{background:var(--s3);border-color:var(--ln2);transform:translateY(-1px);color:var(--t1)}
@keyframes celebPop{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
</style>

/* ══ QUIZ TIMER ══ */
let _qTimer = null;
function startQTimer(secs, onTick, onEnd){
  stopQTimer();
  let remaining = secs||0;
  if(onTick) onTick(remaining);
  if(!secs){ if(onEnd) onEnd(); return; }
  _qTimer = setInterval(()=>{
    remaining--;
    if(onTick) onTick(remaining);
    if(remaining<=0){ stopQTimer(); if(onEnd) onEnd(); }
  }, 1000);
}
function stopQTimer(){
  if(_qTimer){ clearInterval(_qTimer); _qTimer=null; }
}

const DB={
  get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
  delete:(k)=>{try{localStorage.removeItem(k)}catch{}},
  clear:(prefix='')=>{try{Object.keys(localStorage).filter(k=>k.startsWith(prefix)).forEach(k=>localStorage.removeItem(k))}catch{}}
};

/* ══ SPEECH API ══ */
function speak(text,lang='en-GB'){
  if(!text||!text.trim())return;
  // Android native TTS bridge
  if(window.AndroidTTS){
    try{
      if(window.AndroidTTS.isReady&&!window.AndroidTTS.isReady()){
        // TTS not ready yet - retry after 1s
        setTimeout(()=>speak(text,lang),1000);
        return;
      }
      window.AndroidTTS.speak(text.substring(0,400));
    }catch(e){console.log('TTS error:',e);}
    return;
  }
  // Web Speech API
  if(!window.speechSynthesis)return;
  try{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text.substring(0,400));
    u.lang=lang;u.rate=0.85;u.pitch=1;u.volume=1;
    // Non-blocking voice selection
    requestAnimationFrame(()=>{
      try{
        const voices=window.speechSynthesis.getVoices();
        if(voices.length){
          const en=voices.find(v=>v.lang.startsWith('en-GB'))
            ||voices.find(v=>v.lang.startsWith('en-US'))
            ||voices.find(v=>v.lang.startsWith('en'));
          if(en)u.voice=en;
          window.speechSynthesis.speak(u);
        } else {
          // Wait for voices to load
          window.speechSynthesis.onvoiceschanged=function(){
            this.onvoiceschanged=null;
            const vs=window.speechSynthesis.getVoices();
            const en=vs.find(v=>v.lang.startsWith('en-GB'))||vs.find(v=>v.lang.startsWith('en'))||vs[0];
            if(en)u.voice=en;
            window.speechSynthesis.speak(u);
          };
          setTimeout(()=>{
            if(!window.speechSynthesis.speaking)window.speechSynthesis.speak(u);
          },600);
        }
      }catch(e){}
    });
  }catch(e){}
}


/* ══ AI API HELPER ══ */
function getAPIKey(){
  const stored=DB.get('anthropic_key','');
  if(stored)return stored;
  // Default key (replace with your own in Settings)
  return '';
}

function hasAPIKey(){
  return !!getAPIKey();
}

async function callAI(promptOrUser, systemOrExtra, messagesOrTokens){
  const key = getAPIKey();
  if(!key){ showAPIKeyModal(); throw new Error('NO_API_KEY'); }

  // Support two call styles:
  // Style A (simple): callAI(userPrompt) or callAI(userPrompt, systemPrompt)
  // Style B (conversation): callAI(userText, systemPrompt, historyArray)
  let system = 'You are a helpful English learning assistant.';
  let messages = [];
  let maxTokens = 800;

  if(Array.isArray(messagesOrTokens)){
    // Style B: conversation with history
    system = systemOrExtra || system;
    const history = messagesOrTokens;
    messages = [...history, {role:'user', content: promptOrUser}];
  } else if(typeof messagesOrTokens === 'number'){
    // Style A with custom maxTokens
    system = systemOrExtra || system;
    messages = [{role:'user', content: promptOrUser}];
    maxTokens = messagesOrTokens;
  } else {
    // Style A: simple prompt
    system = systemOrExtra || system;
    messages = [{role:'user', content: promptOrUser}];
  }

  const response = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens: maxTokens,
      system: system,
      messages: messages
    })
  });

  if(!response.ok){
    const err = await response.json().catch(()=>({error:{message:'Unknown error'}}));
    if(response.status===401){
      DB.set('anthropic_key','');
      showAPIKeyModal('invalid');
      throw new Error('INVALID_KEY');
    }
    throw new Error(err.error?.message||'API error '+response.status);
  }

  const data = await response.json();
  return data.content?.[0]?.text||'';
}

const LVLS=[
  {n:'Beginner',x:0},{n:'Elementary',x:150},{n:'Pre-Intermediate',x:400},
  {n:'Intermediate',x:800},{n:'Upper-Intermediate',x:1400},{n:'Advanced',x:2200},
  {n:'Proficient',x:3200},{n:'Expert',x:4500},{n:'Master',x:6000},{n:'Legend',x:8000}
];
function getXP(){return DB.get('xp',0)}
function addXP(n){
  const streak=calcStreak();
  const mult=streak>=14?1.5:streak>=7?1.25:streak>=3?1.1:1;
  n=Math.round(n*mult);
  const old=getXP(),nw=old+n;DB.set('xp',nw);
  if(getLv(nw)>getLv(old))showAch('🎉 Level Up! '+LVLS[getLv(nw)].n);
  updXP();
  // Floating XP indicator for big gains
  if(n>=8){
    const fl=document.createElement('div');
    fl.className='xp-float';
    fl.textContent='+'+n+' XP ⭐';
    fl.style.left=(window.innerWidth/2-36)+'px';
    fl.style.top=(window.innerHeight*0.55)+'px';
    document.body.appendChild(fl);
    setTimeout(()=>fl.remove(),900);
  }
}
function getLv(x){let l=0;for(let i=0;i<LVLS.length;i++)if(x>=LVLS[i].x)l=i;return l}
function updXP(){
  const x=getXP(),lv=getLv(x),ld=LVLS[lv];
  const nx=LVLS[lv+1]?LVLS[lv+1].x:ld.x+2000;
  const p=Math.min(((x-ld.x)/(nx-ld.x))*100,100);
  document.getElementById('xp-lv').textContent='Lv '+(lv+1);
  document.getElementById('xp-txt').textContent=x+' XP';
  document.getElementById('xp-f').style.width=p+'%'
}

function getCurrentStage(){
  for(let i=0;i<LEARNING_PATH.length;i++){
    if(!LEARNING_PATH[i].milestones.every(m=>m.check()))return i;
  }
  return LEARNING_PATH.length-1;
}

function getLearningPathHTML(){
  const current=getCurrentStage();
  return '<div class="card mb12"><div class="sl mb10">📈 LEARNING PATH</div>'
    +LEARNING_PATH.map((stage,i)=>{
      const done=stage.milestones.every(m=>m.check());
      const active=i===current;
      const prog=stage.milestones.filter(m=>m.check()).length;
      const pct=Math.round(prog/stage.milestones.length*100);
      const col=stage.col;
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;'+(i<LEARNING_PATH.length-1?'border-bottom:1px solid var(--ln)':'')+';opacity:'+(i>current+1?.4:1)+'">'

function checkStreakWarning(){
  const streak=calcStreak();
  if(streak<3)return;
  const today=todayK();
  const comp=DB.get('comp',{});
  if((comp[today]||[]).length>0)return;
  if(DB.get('streak_warned','')=== today)return;
  DB.set('streak_warned',today);
  setTimeout(()=>{
    const banner=document.createElement('div');
    banner.style.cssText='position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:9997;animation:fadeUp .3s ease;white-space:nowrap';

/* ══ HELPERS ══ */
function todayK(){return new Date().toISOString().split('T')[0]}
function getLast90(){const d=[];for(let i=89;i>=0;i--){const x=new Date();x.setDate(x.getDate()-i);d.push(x.toISOString().split('T')[0])}return d}
function getLast7(){const d=[];for(let i=6;i>=0;i--){const x=new Date();x.setDate(x.getDate()-i);d.push(x.toISOString().split('T')[0])}return d}
function calcStreak(){
  const comp=DB.get('comp',{});let s=0;const d=new Date();
  // Any activity counts for streak (≥1 task)
  if((comp[todayK()]||[]).length<1)d.setDate(d.getDate()-1);
  while(true){const k=d.toISOString().split('T')[0];if((comp[k]||[]).length<1)break;s++;d.setDate(d.getDate()-1)}
  return s
}

function getAllW(){
  let av=[];
  try{if(typeof AVIATION_VOCAB!=='undefined'&&DB.get('av_enabled',false))av=AVIATION_VOCAB;}catch(e){}
  const cust=[];
  try{if(typeof getCustomWords==='function')cust.push(...getCustomWords());}catch(e){}
  return [...WORDS,...DB.get('customW',[]),...DB.get('custom_words',[]),...cust,...av];
}
function getWB(){return DB.get('wb',{})}
function getWS(id){return getWB()[id]||{sc:0,st:0,nr:0,seen:0}}
function setWS(id,correct){
  const wb=getWB(),old=wb[id]||{sc:0,st:0,nr:0,seen:0};
  // SM-2 intervals: wrong=10min, then 1/3/7/14/30 days
  const SM_MS=[600000,86400000,259200000,604800000,1209600000,2592000000];
  const ns=correct?Math.min(old.st+1,5):0;
  // sc is ALWAYS integer — hesitation affects interval only, not score
  const sc=correct?Math.min(5,old.sc+1):Math.max(0,old.sc-1);
  const errors=DB.get('errors',{});
  const errCount=(errors[id]?.count||0);
  // Hesitation penalty: slow answers get shorter interval (repeat sooner)
  const hpen=correct?(typeof getHesitationPenalty==='function'?getHesitationPenalty():0):0;
  let nextMs=SM_MS[Math.max(0,ns-hpen)]; // reduce interval index, not score
  if(!correct && errCount>=3) nextMs=300000;
  else if(!correct && errCount>=2) nextMs=600000;
  wb[id]={sc,st:ns,nr:Date.now()+nextMs,seen:(old.seen||0)+1};
  DB.set('wb',wb);
  if(correct){addXP(sc>=3?15:sc>=1?10:8);}
  else{addXP(2);trackError(id,'vocab');}
}
function learnedW(){return getAllW().filter(w=>getWS(w.id).sc>=3)}
function dueW(){
  const n=Date.now();
  return getAllW().filter(w=>{
    const s=getWS(w.id);
    // Due if: seen before AND (nextReview passed OR score < 3 and not seen today)
    if(s.seen===0)return false;
    if(s.nr<=n)return true;
    return false;
  });
}
function sortedW(cat='all'){
  const pool=cat==='all'?getAllW():getAllW().filter(w=>w.cat===cat);
  const n=Date.now();
  return[...pool].sort((a,b)=>{
    const pa=getWS(a.id),pb=getWS(b.id);
    const ad=pa.nr<=n?0:1,bd=pb.nr<=n?0:1;
    if(ad!==bd)return ad-bd;if(pa.sc!==pb.sc)return pa.sc-pb.sc;return pa.seen-pb.seen
  })
}

function startQ(el,mode){
  const cat=VS.cat==='all'?'all':VS.cat;
  // Check for saved session
  const saved=DB.get('quiz_session',null);
  if(saved&&saved.mode===mode&&saved.cat===cat&&saved.sess&&saved.sess.length>0&&saved.idx<saved.sess.length){
    // Resume saved session - verify words still exist
    const allIds=new Set(getAllW().map(w=>w.id));
    if(saved.sess.every(w=>allIds.has(w.id))){
      VS.q=saved;rQCard(el);return;
    }
  }
  // Smart selection: 70% due/weak + 30% new unseen
  const allPool=sortedW(cat);
  const duePool=allPool.filter(w=>{const s=getWS(w.id);return s.seen>0&&s.nr<=Date.now();});
  const weakPool=allPool.filter(w=>{const s=getWS(w.id);return s.seen>0&&s.sc<3&&s.nr>Date.now();});
  const newPool=allPool.filter(w=>getWS(w.id).seen===0);
  // Build session: prioritize due → weak → new
  const sess=[...duePool.slice(0,4),...weakPool.slice(0,3),...newPool.slice(0,3)].slice(0,10);
  const finalSess=sess.length>=5?sess:allPool.slice(0,10);
  LIVES=MAX_LIVES;VS.q={mode,cat,sess:finalSess,idx:0,res:[],fl:false,opts:[],sel:-1,fill:'',fd:false};
  if(!VS.q.sess.length){el.innerHTML=`<div style="text-align:center;padding:40px"><div class="f16 c2">Ξεκίνα να μαθαίνεις λέξεις! <button class="btn bp bsm" onclick="VS.mode='add';rVocab()">Προσθήκη</button></div></div>`;return;}
  DB.set('quiz_session',{mode,cat,sess:VS.q.sess,idx:0,res:[],fl:false,opts:[],sel:-1,fill:'',fd:false});
  rQCard(el);
}

  return[...getAllW().filter(x=>x.id!==w.id).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.g),w.g].sort(()=>Math.random()-.5)

function vMCQ(i){
  if(VS.q.sel>=0)return;
  VS.q.sel=i;
  const vm=document.getElementById('vm');vm&&rQCard(vm);
  const correct=VS.q.opts[i]===VS.q.sess[VS.q.idx].g;
  if(correct){
    setTimeout(()=>vRec(correct,VS.q.opts[i]||''),900);
  }
  // Wrong: user taps "→ Επόμενο" button (vNextWrong)
}
function vNextWrong(){
  const cw=VS.q.sess[VS.q.idx];
  const opt=VS.q.opts[VS.q.sel]||'';
  setWS(cw.id,false);
  trackError(cw.id,VS.q.mode);
  if(loseHeart())return;
  VS.q.res.push({word:cw,correct:false});
  const today=todayK();
  DB.set('wcount_'+today,(DB.get('wcount_'+today,0)+1));
  const nxt=VS.q.idx+1;
  if(nxt>=VS.q.sess.length){showQRes(document.getElementById('vm'));return;}
  VS.q.idx=nxt;VS.q.fl=false;VS.q.opts=[];VS.q.sel=-1;VS.q.fill='';VS.q.fd=false;
  DB.set('quiz_session',{...VS.q});
  rQCard(document.getElementById('vm'));
}

function vRec(correct, userInput){
  const cw=VS.q.sess[VS.q.idx];
  // Typo detection: if wrong but very close (edit distance ≤2), treat as correct
  let isTypo=false;
  if(!correct&&userInput&&typeof levenshtein==='function'){
    const dist=levenshtein(userInput.trim().toLowerCase(),(cw.w||'').toLowerCase());
    if(dist<=2&&dist>0){isTypo=true;correct=true;toast('👀 Σχεδόν σωστό — typo ανιχνεύτηκε! "'+cw.w+'"','var(--am)');}
  }
  setWS(cw.id,correct);
  if(!correct){trackError(cw.id,VS.q.mode);if(loseHeart())return;}
  VS.q.res.push({word:cw,correct,typo:isTypo});
  const lc=learnedW().length;
  if(VS.q.res.length===1&&getWS(cw.id).seen===1)unlockAch('w1');
  if(lc>=10)unlockAch('w10');if(lc>=50)unlockAch('w50');if(lc>=100)unlockAch('w100');if(lc>=200)unlockAch('w200');
  // Update daily tracker word count
  const today=todayK();
  const wCount=DB.get('wcount_'+today,0)+1;
  DB.set('wcount_'+today,wCount);
  const nxt=VS.q.idx+1;
  if(nxt>=VS.q.sess.length){DB.delete?DB.delete('quiz_session'):localStorage.removeItem('quiz_session');showQRes(document.getElementById('vm'));return;}
  VS.q.idx=nxt;VS.q.fl=false;VS.q.opts=[];VS.q.sel=-1;VS.q.fill='';VS.q.fd=false;
  DB.set('quiz_session',{...VS.q});
  rQCard(document.getElementById('vm'))
}

let TST={idx:0,tab:'theory',qa:{},qs:false,qsc:null,ta:{},tc:{},te:{},ts:{},tips:false,cmp:0};

function rTenses(){
  const el=document.getElementById('tenses');

    <div class="tsb ${isOpen?'':'tsb-hidden'}" id="tsb"></div>
    <div class="tmain fu" id="tmn"></div>

  rTM();
}

      <button onclick="DB.set('tsb_open',false);rTenses()" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:2px 6px">✕</button>

  </div>
  ${TENSES.map((t,i)=>{
    const _tDone=DB.get('tDone',[]);const done=_tDone.includes(t.id)||_tDone.includes(TENSES.indexOf(t));
    return `<button class="tnb ${TST.idx===i?'on':''}" onclick="TST.idx=${i};TST.tab='theory';resetTQ();rTM();buildTSB()" style="border-left-color:${TST.idx===i?t.col:'transparent'}">

    <div class="f10 c3 mb6">Confusable Pairs</div>

      `<button onclick="TST.idx='${id}';TST.tab='theory';rTM();buildTSB()" class="f10 c3 mb4" style="display:block;text-align:left;background:none;border:none;cursor:pointer;padding:2px 0;color:${TST.idx===id?'var(--vi)':'var(--t3)'}">⚡ ${label}</button>`
    ).join('')}
  </div>`;
}


function submitTensesQuiz(){
  const t=TENSES[TST.idx]||TENSES[0];
  const allA=Object.keys(TST.qa).length>=t.quiz.length;
  if(!allA){toast('Απάντησε σε όλες τις ερωτήσεις πρώτα!','var(--am)');return;}
  let sc=0;
  t.quiz.forEach((q,i)=>{if(TST.qa[i]===q.a)sc++;});
  TST.qsc=sc;TST.qs=true;
  addXP(sc*5);
  const tPct=Math.round(sc/t.quiz.length*100);
  const td=DB.get('tDone',[]);
  const _tid=t.id??TST.idx;
  if(!td.includes(_tid)){td.push(_tid);DB.set('tDone',td);}
  unlockAch('t1');if(td.length>=9)unlockAch('t9');
  if(tPct===100){
    setTimeout(()=>showCelebration('🏆 '+t.name+'!','Τέλειο σκορ! '+sc+'/'+t.quiz.length+' απαντήσεις.',sc*5,
      'TST.idx=(TST.idx+1)%TENSES.length;TST.tab=\'theory\';resetTQ();rTM()','Επόμενος χρόνος'),400);
  } else if(tPct>=60){
    setTimeout(()=>showCelebration(t.name+' — Καλά!',sc+'/'+t.quiz.length+' σωστές. Συνέχισε!',sc*5,null,null),400);
  } else {
    toast('Quiz: '+sc+'/'+t.quiz.length+' — +'+sc*5+' XP','var(--bl)');
  }
  addXP(sc*5);
  rTM();
}

    ${t.theory||''}
    
    <!-- TIPS -->
    <div class="card mb10"><div class="sl mb8 cam">💡 ΣΗΜΑΝΤΙΚΕΣ ΠΑΡΑΤΗΡΗΣΕΙΣ</div>
    ${t.tips.map(tip=>`<div class="f12 c2 mb6" style="padding:6px 10px;background:var(--s2);border-radius:6px;border-left:3px solid var(--am)">⚡ ${tip}</div>`).join('')}
    </div>
    
    <!-- COMMON MISTAKES -->
    <div class="card"><div class="sl mb8 cro">✗ ΣΥΧΝΑ ΛΑΘΗ ΕΛΛΗΝΩΝ</div>
    ${t.mistakes.map(m=>`<div class="mb8 p8" style="background:var(--s2);border-radius:8px;padding:8px 10px">
      <div class="f12 cro mb1">✗ ${m.wrong}</div>
      <div class="f12 cgr mb1">✓ ${m.right}</div>
      <div class="f10 c3">→ ${m.why}</div>
    </div>`).join('')}
    </div>`;
    
  } else if(TST.tab==='forms'){
    body=`<div class="card mb10 fu"><div class="sl mb10" style="color:${t.col}">ΤΥΠΟΙ — HOW TO FORM IT</div>
    ${t.forms.map(([label,form])=>`<div style="margin-bottom:12px;padding:10px;background:var(--s2);border-radius:8px">
      <div class="f11 b mb4" style="color:${t.col}">${label}</div>
      <div class="f13" style="font-family:monospace;color:var(--t1)">${form}</div>
    </div>`).join('')}
    </div>
    <div class="card"><div class="sl mb8">🔑 SIGNAL WORDS</div>
    <div class="fx fw g6">${t.kw.map(k=>`<span class="tag f10" style="background:${t.col}1a;border:1px solid ${t.col}33;color:${t.col}">${k}</span>`).join('')}</div>
    </div>`;
    
  } else if(TST.tab==='ex'){
    const exArr=t.examples||t.ex||[];
    body=exArr.map((e,i)=>`<div class="card mb8 fu">
      <div class="fx ac g10">
        <span class="fp f13 b" style="color:${t.col};min-width:20px">${i+1}</span>
        <div style="flex:1">
          <div class="f14 mb4" style="line-height:1.6">${e}</div>
          <button onclick="speak('${e.replace(/'/g,"\\'")}','en-GB')" style="background:none;border:1px solid var(--tl)44;border-radius:20px;padding:3px 10px;color:var(--tl);font-size:11px;cursor:pointer">🔊 Άκουσε</button>
        </div>
      </div>
    </div>`).join('');
    
  } else if(TST.tab==='irreg'){
    const irreg=t.irreg||[];
    if(!irreg.length){body=`<div class="card c-info"><div class="f12 c2">Δεν υπάρχουν ανώμαλα ρήματα για αυτόν τον χρόνο.</div></div>`;}
    else {
      const isTenseUsingV2=t.name.includes('Past')&&!t.name.includes('Perfect');
      const isTenseUsingV3=t.name.includes('Perfect')||t.name.includes('Passive');
      body=`<div class="card mb10"><div class="sl mb8 cam">📋 ΑΝΩΜΑΛΑ ΡΗΜΑΤΑ — ${t.name.toUpperCase()}</div>
        <div class="f11 c3 mb10">Κλίκ για προφορά · V1=Base · V2=Simple Past · V3=Past Participle</div>
        <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <tr style="background:var(--s2)">
            <th style="padding:7px 10px;text-align:left;color:var(--t3)">V1 (Base)</th>
            <th style="padding:7px 10px;text-align:left;color:${isTenseUsingV2?'var(--am)':'var(--t3)'}">V2 (Past)</th>
            <th style="padding:7px 10px;text-align:left;color:${isTenseUsingV3?'var(--vi)':'var(--t3)'}">V3 (Participle)</th>
            <th style="padding:7px 10px;text-align:left;color:var(--t3)">Ελληνικά</th>
          </tr>
          ${irreg.map(v=>`<tr style="border-top:1px solid var(--ln);cursor:pointer" onclick="speak('${v.v1}','en-GB')">
            <td style="padding:6px 10px;font-weight:600;color:var(--t1)">${v.v1} 🔊</td>
            <td style="padding:6px 10px;color:${isTenseUsingV2?'var(--am)':'var(--t2)'};font-weight:${isTenseUsingV2?'700':'400'}">${v.v2||v.v1+'ed'}</td>
            <td style="padding:6px 10px;color:${isTenseUsingV3?'var(--vi)':'var(--t2)'};font-weight:${isTenseUsingV3?'700':'400'}">${v.v3||v.v1+'ed'}</td>
            <td style="padding:6px 10px;color:var(--t3);font-size:11px">${v.gr}${v.note?'<br><span style="color:var(--am);font-size:10px">💡 '+v.note+'</span>':''}</td>
          </tr>`).join('')}
        </table></div>
      </div>
      <div class="card c-info mt10">
        <div class="sl mb6 cbl">📌 ΠΟΙΑ ΣΤΗΛΗ ΧΡΗΣΙΜΟΠΟΙΩ;</div>
        <div class="f12 c2" style="line-height:1.8">
          <strong style="color:var(--bl)">V1 (Base):</strong> Present Simple, will/going to, modals<br>
          <strong style="color:var(--am)">V2 (Past):</strong> Simple Past ✓ — μόνο αυτή η στήλη<br>
          <strong style="color:var(--vi)">V3 (Participle):</strong> Present Perfect (have+V3), Past Perfect (had+V3), Passive (be+V3)
        </div>
      </div>`;
    }

  } else if(TST.tab==='prep'){
    const prep=t.prep||[];
    body=`<div class="card mb10"><div class="sl mb8 cam">⏰ TIME PREPOSITIONS — ${t.name.toUpperCase()}</div>
      ${prep.map(p=>`<div style="padding:10px;background:var(--s2);border-radius:8px;margin-bottom:8px">
        <div class="fx ac g8 mb6">
          <span class="tag f11" style="background:var(--am)1a;border:1px solid var(--am)33;color:var(--am);font-weight:700">${p.prep}</span>
          <span class="f11 c3">${p.use}</span>
        </div>
        <div class="fx fw g4">${p.ex.map(e=>`<span onclick="speak('${e.replace(/'/g,"\\'")}','en-GB')" style="padding:3px 8px;background:var(--s1);border:1px solid var(--ln);border-radius:20px;font-size:11px;cursor:pointer;color:var(--t2)">${e} 🔊</span>`).join('')}</div>
      </div>`).join('')}
    </div>`;

  } else if(TST.tab==='worder'){
    const wo=t.worder||{};
    body=`<div style="display:grid;grid-template-columns:1fr;gap:12px">
      <div class="card" style="border-color:var(--gr)33">
        <div class="sl mb6 cgr">➕ ΚΑΤΑΦΑΤΙΚΟ</div>
        <div class="f13" style="font-family:monospace;color:var(--t1);white-space:pre-line">${wo.pos||'—'}</div>
      </div>
      <div class="card" style="border-color:var(--ro)33">
        <div class="sl mb6 cro">➖ ΑΡΝΗΤΙΚΟ</div>
        <div class="f13" style="font-family:monospace;color:var(--t1);white-space:pre-line">${wo.neg||'—'}</div>
      </div>
      <div class="card" style="border-color:var(--bl)33">
        <div class="sl mb6 cbl">❓ ΕΡΩΤΗΜΑΤΙΚΟ</div>
        <div class="f13" style="font-family:monospace;color:var(--t1);white-space:pre-line">${wo.q||'—'}</div>
      </div>
      ${wo.tricks?`<div class="card" style="border-color:var(--am)33">
        <div class="sl mb8 cam">💡 TRICKS & ΠΑΓΙΔΕΣ</div>
        ${wo.tricks.map(tr=>`<div class="f12 c2 mb6" style="padding:6px 10px;background:var(--s2);border-left:3px solid var(--am);border-radius:0 6px 6px 0">${tr}</div>`).join('')}
      </div>`:''}
    </div>`;

  } else if(TST.tab==='qform'){
    const qf=t.qform||[];
    body=`<div class="card mb10"><div class="sl mb10 cbl">❓ ΣΧΗΜΑΤΙΣΜΟΣ ΕΡΩΤΗΣΕΩΝ — ${t.name.toUpperCase()}</div>
      ${qf.map(q=>`<div style="margin-bottom:14px;padding:12px;background:var(--s2);border-radius:10px;border-left:3px solid var(--bl)">
        <div class="f11 b mb4" style="color:var(--bl)">${q.type}</div>
        <div class="f12 mb6" style="font-family:monospace;color:var(--am)">${q.formula}</div>
        ${q.examples.map(e=>`<div class="f12 c2 mb2" style="padding:4px 8px;background:var(--s1);border-radius:6px">→ ${e} <button onclick="speak('${e.replace(/'/g,"\\'")}','en-GB')" style="background:none;border:none;color:var(--tl);cursor:pointer;font-size:10px">🔊</button></div>`).join('')}
      </div>`).join('')}
    </div>`;

  } else if(TST.tab==='tr'){
    const trArr=t.tr||[];
    if(!trArr.length){
      body=`<div class="card c-info"><div class="f12 c2">Χρησιμοποίησε τα παραδείγματα από τη Θεωρία για μετάφραση!</div></div>`;
    } else {
      body=`<div class="f12 c2 mb14">Μετέφρασε στα αγγλικά:</div>`+
      trArr.map((tr,i)=>`<div class="card mb10">
        <div class="f13 b mb6" style="color:var(--t1)">${tr.gr}</div>
        <div class="f10 c3 mb8" style="color:var(--am)">💡 ${tr.hint}</div>
        ${TST.ta[i]!==undefined?`
          <div style="padding:8px;background:${TST.ta[i]===tr.en.toLowerCase()||levenshtein(TST.ta[i].toLowerCase(),tr.en.toLowerCase())<=3?'rgba(34,214,124,.06)':'rgba(79,142,247,.06)'};border-radius:6px;margin-bottom:6px">
            <div class="f12 mb2">Απάντησές σου: ${TST.ta[i]}</div>
            <div class="f12 cgr">✓ ${tr.en}</div>
          </div>
        `:`<div class="fx ac g8">
          <input id="tr_${i}" placeholder="Type in English..." style="flex:1;padding:8px;background:var(--s2);border:1px solid var(--ln);border-radius:6px;color:var(--t1);font-size:13px" onkeydown="if(event.key==='Enter'){TST.ta[${i}]=this.value.trim();rTM();}">
          <button onclick="TST.ta[${i}]=document.getElementById('tr_${i}').value.trim();rTM()" class="btn bp bsm">✓</button>
        </div>`}
      </div>`).join('');
    }
    
  } else if(TST.tab==='quiz'){
    const allA=Object.keys(TST.qa).length>=t.quiz.length;
    if(TST.qs){
      let sc=0;
      t.quiz.forEach((q,i)=>{if(TST.qa[i]===q.a)sc++;});
      const pct=Math.round(sc/t.quiz.length*100);
      body=`<div class="tc mb16">
        <div class="fp f32 b mb4" style="color:${pct>=80?'var(--gr)':pct>=50?'var(--am)':'var(--ro)'}">${sc}/${t.quiz.length}</div>
        <div class="f12 c3">${pct>=80?'Εξαιρετικά! ✓':pct>=50?'Καλά — συνέχισε!':'Δοκίμασε ξανά!'}</div>
      </div>`+
      t.quiz.map((q,i)=>{
        const ua=TST.qa[i],correct=ua===q.a;
        return `<div class="card mb8 ${correct?'c-ok':'c-err'}">
          <div class="f12 b mb6">${i+1}. ${q.q}</div>
          <div class="f12 ${correct?'cgr':'cro'} mb2">${correct?'✓':'✗'} ${ua||'—'}</div>
          ${!correct?`<div class="f11 cgr mb2">✓ ${q.a}</div>`:''}
          <div class="f10 c3">${q.exp}</div>
          ${!correct&&typeof explainAnswer==='function'?renderEMAButton(q.q,ua||'',q.a,t.name):''}
        </div>`;
      }).join('')+
      `<button onclick="resetTQ();rTM()" class="btn bgh w100 mt10" style="justify-content:center">🔄 Ξανά</button>`;
    } else {
      const qrows=t.quiz.map((q,i)=>{
        const qi=i;
        const opts=q.opts.map((opt,j)=>{
          let bg='var(--s2)',br='var(--ln)',col='var(--t2)';
          if(TST.qa[qi]===opt){bg='var(--s3)';br=t.col;col=t.col;}
          if(TST.qs){if(opt===q.a){bg='#051a0a';br='#22c77a44';col='var(--gr)';}else if(TST.qa[qi]===opt){bg='#1a0508';br='#f0387044';col='var(--ro)';}}
          return `<button class="tqo" onclick="if(!TST.qs){TST.qa[${qi}]='${opt.replace(/'/g,"\\'")}';rTM()}" style="background:${bg};border-color:${br};color:${col}">${opt}</button>`;
        }).join('');
        return `<div class="card mb10 fu"><div class="f13 mb10" style="line-height:1.6"><span class="fp f12 b" style="color:${t.col};margin-right:6px">${i+1}.</span>${q.q}</div><div class="g2 mb8">${opts}</div>
        ${TST.qs?`<div class="f11"><span style="color:${TST.qa[qi]===q.a?'var(--gr)':'var(--ro)'}">` +
        `${TST.qa[qi]===q.a?'✓ Σωστό! ':'✗ Σωστό: "'+q.a+'" — '}</span><span class="c3">${q.exp}</span></div>
        ${TST.qs&&TST.qa[qi]!==q.a?renderEMAButton(q.q,TST.qa[qi]||'',q.a,t.name):''}`:''}</div>`;
      }).join('');
      const allA2=Object.keys(TST.qa).length>=t.quiz.length;
      body=qrows+(!TST.qs
        ?`<button onclick="submitTensesQuiz()" style="width:100%;padding:11px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;opacity:${allA2?1:0.4};background:linear-gradient(135deg,var(--bl),var(--vi));color:#fff;border:none;box-shadow:${allA2?'0 4px 16px rgba(79,142,247,.3)':''}">Ελέγξτε →</button>`
        :'');
    }

  } else if(TST.tab==='fillin'){
    const fi=t.fillin||[];
    if(!fi.length){body=`<div class="card c-info"><div class="f12 c2">Δεν υπάρχουν fill-in ασκήσεις ακόμα.</div></div>`;}
    else{
      body=`<div class="f12 c2 mb12" style="line-height:1.7">✍ Γράψε τη σωστή μορφή του ρήματος:</div>`+
      fi.map((f,i)=>`<div class="card mb10">
        <div class="f12 c3 mb6" style="color:var(--am)">💡 ${f.h}</div>
        <div class="f13 mb8" style="line-height:1.8;color:var(--t1)">${f.s.replace(/___/g,'<span style="display:inline-block;min-width:80px;border-bottom:2px solid var(--bl);margin:0 4px"></span>')}</div>
        ${TST.ta&&TST.ta[i]!==undefined?
          `<div style="padding:8px 12px;border-radius:8px;background:${(TST.ta[i]||'').toLowerCase().trim()===f.a.toLowerCase().trim()||f.a.toLowerCase().includes((TST.ta[i]||'').toLowerCase().trim())?'rgba(34,214,124,.07)':'rgba(240,56,112,.07)'}">
            <div class="f12 mb2">Απάντησή σου: <strong>${TST.ta[i]}</strong></div>
            <div class="f12 cgr">✓ ${f.a}</div>
          </div>`
          :`<div class="fx ac g8">
            <input id="fi_${i}" placeholder="Γράψε εδώ..." style="flex:1;padding:8px 12px;background:var(--s2);border:1px solid var(--ln);border-radius:8px;color:var(--t1);font-size:13px" onkeydown="if(event.key==='Enter'){if(!TST.ta)TST.ta={};TST.ta[${i}]=this.value.trim();rTM();}" oninput="this.style.borderColor='var(--bl)'">
            <button onclick="if(!TST.ta)TST.ta={};TST.ta[${i}]=document.getElementById('fi_${i}').value.trim();rTM()" class="btn bp bsm">✓</button>
          </div>`}
      </div>`).join('')+
      (TST.ta&&Object.keys(TST.ta).length>=fi.length?
        `<button onclick="TST.ta={};rTM()" class="btn bgh bsm mt8">🔄 Ξανά</button>`:
        '');
    }

  } else if(TST.tab==='transform'){
    const tf=t.transform||[];
    if(!tf.length){body=`<div class="card c-info"><div class="f12 c2">Δεν υπάρχουν ασκήσεις μετατροπής ακόμα.</div></div>`;}
    else{
      body=`<div class="f12 c2 mb12">🔄 Μετέτρεψε κάθε πρόταση σύμφωνα με την οδηγία:</div>`+
      tf.map((tf,i)=>`<div class="card mb10" style="border-left:3px solid var(--vi)">
        <div class="fx ac g6 mb6">
          <span class="tag f9" style="background:var(--vi)1a;border:1px solid var(--vi)33;color:var(--vi)">${tf.type}</span>
        </div>
        <div class="f13 b mb6" style="color:var(--t1)">${tf.orig}</div>
        <div class="f11 c3 mb8">💡 ${tf.h}</div>
        ${TST.tc&&TST.tc[i]!==undefined?
          `<div style="padding:8px 12px;border-radius:8px;background:rgba(124,92,245,.06)">
            <div class="f12 mb2">Απάντησή σου: ${TST.tc[i]}</div>
            <div class="f12 cgr">✓ ${tf.ans}</div>
          </div>`
          :`<div class="fx ac g8">
            <input id="tf_${i}" placeholder="Γράψε τη μετατροπή..." style="flex:1;padding:8px 12px;background:var(--s2);border:1px solid var(--ln);border-radius:8px;color:var(--t1);font-size:12px" onkeydown="if(event.key==='Enter'){if(!TST.tc)TST.tc={};TST.tc[${i}]=this.value.trim();rTM();}">
            <button onclick="if(!TST.tc)TST.tc={};TST.tc[${i}]=document.getElementById('tf_${i}').value.trim();rTM()" class="btn bp bsm">✓</button>
          </div>`}
      </div>`).join('')+
      (TST.tc&&Object.keys(TST.tc).length>=tf.length?
        `<button onclick="TST.tc={};rTM()" class="btn bgh bsm mt8">🔄 Ξανά</button>`:
        '');
    }

  } else if(TST.tab==='errcorrect'){
    const ec=t.errcorrect||[];
    if(!ec.length){body=`<div class="card c-info"><div class="f12 c2">Δεν υπάρχουν ασκήσεις error correction ακόμα.</div></div>`;}
    else{
      body=`<div class="f12 c2 mb12" style="line-height:1.7">🔍 Βρες και διόρθωσε το λάθος σε κάθε πρόταση:</div>`+
      ec.map((e,i)=>{
        const shown=TST.te&&TST.te[i];
        return `<div class="card mb10" style="border-left:3px solid var(--ro)">
          <div class="f13 mb6" style="color:var(--ro);line-height:1.7">✗ ${e.w}</div>
          ${shown?
            `<div style="padding:8px 12px;border-radius:8px;background:rgba(34,214,124,.06);margin-top:6px">
              <div class="f12 cgr mb1">✓ ${e.r}</div>
              <div class="f10 c3">→ ${e.why}</div>
            </div>`
            :`<button onclick="if(!TST.te)TST.te={};TST.te[${i}]=true;rTM()" class="btn bgh bsm mt4">👁 Δες Διόρθωση</button>`}
        </div>`;
      }).join('')+
      (TST.te&&Object.keys(TST.te).length>=ec.length?
        `<button onclick="TST.te={};rTM()" class="btn bgh bsm mt8">🔄 Ξανά</button>`:
        '');
    }

  } else if(TST.tab==='story'){
    const st=t.story||null;
    if(!st){body=`<div class="card c-info"><div class="f12 c2">Δεν υπάρχει mini-story ακόμα.</div></div>`;}
    else{
      const parts=st.text.split(/\[[1-9]\]/);
      const blanks=st.answers.length;
      let built='';
      for(let i=0;i<parts.length;i++){
        built+=`<span>${parts[i]}</span>`;
        if(i<blanks){
          const ans=(TST.ts||{})[i];
          if(ans!==undefined){
            const correct=ans.toLowerCase().trim()===st.answers[i].toLowerCase().trim();
            built+=`<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-weight:700;background:${correct?'rgba(34,214,124,.1)':'rgba(240,56,112,.1)'};color:${correct?'var(--gr)':'var(--ro)'};border-bottom:2px solid ${correct?'var(--gr)':'var(--ro)'}">
              ${ans}${correct?'':' (✓'+st.answers[i]+')'}
            </span>`;
          } else {
            built+=`<input id="st_${i}" placeholder="[${i+1}]" style="display:inline-block;width:90px;padding:2px 6px;background:var(--s2);border:none;border-bottom:2px solid var(--bl);color:var(--t1);font-size:13px;text-align:center" onkeydown="if(event.key==='Enter'||event.key==='Tab'){if(!TST.ts)TST.ts={};TST.ts[${i}]=this.value.trim();rTM();}">`;
          }
        }
      }
      const allFilled=TST.ts&&Object.keys(TST.ts).length>=blanks;
      body=`<div class="card mb12"><div class="sl mb8 cbl">📖 MINI-STORY — ${t.name.toUpperCase()}</div>
        <div class="f13" style="line-height:2.2">${built}</div>
        ${!allFilled?`<button onclick="const ins=document.querySelectorAll('[id^=st_]');ins.forEach(inp=>{if(!TST.ts)TST.ts={};const idx=parseInt(inp.id.split('_')[1]);TST.ts[idx]=inp.value.trim();});rTM()" class="btn bp bsm mt12">✓ Έλεγχος</button>`
        :`<button onclick="TST.ts={};rTM()" class="btn bgh bsm mt8">🔄 Ξανά</button>`}
      </div>
      ${st.tr?`<div class="card c-info"><div class="sl mb6 c3">🇬🇷 ΜΕΤΑΦΡΑΣΗ</div><div class="f12 c2" style="line-height:1.7">${st.tr}</div></div>`:''}`;
    }

  }
  
  mn.innerHTML=`<div class="sec fu" style="max-width:780px">
    <div class="fx ac g12 mb12">
      <div style="width:40px;height:40px;border-radius:10px;background:${t.col}22;display:flex;align-items:center;justify-content:center;font-size:18px">${t.tag}</div>
      <div><div class="fp f16 b" style="color:${t.col}">${t.name}</div><div class="f11 c3">${t.gr}</div></div>
      ${DB.get('tDone',[]).includes(t.id)?`<span class="tag f9" style="margin-left:auto;background:var(--gr)1a;border:1px solid var(--gr)33;color:var(--gr)">✓ Ολοκληρώθηκε</span>`:''}
    </div>
    <div class="fx g4 mb14" style="overflow-x:auto;flex-wrap:nowrap">${tabs}</div>
    ${body}
  </div>`;
}

  el.innerHTML=`<div class="sec fu">
    <button onclick="GST.topic=null;rGrammar()" style="color:var(--t3);font-size:11px;background:none;border:none;cursor:pointer;margin-bottom:16px">← Πίσω στη Γραμματική</button>
    <div class="fx ac g10 mb20"><span style="font-size:26px">${t.ic}</span><div><div class="fp f16 b" style="color:${t.col}">${t.t}</div><div class="f11 c3">${t.desc}</div></div></div>
    <div class="sl mb10">ΘΕΩΡΙΑ</div>
    ${t.theory||''}
    <div class="sl mb12 mt16">ΑΣΚΗΣΕΙΣ (${t.exercises.length})</div>
    ${t.exercises.map((ex,i)=>{
      const opts=ex.opts.map(opt=>{
        let bg='var(--s2)',br='var(--ln)',col='var(--t2)';
        if(GST.ea[i]===opt){bg='var(--s3)';br=t.col;col=t.col;}
        if(GST.es){if(opt===ex.a){bg='#051a0a';br='#22c77a44';col='var(--gr)';}else if(GST.ea[i]===opt){bg='#1a0508';br='#f0387044';col='var(--ro)';}}
        return `<button class="geo" onclick="if(!GST.es){GST.ea[${i}]='${opt.replace(/'/g,"\\'")}';rGTopic()}" style="background:${bg};border-color:${br};color:${col}">${opt}</button>`;
      }).join('');
      return `<div class="card mb10"><div class="f13 mb10" style="line-height:1.6"><span class="fp b" style="color:${t.col};margin-right:7px">${i+1}.</span>${ex.q}</div><div class="g2 mb8">${opts}</div>${GST.es?`<div class="f11"><span style="color:${GST.ea[i]===ex.a?'var(--gr)':'var(--ro)'}">${GST.ea[i]===ex.a?'✓ Σωστό! ':'✗ Σωστό: "'+ex.a+'" — '}</span><span class="c3">${ex.exp}</span></div>`:''}</div>`;
    }).join('')}
    ${!GST.es
      ?`<button onclick="const allA=Object.keys(GST.ea).length>=${t.exercises.length};if(allA){let sc=0;GRAM.find(x=>x.id===GST.topic).exercises.forEach((ex,i)=>{if(GST.ea[i]===ex.a)sc++;else{const ge=DB.get('gramErr',{});if(!ge[GST.topic])ge[GST.topic]={count:0,last:null};ge[GST.topic].count++;ge[GST.topic].last=todayK();DB.set('gramErr',ge);}});GST.esc=sc;GST.es=true;addXP(sc*8);const pct=Math.round(sc/${t.exercises.length}*100);const gramMsg=pct>=80?'Εξαιρετικά! Εξαιρετικά!':pct>=50?'Καλά — συνέχισε!':'Συνέχισε την εξάσκηση!';
if(pct>=80){setTimeout(()=>showCelebration('✓ '+t.t+' — Τέλεια! ✓!',gramMsg+' '+sc+'/'+t.exercises.length+' σωστές.',sc*8,'GST.topic=null;rGrammar()','Επόμενο κεφάλαιο'),400);}
else{toast((pct>=50?'👍 ':'📖 ')+sc+'/${t.exercises.length} σωστές — '+gramMsg,'var(--'+(pct>=50?'bl':'ro')+')');if(pct>=60)setTimeout(()=>showForcedOutput(GST.topic,'grammar'),1200);}
rGTopic()}" style="padding:10px 22px;background:${t.col};border:none;border-radius:7px;color:#07080f;font-weight:700;font-size:11px;cursor:pointer;opacity:${Object.keys(GST.ea).length>=t.exercises.length?1:0.4};cursor:${Object.keys(GST.ea).length>=t.exercises.length?'pointer':'not-allowed'}">Ελέγξτε →</button>`
      :`<div class="fx ac g12"><div class="card" style="border:2px solid ${GST.esc===t.exercises.length?'var(--am)':'var(--gr)'}">
         <span class="f11 c3">Αποτέλεσμα: </span><span class="fp f20 b" style="color:${GST.esc===t.exercises.length?'var(--am)':'var(--gr)'}">${GST.esc}/${t.exercises.length}</span>

  </div>`;

function rWTopic(){
  const el=document.getElementById('writing');

  const tabs=['structure','phrases','templates','practice'].map(id=>{
    const ls={structure:'Δομή',phrases:'Φράσεις',templates:'📧 Templates',practice:'Εξάσκηση'};
    return `<button class="ttab ${WST.tab===id?'on':''}" onclick="WST.tab='${id}';rWTopic()" style="--tc:${t.col}">${ls[id]}</button>`;
  }).join('');
  let body='';
  if(WST.tab==='structure'){
    body=t.structure.map((s,i)=>`<div class="card mb10 fu">

      </div>
      <div class="f12 c3 it mb8">${s.tip}</div>
      ${s.ex.map(e=>`<div class="f12 c2 mb4" style="padding-left:12px;border-left:2px solid ${t.col}33">"${e}"</div>`).join('')}
    </div>`).join('');
  } else if(WST.tab==='phrases'){
    body=Object.entries(t.phrases).map(([section,phrases])=>`<div class="card mb10 fu">

        <div class="f12 c2" style="flex:1">"${ph}"</div>

        <div class="fx ac jb mb8">

      <div class="card">
        <div class="sl mb8" style="color:${t.col}">ΕΞΑΣΚΗΣΗ</div>
        <div class="f12 c2 mb12" style="line-height:1.7">Χρησιμοποίησε τη δομή και τις φράσεις. Τσέκαρε το checklist μετά!</div>

          <div class="sl mb8 cbl">💡 ΑΝΑΒΑΘΜΙΣΕ ΤΟ ΛΕΞΙΛΟΓΙΟ</div>
          <div class="f11 c2" style="line-height:1.9">
            ✗ very good → ✓ <strong>excellent / outstanding</strong><br>
            ✗ very bad → ✓ <strong>problematic / detrimental</strong><br>
            ✗ very important → ✓ <strong>crucial / essential</strong><br>

          </div>
        </div>

    <div class="fx ac jb mb16">
      <div class="fx ac g10"><span style="font-size:26px">${t.ic}</span><div><div class="fp f16 b" style="color:${t.col}">${t.t}</div><div class="f11 c3">${t.desc}</div></div></div>

    </div>
    <div class="fx mb16" style="border-bottom:1px solid var(--ln)">${tabs}</div>${body}

  if(WST.tab==='practice'){
    const ta=document.getElementById('wptx');
    if(ta)ta.addEventListener('input',()=>DB.set('wp_'+WST.topic,ta.value));

}

function toggleWriteCheck(topicId,checkId){
  const checks=DB.get('wpc_'+topicId,{});
  checks[checkId]=!checks[checkId];
  DB.set('wpc_'+topicId,checks);
  rWTopic();
}

   text:`<p>Finding the right balance between work and personal life has become one of the most important challenges of modern society. <em>Increasingly</em>, people are realising that working longer hours does not necessarily mean being more <em>productive</em>.</p>
   <p>Research shows that employees who maintain a healthy work-life balance are actually <strong>more focused, creative and motivated</strong> at work. They take fewer sick days and feel more energetic. Companies that <em>encourage</em> their staff to maintain this balance often report significantly better results overall.</p>

  {id:'r2',t:'The Science of Habit Formation',lv:'B1-B2',col:'var(--bl)',time:'3 min',
   text:`<p>According to research, <em>approximately</em> 40% of our daily actions are habits rather than <em>deliberate</em> choices. From the moment we wake up to the time we fall asleep, many of our behaviours happen automatically, without any conscious thought.</p>
   <p>Habits are formed through a three-step process called the "habit loop." First, there is a <em>cue</em> — something that <em>triggers</em> the behaviour. Then comes the routine — the behaviour itself. Finally, there is a reward, which reinforces the cycle and makes the brain want to repeat it.</p>
   <p>Understanding this loop is the key to changing unwanted habits and <em>establishing</em> new ones. Want to exercise more regularly? Link the new habit to something you already do — like putting your gym clothes next to your bed every evening. The existing habit becomes the cue for the new one.</p>
   <p>The encouraging news is that habits can be changed at any age. The most <em>crucial</em> factor is not willpower, but consistency. Small, daily steps taken over time lead to <em>remarkable</em> and lasting change.</p>`,

  {id:'r3',t:'The Digital Revolution and Communication',lv:'B2',col:'var(--am)',time:'3 min',
   text:`<p>Digital technology has fundamentally <em>transformed</em> the way we communicate. Within a single generation, we have moved from handwritten letters to instant global messaging. While this has brought <em>undeniable</em> advantages, it has also introduced significant challenges.</p>
   <p>Advocates of digital communication point out that we are now more <em>connected</em> than at any point in history. We can video-call family on the other side of the world, <em>collaborate</em> with international colleagues in real time, and access information within seconds.</p>
   <p>However, critics argue that this constant <em>connectivity</em> comes at a psychological cost. The pressure to always be available, respond immediately, and curate a perfect online presence can lead to anxiety and feelings of <em>inadequacy</em>. Studies increasingly link heavy social media use with lower levels of life satisfaction.</p>
   <p>The solution, many psychologists suggest, is not to <em>abandon</em> technology, but to use it more <em>mindfully</em>. Establishing clear digital boundaries — such as keeping phones away during meals or designating technology-free hours — can help restore a healthier, more balanced relationship with our devices.</p>`,
