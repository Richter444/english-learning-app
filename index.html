     {q:'What solution do psychologists recommend?',opts:['Stop using technology completely','Use technology more mindfully with clear boundaries','Limit to one device per person','Only use technology for work'],a:'Use technology more mindfully with clear boundaries',ex:'"use it more mindfully... Establishing clear digital boundaries"'},
   ]},
  {id:'r4',t:'The Psychology of Learning a Language',lv:'B2-C1',col:'var(--vi)',time:'4 min',
   text:`<p>Learning a new language is frequently described as one of the most <em>rewarding</em> yet demanding <em>endeavours</em> an adult can <em>undertake</em>. Beyond the obvious practical benefits, neuroscientific research reveals that bilingualism has profound effects on the brain itself.</p>
   <p>Studies consistently show that bilingual individuals demonstrate superior <em>cognitive flexibility</em> — the ability to switch between tasks, think creatively, and resist distraction. Regular use of two language systems appears to <em>strengthen</em> key neural <em>pathways</em> and may even delay the onset of cognitive decline in later life.</p>
   <p>Despite these compelling benefits, many adult learners find themselves stuck in what linguists call the "silent period" — a phase during which they understand far more than they can <em>express</em>. This perfectly natural stage often generates considerable <em>frustration</em> and leads learners to conclude, incorrectly, that they lack the necessary <em>aptitude</em>.</p>
   <p>The path beyond this plateau does not lie in studying more grammar rules in isolation, but in <em>actively engaging</em> with the language through reading, listening, speaking — imperfectly at first — and writing regularly. Crucially, the willingness to make mistakes and learn from them <em>accelerates</em> progress far more effectively than passive study ever could.</p>`,
   vocab:['rewarding','endeavours','undertake','cognitive','frustration','aptitude','actively','accelerates'],
   qs:[
     {q:'What does research show about bilingual people?',opts:['They earn more money','They have superior cognitive flexibility','They are better at mathematics','They learn faster as children'],a:'They have superior cognitive flexibility',ex:'"bilingual individuals demonstrate superior cognitive flexibility"'},
     {q:'What is the "silent period" in language learning?',opts:['When you stop practising','When you understand more than you can express','When you focus only on writing','When you are too tired to study'],a:'When you understand more than you can express',ex:'"they understand far more than they can express"'},
     {q:'What does the text say is the key to progress beyond the plateau?',opts:['Studying more grammar','Using a professional teacher','Actively engaging through all four skills','Memorising vocabulary lists'],a:'Actively engaging through all four skills',ex:'"actively engaging with the language through reading, listening, speaking... and writing"'},
     {q:'What does the text say about making mistakes?',opts:['They should be avoided','They slow down progress','They are more effective than passive study','They cause frustration'],a:'They are more effective than passive study',ex:'"the willingness to make mistakes and learn from them accelerates progress far more effectively than passive study"'},
   ]},
  {id:'r5',t:'Emotional Intelligence in the Workplace',lv:'C1',col:'var(--ro)',time:'4 min',
   text:`<p>Emotional intelligence — the capacity to recognise, understand, manage and effectively use emotions in ourselves and others — has emerged as one of the most highly <em>valued</em> skills in the contemporary workplace. While technical expertise and academic qualifications remain important, research consistently demonstrates that emotional intelligence is a stronger <em>predictor</em> of professional success than IQ alone.</p>
   <p>At its core, emotional intelligence <em>comprises</em> four key <em>competencies</em>: self-awareness, self-regulation, social awareness and relationship management. Self-aware individuals recognise how their emotions influence their thinking and behaviour. Self-regulation enables people to manage <em>impulses</em> and respond rather than react to difficult situations.</p>
   <p>Social awareness — often described as <em>empathy</em> — allows us to understand the emotional states of those around us, which is particularly valuable in leadership, negotiation and conflict resolution. Finally, relationship management involves using all these skills to inspire, influence and <em>cultivate</em> meaningful professional connections.</p>
   <p>The encouraging finding from decades of research is that, unlike IQ, emotional intelligence can be significantly developed through <em>deliberate</em> practice and self-reflection. Leaders who invest in developing their emotional intelligence tend to create more <em>cohesive</em> teams, resolve conflicts more effectively, and achieve superior long-term outcomes.</p>`,
   vocab:['valued','predictor','comprises','competencies','empathy','cultivate','deliberate','cohesive'],
   qs:[
     {q:'What does research say about emotional intelligence vs IQ?',opts:['IQ is more important for success','They are equally important','EI is a stronger predictor of professional success','EI is only important for managers'],a:'EI is a stronger predictor of professional success',ex:'"emotional intelligence is a stronger predictor of professional success than IQ alone"'},
     {q:'How many key competencies does EI comprise?',opts:['Two','Three','Four','Five'],a:'Four',ex:'"emotional intelligence comprises four key competencies: self-awareness, self-regulation, social awareness and relationship management"'},
     {q:'What does "empathy" allow us to do?',opts:['Control other people','Understand the emotional states of others','Avoid conflict','Make better decisions'],a:'Understand the emotional states of others',ex:'"Social awareness — often described as empathy — allows us to understand the emotional states of those around us"'},
     {q:'What makes EI different from IQ according to the text?',opts:['EI decreases with age','EI cannot be measured','EI can be developed through practice','EI is only relevant for some professions'],a:'EI can be developed through practice',ex:'"unlike IQ, emotional intelligence can be significantly developed through deliberate practice"'},
   ]},

  {id:'r6',t:'The Future of Remote Work',lv:'B1-B2',col:'var(--tl)',time:'3 min',
   text:`<p>The COVID-19 pandemic <em>fundamentally</em> changed how millions of people around the world work. What began as a temporary emergency measure has <em>evolved</em> into a permanent shift in workplace culture. Remote work, once considered a privilege, has become a standard expectation for many employees.</p>
   <p>The benefits are <em>undeniable</em>. Employees report higher levels of job satisfaction, better work-life balance, and reduced commuting costs. For employers, remote work opens access to a global talent pool and can significantly reduce office overhead costs. Studies show that productivity often <em>increases</em> when people work from home, particularly for tasks requiring deep concentration.</p>
   <p>However, remote work is not without its <em>drawbacks</em>. Many workers struggle with feelings of isolation and find it difficult to separate professional and personal life. Collaboration and creativity can suffer when teams are not physically together. Junior employees, in particular, may miss out on the informal mentoring that naturally occurs in office environments.</p>
   <p>Most companies are now <em>adopting</em> a hybrid model — a combination of office and remote work. This approach attempts to capture the benefits of both arrangements while minimising the drawbacks. The key to success lies in clear communication, trust between managers and employees, and the right technological infrastructure.</p>`,
   vocab:['fundamentally','evolved','undeniable','drawbacks','adopting'],
   qs:[
     {q:'What does the text say about productivity when working from home?',opts:['It always decreases','It often increases for tasks needing concentration','It stays exactly the same','It depends on the company'],a:'It often increases for tasks needing concentration',ex:'"productivity often increases when people work from home, particularly for tasks requiring deep concentration"'},
     {q:'What is a major drawback of remote work mentioned in the text?',opts:['Higher costs','Isolation and difficulty separating work from personal life','Lower salaries','Longer working hours'],a:'Isolation and difficulty separating work from personal life',ex:'"Many workers struggle with feelings of isolation and find it difficult to separate professional and personal life"'},
     {q:'Who may particularly miss out due to remote work?',opts:['Senior managers','Experienced employees','Junior employees','Part-time workers'],a:'Junior employees',ex:'"Junior employees, in particular, may miss out on the informal mentoring that naturally occurs in office environments"'},
     {q:'What is a hybrid model?',opts:['Fully remote work','Only office work','A combination of office and remote work','Working from different countries'],a:'A combination of office and remote work',ex:'"Most companies are now adopting a hybrid model — a combination of office and remote work"'},
   ]},
  {id:'r7',t:'The Importance of Financial Literacy',lv:'B2',col:'var(--gr)',time:'3 min',
   text:`<p>Financial literacy — the ability to understand and manage personal finances effectively — is one of the most valuable yet <em>neglected</em> skills in modern education. Despite its critical importance, many people reach adulthood without a solid understanding of <em>fundamental</em> concepts such as budgeting, saving, investing, and managing debt.</p>
   <p>The consequences of financial <em>illiteracy</em> are significant. People who lack financial knowledge are more likely to accumulate debt, make poor investment decisions, and struggle to save for retirement. They are also more vulnerable to financial scams and predatory lending practices that can have devastating long-term effects.</p>
   <p>Fortunately, developing financial literacy does not require a degree in economics. Understanding a few key principles can make a substantial difference. These include: living within your means, building an emergency fund, avoiding high-interest debt, and <em>consistently</em> setting aside money for long-term goals.</p>
   <p>Governments and organisations around the world are increasingly recognising the importance of financial education. Some countries have introduced financial literacy programmes into school <em>curricula</em>, while banks and employers are offering workshops and resources to help people make better financial decisions. The evidence is clear: financially literate individuals are better equipped to navigate economic challenges and achieve lasting financial stability.</p>`,
   vocab:['neglected','fundamental','illiteracy','consistently','curricula'],
   qs:[
     {q:'What is financial literacy?',opts:['The ability to count money','Understanding and managing personal finances effectively','A university degree in finance','The ability to earn a high salary'],a:'Understanding and managing personal finances effectively',ex:'"Financial literacy — the ability to understand and manage personal finances effectively"'},
     {q:'According to the text, what are financially illiterate people more vulnerable to?',opts:['Unemployment','Financial scams and predatory lending','Health problems','Poor education'],a:'Financial scams and predatory lending',ex:'"They are also more vulnerable to financial scams and predatory lending practices"'},
     {q:'Which principle is NOT mentioned as key to financial literacy?',opts:['Living within your means','Building an emergency fund','Investing in property','Avoiding high-interest debt'],a:'Investing in property',ex:'The text mentions: living within means, emergency fund, avoiding high-interest debt, saving for long-term goals'},
     {q:'How are governments responding to this issue?',opts:['By reducing taxes','Introducing financial literacy into school curricula','Printing more money','Offering free loans'],a:'Introducing financial literacy into school curricula',ex:'"Some countries have introduced financial literacy programmes into school curricula"'},
   ]},
  {id:'r8',t:'Social Media and Mental Health',lv:'B2-C1',col:'var(--ro)',time:'4 min',
   text:`<p>The relationship between social media use and mental health has become one of the most <em>scrutinised</em> topics in contemporary psychology. As platforms such as Instagram, TikTok and Twitter have become central to daily life — particularly for younger generations — researchers have been working to understand their psychological impact.</p>
   <p>The evidence presents a nuanced picture. On the one hand, social media enables people to maintain connections, access support communities, and express their identity. For individuals in isolated circumstances, online communities can provide a vital sense of belonging. Furthermore, platforms have been used effectively to raise awareness about mental health issues and <em>destigmatise</em> seeking help.</p>
   <p>On the other hand, research consistently links heavy social media use — particularly passive scrolling — with increased rates of anxiety, loneliness, and depression. The mechanism appears to involve <em>unfavourable</em> social comparisons: seeing carefully curated images of others' lives can generate feelings of <em>inadequacy</em> and low self-worth. Cyberbullying presents an additional and serious risk, particularly for adolescents.</p>
   <p>Experts recommend a mindful approach rather than complete abstinence. Setting clear time limits, being selective about the accounts you follow, and actively engaging rather than passively consuming content are all <em>strategies</em> shown to mitigate negative effects. The goal is not to eliminate social media but to develop a healthier, more intentional relationship with it.</p>`,
   vocab:['scrutinised','destigmatise','unfavourable','inadequacy','strategies'],
   qs:[
     {q:'What does "passive scrolling" refer to in this context?',opts:['Actively creating content','Reading content without engaging or interacting','Scrolling quickly through pages','Using social media for work'],a:'Reading content without engaging or interacting',ex:'Passive scrolling = consuming content without active engagement, linked to anxiety and depression'},
     {q:'What mechanism links social media to negative mental health outcomes?',opts:['Addiction to notifications','Unfavourable social comparisons from curated images','Too much screen time generally','Lack of real-life friends'],a:'Unfavourable social comparisons from curated images',ex:'"seeing carefully curated images of others lives can generate feelings of inadequacy and low self-worth"'},
     {q:'What is the positive aspect of social media for isolated individuals?',opts:['It replaces real friendships','It provides entertainment','It provides a vital sense of belonging','It improves physical health'],a:'It provides a vital sense of belonging',ex:'"For individuals in isolated circumstances, online communities can provide a vital sense of belonging"'},
     {q:'What approach do experts recommend?',opts:['Complete avoidance of social media','Mindful use with clear limits and active engagement','Using only one platform','Only using social media for work'],a:'Mindful use with clear limits and active engagement',ex:'"Experts recommend a mindful approach rather than complete abstinence. Setting clear time limits... actively engaging rather than passively consuming"'},
   ]},
  {id:'r9',t:'Aviation Safety Management',lv:'B1',col:'var(--bl)',time:'6 min',
   vocab:['safety management','risk assessment','corrective action','compliance','mitigation'],
   text:'Aviation safety is not the absence of accidents — it is the active management of risk. Every airline and CAMO must maintain a Safety Management System (SMS), which identifies hazards before they become incidents. The process involves four key steps: hazard identification, risk assessment, risk mitigation, and performance monitoring. When a defect or near-miss occurs, a corrective action is raised and tracked until it is closed. Regulators such as EASA and HCAA require evidence that organisations are not only identifying problems, but also learning from them. The goal is a just culture — one where people report issues without fear of punishment, so that systemic problems can be addressed before they cause harm.',
   qs:[
     {q:'What does SMS stand for?',opts:['Safety Maintenance Schedule','Safety Management System','Standard Monitoring Service','System Maintenance Standard'],a:'Safety Management System'},
     {q:'What is a just culture in aviation?',opts:['A culture with strict punishment','A culture encouraging reporting without fear','A culture focused only on compliance','A culture that ignores minor incidents'],a:'A culture encouraging reporting without fear'},
     {q:'Which step comes AFTER risk assessment in the SMS process?',opts:['Hazard identification','Performance monitoring','Risk mitigation','Corrective action'],a:'Risk mitigation'},
   ]},
  {id:'r10',t:'CAMO Responsibilities Under EASA Part-CAMO',lv:'B2',col:'var(--vi)',time:'7 min',
   vocab:['continuing airworthiness','maintenance programme','airworthiness review','subcontract','findings'],
   text:'A Continuing Airworthiness Management Organisation (CAMO) is responsible for ensuring that aircraft remain airworthy throughout their operational life. Under EASA Part-CAMO, organisations must develop and maintain an Aircraft Maintenance Programme (AMP), coordinate with approved maintenance organisations, and conduct regular Airworthiness Reviews. The CAMO must also monitor the implementation of Airworthiness Directives (ADs) and Service Bulletins. When the competent authority — such as HCAA in Greece — conducts an audit and raises findings, the organisation must respond with corrective actions within defined timeframes. Failure to comply can result in suspension of the CAMO approval. Good documentation, accurate records, and proactive communication with the authority are essential for maintaining compliance.',
   qs:[
     {q:'What does AMP stand for?',opts:['Aviation Maintenance Procedure','Aircraft Maintenance Programme','Approved Maintenance Plan','Airworthiness Monitoring Protocol'],a:'Aircraft Maintenance Programme'},
     {q:'What happens if a CAMO fails to respond to audit findings?',opts:['They receive a warning letter','Their approval may be suspended','They must pay a fine','Nothing happens'],a:'Their approval may be suspended'},
     {q:'What must a CAMO do when a new AD is issued?',opts:['Wait for the authority','Assess its impact within a defined timeframe','Immediately ground all aircraft','Only act if marked Emergency'],a:'Assess its impact within a defined timeframe'},
   ]},
  {id:'r11',t:'Effective Communication in Aviation',lv:'B1',col:'var(--gr)',time:'5 min',
   vocab:['miscommunication','standard phraseology','readback','crew resource management','ambiguity'],
   text:'Communication failures are a leading cause of aviation incidents. When instructions are ambiguous, the consequences can be serious. This is why aviation uses standard phraseology — precise, internationally agreed expressions that reduce misunderstanding. Pilots and controllers use the readback technique: the recipient repeats critical information to confirm understanding. In maintenance, clear written communication is equally important. A poorly worded maintenance record can lead to repeated defects or missed inspections. Crew Resource Management (CRM) training teaches aviation professionals to speak up, question assumptions, and share information openly — even when speaking to a senior colleague.',
   qs:[
     {q:'What is the readback technique?',opts:['Reading the manual','Repeating critical information to confirm understanding','Writing a summary','Asking a colleague to repeat'],a:'Repeating critical information to confirm understanding'},
     {q:'What can a poorly worded maintenance record cause?',opts:['Improved communication','Repeated defects or missed inspections','Better documentation','No significant problems'],a:'Repeated defects or missed inspections'},
     {q:'What does CRM training teach?',opts:['Technical aircraft systems','How to speak up and share information openly','Standard phraseology only','Emergency procedures'],a:'How to speak up and share information openly'},
   ]},
  {id:'r12',t:'Airworthiness Directives: What You Need to Know',lv:'B2',col:'var(--am)',time:'6 min',
   vocab:['mandatory','compliance deadline','amendment','unsafe condition','applicability'],
   text:'An Airworthiness Directive (AD) is a mandatory document issued by a national aviation authority when an unsafe condition is identified on an aircraft type. Unlike Service Bulletins, which are generally optional, ADs must be complied with by the stated deadline or the aircraft cannot legally fly. ADs describe the unsafe condition, specify which aircraft are affected (the applicability), and detail the required action — which may be an inspection, a modification, or a component replacement. The CAMO is responsible for tracking all applicable ADs, incorporating them into the Aircraft Maintenance Programme, and ensuring compliance.',

function saveFromR(word){
  const all=getAllW();
  if(all.find(w=>w.w===word)){toast('"'+word+'" ήδη στο Vocabular ✓','var(--gr)');return;}
  const cws=DB.get('customW',[]);
  const newId='r'+Date.now();
  cws.push({id:newId,w:word,g:'(πρόσθεσε μετάφραση στο Vocabular)',p:'word',cat:'b2_daily',e:'"'+word+'" — found while reading.',d:2,f:[]});
  DB.set('customW',cws);
  // Schedule for review
  const wb=getWB();
  wb[newId]={sc:0,st:0,nr:Date.now()+3600000,seen:0}; // review in 1 hour
  DB.set('wb',wb);
  toast('✓ "'+word+'" → Vocabular! Θα εμφανιστεί στο Quiz σύντομα.','var(--gr)');
  addXP(3);
}

let SIMST={conv:null,turn:0,sel:null,done:false,score:0};

function rSimulator(el){
  if(!SIMST.conv){
    el.innerHTML=`<div class="fp f13 b mb16">Conversation Simulator — Επίλεξε σενάριο</div>
      <p class="f12 c2 mb16" style="line-height:1.6">Διάλεξε τη σωστή απάντηση σε πραγματικές συνομιλίες. Μάθε φυσικές εκφράσεις στο context.</p>
      <div class="g3">
        ${CONVERSATIONS.map(cv=>`<div class="scard" onclick="SIMST.conv='${cv.id}';SIMST.turn=0;SIMST.sel=null;SIMST.done=false;SIMST.score=0;rSpeaking()">
          <div style="font-size:28px;margin-bottom:8px">${cv.ic}</div>
          <div class="fp f13 b mb4" style="color:var(--gr)">${cv.title}</div>
          <div class="tag f9" style="background:var(--gr)1a;border:1px solid var(--gr)33;color:var(--gr)">${cv.level}</div>
          <div class="f10 c3 mt8">${cv.turns.length} turns</div>
        </div>`).join('')}
      </div>`;
    return;
  }

  const cv=CONVERSATIONS.find(x=>x.id===SIMST.conv);
  const turn=cv.turns[SIMST.turn];
  const isLast=SIMST.turn>=cv.turns.length-1;
  const pct=Math.round((SIMST.turn/cv.turns.length)*100);

  if(SIMST.done){
    el.innerHTML=`<div style="text-align:center;padding:20px" class="fu">
      <div style="font-size:48px;margin-bottom:12px" class="pop">${SIMST.score===cv.turns.length?'🏆':'🎯'}</div>
      <div class="fp f18 b mb4" style="color:${SIMST.score===cv.turns.length?'var(--am)':'var(--gr)'}">${SIMST.score===cv.turns.length?'Τέλειο!':'Καλό!'}</div>
      <div class="fp f24 b mb8">${SIMST.score}/${cv.turns.length}</div>
      <div class="f12 c2 mb16">${Math.round((SIMST.score/cv.turns.length)*100)}% σωστές απαντήσεις</div>
      <div class="fx jc g10">
        <button onclick="SIMST.conv='${cv.id}';SIMST.turn=0;SIMST.sel=null;SIMST.done=false;SIMST.score=0;rSpeaking()" class="btn bp">↺ Ξανά</button>
        <button onclick="SIMST.conv=null;rSpeaking()" class="btn bgh">← Επιστροφή</button>
      </div>
    </div>`;
    addXP(SIMST.score*10);
    return;
  }

  el.innerHTML=`<div style="max-width:640px;margin:0 auto">
    <div class="fx ac jb mb12">
      <button onclick="SIMST.conv=null;rSpeaking()" style="color:var(--t3);font-size:11px;background:none;border:none;cursor:pointer">← Πίσω</button>
      <span class="tag f9" style="background:var(--gr)1a;border:1px solid var(--gr)33;color:var(--gr)">${cv.ic} ${cv.title}</span>
      <span class="f11 c3">${SIMST.turn+1}/${cv.turns.length}</span>
    </div>
    <div class="pb mb16" style="height:4px"><div class="pf" style="width:${pct}%;background:linear-gradient(90deg,var(--gr),var(--tl))"></div></div>

    <!-- Interviewer/Speaker bubble -->
    <div style="display:flex;gap:10px;margin-bottom:16px">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${cv.ic}</div>
      <div style="background:var(--s2);border:1px solid var(--ln);border-radius:0 12px 12px 12px;padding:12px 14px;max-width:85%">
        <div class="f10 b c3 mb4">${turn.speaker}</div>
        <div class="f13" style="line-height:1.6">${turn.text}</div>
      </div>
    </div>

    <!-- Options -->
    <div class="f11 c3 mb8">Επίλεξε την καλύτερη απάντηση:</div>
    ${turn.options.map((opt,i)=>{
      let bg='var(--s2)',br='var(--ln)',col='var(--t2)',prefix='';
      if(SIMST.sel===i&&SIMST.sel!==null){
        if(i===turn.correct){bg='#051a0a';br='#22c77a44';col='var(--gr)';prefix='✓ ';}
        else{bg='#1a0508';br='#f0387044';col='var(--ro)';prefix='✗ ';}
      } else if(SIMST.sel!==null&&i===turn.correct){
        bg='#051a0a';br='#22c77a44';col='var(--gr)';prefix='✓ ';
      }
      return `<div onclick="${SIMST.sel===null?'simSelect('+i+')':''}" style="padding:10px 14px;border-radius:8px;margin-bottom:8px;cursor:${SIMST.sel===null?'pointer':'default'};background:${bg};border:1px solid ${br};color:${col};transition:all .15s;font-size:13px;line-height:1.5">${prefix}${opt}</div>`;
    }).join('')}

    <!-- Feedback -->
    ${SIMST.sel!==null?`<div style="padding:10px 14px;background:${SIMST.sel===turn.correct?'#051a0a':'#1a0508'};border:1px solid ${SIMST.sel===turn.correct?'#22c77a44':'#f0387044'};border-radius:8px;margin-bottom:12px">
      <div class="f12" style="color:${SIMST.sel===turn.correct?'var(--gr)':'var(--ro)'}">💡 ${turn.feedback}</div>
    </div>
    <button onclick="simNext(${isLast})" class="btn bp">${isLast?'Τέλος ✓':'Επόμενο →'}</button>`:''}
  </div>`;
}

function simSelect(i){
  if(SIMST.sel!==null)return;
  const cv=CONVERSATIONS.find(x=>x.id===SIMST.conv);
  const turn=cv.turns[SIMST.turn];
  SIMST.sel=i;
  if(i===turn.correct)SIMST.score++;
  rSpeaking();
}

function simNext(isLast){
  if(isLast){SIMST.done=true;}
  else{SIMST.turn++;SIMST.sel=null;}
  rSpeaking();
}

function getTodayLesson(){
  const tk=todayK();
  const saved=DB.get('lesson_'+tk,null);
  if(saved)return saved;
  
  const allW=getAllW();
  const errors=DB.get('errors',{});
  const wb=getWB();
  
  // Smart word selection filtered by placement level:
  const placeLv=DB.get('placement_lv','B1');
  const lvOrder={'B1':['b1_daily','b1_verbs'],'B1+':['b1_daily','b1_verbs','b2_daily'],'B2':['b1_daily','b2_daily','b2_verbs','business'],'B2+':['b1_daily','b2_daily','b2_verbs','business','c1_adv','phrases']};
  const prefCats=lvOrder[placeLv]||lvOrder['B1'];
  const levelWords=allW.filter(w=>prefCats.includes(w.cat));
  const workingPool=levelWords.length>=10?levelWords:allW;
  // Smart word selection:
  // Priority 1: Words with errors (chronic mistakes)
  // Priority 2: Words never seen (introduce new)  
  // Priority 3: Words with low score seen recently
  
  let wordPick=null;
  
  // Check for chronic error words (3+ errors, score < 3)
  const errorWords=Object.entries(errors)
    .filter(([id,e])=>e.count>=2)
    .sort(([,a],[,b])=>b.count-a.count)
    .map(([id])=>allW.find(w=>w.id===id))
    .filter(w=>w&&(wb[w.id]?.sc||0)<3);
  
  if(errorWords.length>0){
    // Pick least recently practiced error word
    wordPick=errorWords[0];
  }
  
  if(!wordPick){
    // Find unseen words (never practiced)
    const unseenWords=allW.filter(w=>!wb[w.id]||wb[w.id].seen===0);
    if(unseenWords.length>0){
      // Pick based on difficulty level (B1 first, then B2, then C1)
      const byLevel=unseenWords.sort((a,b)=>a.d-b.d);
      wordPick=byLevel[0];
    }
  }
  
  if(!wordPick){
    // Fallback: word with lowest score
    const sorted=sortedW('all');
    wordPick=sorted[0]||allW[0]||null;
  }
  if(!wordPick){
    // No words at all — return stub lesson
    return {date:tk,word:null,gramTopic:GRAM[0]?.id||'modals',isReview:false,
      steps:[{id:'lesson',label:'Ξεκίνα',desc:'Πήγαινε στο Vocabulary',done:false,xp:5}]};
  }
  
  // Smart grammar selection: pick chapter with most errors
  const gramErrors=DB.get('gramErr',{});
  const gramTopics=GRAM.map(g=>g.id);
  let gramTopic=gramTopics[new Date().getDate()%gramTopics.length];
  
  // If there are grammar errors, pick the most problematic chapter
  const topGramError=Object.entries(gramErrors)
    .sort(([,a],[,b])=>b.count-a.count)[0];
  if(topGramError&&gramTopics.includes(topGramError[0])){
    gramTopic=topGramError[0];
  }
  
  const lesson={
    date:tk,
    word:wordPick,
    gramTopic,
    isReview:errorWords.includes(wordPick),
    steps:[
      {id:'learn',label:'Μάθε τη λέξη',desc:'',done:false,xp:10},
      {id:'context',label:'Δες παραδείγματα',desc:'',done:false,xp:10},
      {id:'grammar',label:'Grammar tip',desc:'',done:false,xp:15},
      {id:'quiz',label:'Mini Quiz',desc:'',done:false,xp:20},
      {id:'write',label:'Γράψε πρόταση',desc:'',done:false,xp:25},
    ],
    quizQ:null,
    userSentence:'',
  };
  DB.set('lesson_'+tk,lesson);
  return lesson;
}

function genContextSentence(word,variant){
  // Generate alternative context sentences
  const templates=[
    [
      `It is important to ${word.w} in professional settings.`,
      `She decided to ${word.w} as soon as possible.`,
      `The ability to ${word.w} is highly valued.`,
    ],
    [
      `Many experts ${word.w} that communication is key.`,
      `You should ${word.w} carefully before deciding.`,
      `Learning to ${word.w} takes time and practice.`,
    ]
  ];
  // For nouns/adj use different templates
  const nounTemplates=[
    [
      `The ${word.w} of the situation was clear to everyone.`,
      `Good ${word.w} leads to better outcomes.`,
      `There is a strong connection between ${word.w} and success.`,
    ],
    [
      `A high level of ${word.w} is required for this role.`,
      `The team showed great ${word.w} throughout the project.`,
      `Without ${word.w}, progress is difficult.`,
    ]
  ];
  const pool=word.p==='verb'?templates:nounTemplates;
  return pool[variant-1]?.[Math.floor(Math.random()*3)]||word.e;
}

function markStep(idx){
  const lesson=getTodayLesson();
  if(lesson.steps[idx].done)return;
  lesson.steps[idx].done=true;
  saveTodayLesson(lesson);
  addXP(lesson.steps[idx].xp);
  // Step 1 (learn word) = mark word as seen in vocab
  if(idx===0&&lesson.word){
    const wb=getWB();
    const old=wb[lesson.word.id]||{sc:0,st:0,nr:0,seen:0};
    if(old.seen===0){
      wb[lesson.word.id]={...old,seen:1,nr:Date.now()+86400000};
      DB.set('wb',wb);
    }
  }
  // Step 4 (quiz) also calls setWS so that's handled in lessonQuizSel
  // All steps done
  if(lesson.steps.every(s=>s.done)){
    toast('🎉 Μάθημα ολοκληρώθηκε! +'+lesson.steps.reduce((s,x)=>s+x.xp,0)+' XP','var(--gr)');
    unlockAch('w10');
    // Mark word as learned in vocab system
    if(lesson.word) setWS(lesson.word.id, true);
  }
  rLessons();
}

function lessonQuizSel(i){
  const lesson=getTodayLesson();
  if(!lesson.quizQ||lesson.quizQ.done)return;
  lesson.quizQ.sel=i;
  const correct=lesson.quizQ.opts[i]===lesson.word.g;
  lesson.quizQ.done=true;
  if(correct){
    lesson.steps[3].done=true;
    addXP(lesson.steps[3].xp);
    setWS(lesson.word.id,true);
    toast('🎯 Σωστά! +'+lesson.steps[3].xp+' XP','var(--gr)');
  } else {
    setWS(lesson.word.id,false);
    trackError(lesson.word.id,'lesson');
    toast('💡 Σωστό ήταν: "'+lesson.word.g+'"','var(--ro)');
  }
  saveTodayLesson(lesson);
  rLessons();
}

function updateLessonSentence(val){
  const lesson=getTodayLesson();
  lesson.userSentence=val;
  saveTodayLesson(lesson);
}

/* ══ ERROR TRACKER ══ */
function trackError(wordId,type){
  const errors=DB.get('errors',{});
  if(!errors[wordId])errors[wordId]={count:0,types:[],lastErr:null};
  errors[wordId].count++;
  errors[wordId].types.push(type);
  errors[wordId].lastErr=todayK();
  DB.set('errors',errors);
}

function getTopErrors(n=10){
  const errors=DB.get('errors',{});
  return Object.entries(errors)
    .sort(([,a],[,b])=>b.count-a.count)
    .slice(0,n)
    .map(([id,e])=>({word:getAllW().find(w=>w.id===id),errors:e}))
    .filter(x=>x.word);
}

let BST={idx:0,placed:[],score:0,total:0,done:false,filter:'all',showResult:false};

function rBuilder(){
  const el=document.getElementById('builder')||document.getElementById('vocab')||document.body;
  const filtered=BST.filter==='all'?BUILDER_SENTENCES:BUILDER_SENTENCES.filter(s=>s.lv===BST.filter);
  const sent=filtered[BST.idx%filtered.length];
  if(!sent){el.innerHTML='<div class="sec">Δεν υπάρχουν προτάσεις.</div>';return;}

  // Shuffle the words for display
  const shuffled=[...sent.words].sort(()=>Math.random()-.5);
  const placedWords=BST.placed;
  const isCorrect=BST.showResult&&placedWords.join(' ').toLowerCase()===sent.answer.toLowerCase();
  const isWrong=BST.showResult&&!isCorrect;

  el.innerHTML=`<div class="sec fu" style="max-width:760px">
    <div class="sl mb4" style="color:var(--tl)">SENTENCE BUILDER</div>
    <div class="fx ac jb mb4"><div class="fp f16 b">Κατασκεύασε Προτάσεις</div>
      <button onclick="rSentenceMining()" style="padding:4px 12px;background:var(--vi)1a;border:1px solid var(--vi)33;border-radius:20px;color:var(--vi);font-size:11px;cursor:pointer">📝 Sentence Mining</button>
    </div>
    <p class="f12 c2 mb16" style="line-height:1.6">Κλικ στις λέξεις για να φτιάξεις σωστή πρόταση. Εξάσκηση word order και grammar.</p>

    <!-- Filter & Progress -->
    <div class="fx ac jb mb16">
      <div class="fx g6">
        ${['all','B1','B2','C1'].map(f=>`<button onclick="BST.filter='${f}';BST.idx=0;BST.placed=[];BST.done=false;BST.showResult=false;rBuilder()" style="padding:4px 12px;border-radius:20px;border:1px solid ${BST.filter===f?'var(--tl)':'var(--ln)'};background:${BST.filter===f?'var(--s3)':'transparent'};color:${BST.filter===f?'var(--tl)':'var(--t3)'};font-size:11px;cursor:pointer">${f==='all'?'Όλα':f}</button>`).join('')}
      </div>
      <div class="fx ac g8">
        <span class="tag f9" style="background:var(--tl)1a;border:1px solid var(--tl)33;color:var(--tl)">${sent.lv}</span>
        <span class="f11 c3">${(BST.idx%filtered.length)+1}/${filtered.length}</span>
        <span class="xp-pill">✓ ${BST.score}/${BST.total}</span>
      </div>
    </div>

    <!-- Drop zone -->
    <div class="f11 c3 mb6">Η πρότασή σου:</div>
    <div class="drop-zone ${placedWords.length?'has-words':''}" id="drop-zone" onclick="removeLastWord()">
      ${placedWords.length
        ?placedWords.map((w,i)=>`<span class="placed-word" onclick="removePlacedWord(${i},event)">${w} <span style="font-size:9px;opacity:.6">✕</span></span>`).join('')
        :'<span class="f12 c3" style="padding:4px">Κλικ στις λέξεις παρακάτω για να φτιάξεις την πρόταση...</span>'
      }
    </div>

    <!-- Result feedback -->
    ${BST.showResult?`<div style="padding:12px;border-radius:8px;margin-bottom:12px;background:${isCorrect?'#051a0a':'#1a0508'};border:1px solid ${isCorrect?'#22c77a44':'#f0387044'}">
      <div class="f13 b mb4" style="color:${isCorrect?'var(--gr)':'var(--ro)'}">${isCorrect?'✓ Σωστό!':'✗ Λάθος'}</div>
      ${!isCorrect?`<div class="f12 c2 mb4">Σωστή πρόταση: <strong style="color:var(--gr)">${sent.answer}</strong></div>`:''}
      <div class="f11 c3">💡 ${sent.tip}</div>
    </div>`:''}

    <!-- Action buttons -->
    <div class="fx g8 mb16">
      ${!BST.showResult
        ?`<button onclick="checkBuilder()" class="btn bp" style="${!placedWords.length?'opacity:.4':''}"  ${!placedWords.length?'disabled':''}>✓ Έλεγχος</button>
           <button onclick="clearBuilder()" class="btn bgh bsm">✕ Ξεκινήστε πάλι</button>
           <button onclick="showHint()" class="btn bgh bsm" style="margin-left:auto">💡 Βοήθεια</button>`
        :`<button onclick="nextBuilder(${isCorrect})" class="btn bp">→ Επόμενη</button>
           <button onclick="clearBuilder()" class="btn bgh bsm">↺ Ξανά</button>`
      }
    </div>

    <div class="f11 c3 mb8">Διαθέσιμες λέξεις:</div>
    <div style="padding:12px;background:var(--s2);border:1px solid var(--ln);border-radius:var(--r)">
      ${shuffled.map((word,i)=>{
        const isPlaced=placedWords.filter(w=>w===word).length >= sent.words.filter(w=>w===word).length;
        return `<span class="builder-word ${isPlaced?'used':''}" onclick="placeWord('${word.replace(/'/g,"\\'")}',${isPlaced})">${word}</span>`;
      }).join('')}

      </div>
    </div>
  </div>`;
}

function placeWord(word,isUsed){
  if(isUsed||BST.showResult)return;
  BST.placed.push(word);
  rBuilder();
}

function removePlacedWord(idx,e){
  e.stopPropagation();
  BST.placed.splice(idx,1);
  rBuilder();
}

function removeLastWord(){
  if(BST.placed.length&&!BST.showResult){
    BST.placed.pop();
    rBuilder();
  }
}

function clearBuilder(){
  BST.placed=[];BST.showResult=false;rBuilder();
}

function checkBuilder(){
  if(!BST.placed.length)return;
  BST.showResult=true;
  BST.total++;
  const filtered=BST.filter==='all'?BUILDER_SENTENCES:BUILDER_SENTENCES.filter(s=>s.lv===BST.filter);
  const sent=filtered[BST.idx%filtered.length];
  const correct=BST.placed.join(' ').toLowerCase()===sent.answer.toLowerCase();
  if(correct){
    BST.score++;
    addXP(20);
    toast('🎯 Σωστά! +20 XP','var(--gr)');
  } else {
    addXP(5);
    toast('✗ Λάθος — δες τη σωστή πρόταση','var(--ro)');
  }
  rBuilder();
}

function nextBuilder(wasCorrect){
  BST.idx++;BST.placed=[];BST.showResult=false;rBuilder();
}

function showHint(){
  const filtered=BST.filter==='all'?BUILDER_SENTENCES:BUILDER_SENTENCES.filter(s=>s.lv===BST.filter);
  const sent=filtered[BST.idx%filtered.length];
  const firstWord=sent.answer.split(' ')[0];
  if(!BST.placed.length){
    BST.placed=[firstWord];
    toast('Hint: Αρχίζει με "'+firstWord+'"','var(--am)');
    rBuilder();
  } else {
    toast('💡 '+sent.tip,'var(--am)');
  }
}

function ffSelect(idx,opt){
  if(FFST.show)return;
  FFST.sel=idx;FFST.show=true;FFST.total++;
  const ff=FALSE_FRIENDS[FFST.qidx%FALSE_FRIENDS.length];

    addXP(3);

  }
  if(FFST.total===FALSE_FRIENDS.length&&FFST.score===FALSE_FRIENDS.length)unlockAch('pq');
  rFalseFriends();
}

function ffNext(){
  FFST.qidx++;FFST.sel=-1;FFST.show=false;

}

  CQST.sel=idx;CQST.total++;

  rCollocations();

function importData(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.wb){const wb=getWB();Object.assign(wb,d.wb);DB.set('wb',wb);}
      if(d.customW)DB.set('customW',d.customW);
      if(d.comp)DB.set('comp',d.comp);
      if(d.wlog)DB.set('wlog',d.wlog);
      if(d.xp!==undefined)DB.set('xp',d.xp);
      if(d.achs)DB.set('achs',d.achs);
      if(d.notes)DB.set('trnotes',d.notes);
      updXP();toast('Import επιτυχής ✓','var(--gr)');
      setTimeout(()=>go('home'),500);
    }catch(err){toast('Σφάλμα κατά το import!','var(--ro)');}
  };
  reader.readAsText(file);
}

let TIMER={active:false,secs:0,total:0,interval:null,mode:'study'};

function startTimer(){
  if(TIMER.active)return;
  TIMER.active=true;
  TIMER.secs=0;
  TIMER.mode='study';
  updateTimerDisplay();
  TIMER.interval=setInterval(()=>{
    TIMER.secs++;
    TIMER.total++;
    // Save every minute
    if(TIMER.secs%60===0){
      const mins=DB.get('study_mins_'+todayK(),0)+1;
      DB.set('study_mins_'+todayK(),mins);
    }
    // Pomodoro: 25 min study → 5 min break
    if(TIMER.secs===25*60){
      clearInterval(TIMER.interval);
      TIMER.active=false;
      showCelebration('⏱ 25 Λεπτά Μελέτης!','Εξαιρετικό! Κάνε 5 λεπτά διάλειμμα.',20,null,null);
      addXP(20);
      TIMER.secs=0;
    }
    updateTimerDisplay();
  },1000);
  document.getElementById('timer-btn').style.color='var(--gr)';
  toast('⏱ Ξεκίνησε ο χρονόμετρος μελέτης!','var(--gr)');
}

function stopTimer(){
  if(!TIMER.active)return;
  clearInterval(TIMER.interval);
  TIMER.active=false;
  const mins=Math.floor(TIMER.secs/60);
  const secs=TIMER.secs%60;
  toast(`⏱ Μελέτησες ${mins}:${String(secs).padStart(2,'0')} — καλή δουλειά!`,'var(--am)');
  TIMER.secs=0;
  updateTimerDisplay();
  document.getElementById('timer-btn').style.color='';
}

function toggleTimer(){
  TIMER.active?stopTimer():startTimer();
}

function updateTimerDisplay(){
  const btn=document.getElementById('timer-btn');
  if(!btn)return;
  if(TIMER.active){
    const mins=Math.floor(TIMER.secs/60);
    const secs=TIMER.secs%60;
    btn.textContent=`⏱ ${mins}:${String(secs).padStart(2,'0')}`;
  } else {
    btn.textContent='⏱';
  }
}

/* ══ EVENING RECALL ══ */
function startEveningRecall(){
  const allW=getAllW();
  const errors=DB.get('errors',{});
  const wb=getWB();
  const errWords=allW.filter(w=>errors[w.id]&&errors[w.id].count>=2).slice(0,3);
  const recentW=allW.filter(w=>wb[w.id]&&wb[w.id].seen>0)
    .sort((a,b)=>(wb[b.id]?.seen||0)-(wb[a.id]?.seen||0)).slice(0,5);
  const pool=[...new Map([...errWords,...recentW].map(w=>[w.id,w])).values()].slice(0,5);
  if(!pool.length){toast('Δεν υπάρχουν λέξεις για επανάληψη ακόμα!','var(--am)');return;}

  // Store state globally
  DB.set('er_pool', pool.map(w=>w.id));
  DB.set('er_state', {});
  DB.set('er_idx', 0);

  let modal=document.getElementById('er-modal');
  if(!modal){
    modal=document.createElement('div');
    modal.id='er-modal';
    modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9997;display:flex;align-items:center;justify-content:center;padding:20px';
    document.body.appendChild(modal);
  }
  renderERModal();
}

function renderERModal(){
  const modal=document.getElementById('er-modal');
  if(!modal)return;

  const poolIds=DB.get('er_pool',[]);

  const allW=getAllW();
  const pool=poolIds.map(id=>allW.find(w=>w.id===id)).filter(Boolean);

  if(idx>=pool.length){
    const state=DB.get('er_state',{});

      +'<div style="font-size:13px;color:var(--t3);margin-bottom:20px">'+correct+'/'+pool.length+' σωστές · +'+(correct*12+5)+' XP</div>'
      +'<button onclick="closeTopModal()" style="padding:10px 24px;background:var(--bl);border-radius:8px;color:#fff;font-weight:700;cursor:pointer;border:none">Κλείσιμο</button></div>';
    return;
  }

  const w=pool[idx];
  modal.innerHTML='';
  const div=document.createElement('div');

  hint.textContent='Γράψε στα Αγγλικά:';

  inp.id='er-inp';

  inp.style.cssText='width:100%;padding:10px;background:var(--s2);border:1px solid var(--ln);border-radius:8px;color:var(--t1);font-size:14px;box-sizing:border-box;margin-bottom:10px';
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')submitERAnswer();});

  const btn=document.createElement('button');

  btn.style.cssText='width:100%;padding:10px;background:var(--bl);border-radius:8px;color:#fff;font-weight:700;cursor:pointer;border:none';

function submitERAnswer(){
  const inp=document.getElementById('er-inp');
  if(!inp)return;
  const poolIds=DB.get('er_pool',[]);
  const idx=DB.get('er_idx',0);
  const allW=getAllW();
  const w=allW.find(x=>x.id===poolIds[idx]);
  if(!w)return;
  const correct=inp.value.trim().toLowerCase()===w.w.toLowerCase();
  setWS(w.id,correct);
  addXP(correct?12:3);
  const state=DB.get('er_state',{});
  state[w.id]={correct};
  DB.set('er_state',state);
  DB.set('er_idx',idx+1);

  // Show result
  const modal=document.getElementById('er-modal');
  if(modal){
    modal.innerHTML='<div style="background:var(--s1);border-radius:16px;padding:28px;max-width:400px;text-align:center">'
      +'<div style="font-size:32px;margin-bottom:12px">'+(correct?'✅':'❌')+'</div>'
      +'<div style="font-size:16px;font-weight:700;margin:12px 0;color:'+(correct?'var(--gr)':'var(--ro)')+'">'+w.w+'</div>'
      +'<div style="font-size:12px;color:var(--t3)">'+w.g+'</div></div>';
    setTimeout(()=>renderERModal(),1500);
  }
}

let ILST={shuffled:[],idx:0,sel:null,score:0,total:0,done:false};
function startInterleaved(){
  const bank=typeof INTERLEAVED_BANK!=='undefined'?INTERLEAVED_BANK:buildILBank();
  ILST={shuffled:[...bank].sort(()=>Math.random()-.5).slice(0,5),idx:0,sel:null,score:0,total:0,done:false};
  renderILModal();
}
function buildILBank(){
  const bank=[];
  TENSES.forEach(t=>{if(t.quiz)t.quiz.slice(0,2).forEach(q=>bank.push({...q,source:t.name}));});
  GRAM.forEach(g=>{if(g.exercises)g.exercises.slice(0,2).forEach(q=>bank.push({...q,source:g.t}));});
  return bank;
}
function renderILModal(){
  let modal=document.getElementById('il-modal');
  if(!modal){modal=document.createElement('div');modal.id='il-modal';modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9997;display:flex;align-items:center;justify-content:center;padding:20px';document.body.appendChild(modal);}

    modal.innerHTML='<div style="background:var(--s1);border-radius:16px;padding:28px;max-width:400px;text-align:center">'
      +'<div style="font-size:40px;margin-bottom:12px">⚡</div>'

      +'<button onclick="document.getElementById(\'il-modal\').remove()" style="padding:10px 24px;background:var(--bl);border-radius:8px;color:#fff;font-weight:700;cursor:pointer;border:none">OK</button></div>';
    return;
  }
  const q=ILST.shuffled[ILST.idx];
  const opts=(q.opts||[]).map((opt,i)=>'<button onclick="ilSelect('+i+')" style="padding:9px 12px;background:var(--s2);border:1px solid var(--ln);border-radius:8px;text-align:left;cursor:pointer;font-size:12px;color:var(--t1)">'+opt+'</button>').join('');
  modal.innerHTML='<div style="background:var(--s1);border-radius:16px;padding:24px;max-width:480px;width:100%">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
    +'<div style="font-size:11px;color:var(--t3)">⚡ MIXED PRACTICE · '+(ILST.idx+1)+'/'+ILST.shuffled.length+'</div>'
    +'<button onclick="document.getElementById(\'il-modal\').remove()" style="background:none;border:none;color:var(--t3);cursor:pointer">✕</button></div>'
    +(q.source?'<div style="font-size:10px;color:var(--bl);margin-bottom:8px">'+q.source+'</div>':'')
    +'<div style="font-size:14px;font-weight:600;margin-bottom:16px;line-height:1.6">'+q.q+'</div>'
    +'<div style="display:grid;gap:8px">'+opts+'</div></div>';
}

function ilSelect(idx){
  const q=ILST.shuffled[ILST.idx];
  const opt=(q.opts||[])[idx];
  const correct=opt===q.a;
  if(correct)ILST.score++;
  ILST.total++;
  addXP(correct?10:2);
  ILST.idx++;
  renderILModal();
}

/* ══ ADAPTIVE RECOMMENDATION ══ */
function getAdaptiveRecommendation(){
  const recs=[];
  try{
    const lc=learnedW().length;const due=dueW().length;
    if(due>=5)recs.push({priority:10,msg:'🔥 '+due+' λέξεις χρειάζονται επανάληψη',action:"go('vocab')"});
    const streak=calcStreak();
    if(streak===0)recs.push({priority:8,msg:'📅 Ξεκίνα το streak σήμερα!',action:"go('lessons')"});
    const tDone=DB.get('tDone',[]).length;
    if(tDone<9)recs.push({priority:6,msg:'⏱ '+tDone+'/9 Tenses — συνέχισε!',action:"go('tenses')"});
    const gramDone=DB.get('gramDone',[]);
    const gramTopics=['modals','reported','relative','conditionals','passive','articles','connectors','prepositions','gerunds','quantifiers','wordorder','verbpatterns'];
    const nextGram=gramTopics.find(id=>!gramDone.includes(id));
    if(nextGram){const g=GRAM.find(x=>x.id===nextGram);if(g)recs.push({priority:5,msg:'✏ Grammar: '+g.t,action:"GST={topic:'"+nextGram+"',ea:{},es:false};go('grammar')"});}
    const lastWrite=DB.get('last_write_date',null);
    const daysSince=lastWrite?Math.floor((Date.now()-new Date(lastWrite).getTime())/86400000):99;
    if(daysSince>=3)recs.push({priority:4,msg:'✍ '+daysSince+' μέρες χωρίς Writing',action:"go('writing')"});
  }catch(e){}
  return recs.sort((a,b)=>b.priority-a.priority);
}

  const sys=sc
    ?'You are a helpful English conversation partner. Scenario: '+sc.title+'. Respond naturally in English (2-3 sentences max). After turn 6, give brief encouraging feedback in Greek.'
    :'You are a helpful English conversation partner. Respond naturally in English (2-3 sentences max).';
  // Build message history (exclude last user message - it will be the userContent)
  const prevHistory=CONVST.history.slice(0,-1); // exclude the just-added user msg
  try{
    const result=await callAI(userText, sys, prevHistory.slice(-10));
    CONVST.history.push({role:'assistant',content:result});
    CONVST.loading=false;
    if(CONVST.turn>=6){unlockAch('ai1');CONVST.done=true;}

    CONVST.turn--;

    rAIConversation();
  }

function getWordNetwork(word){
  const w=getAllW().find(x=>x.w===word||x.id===word);
  if(!w)return{word,related:[]};
  const related=getAllW().filter(x=>x.id!==w.id&&(
    x.cat===w.cat||(w.f&&w.f.some(f=>x.w.includes(f)||x.g.includes(f.substring(0,4))))
  )).slice(0,6).map(x=>({word:x.w,type:'related'}));
  return{word:w.w,related};
}

  const inp=document.createElement('input');
  inp.id='fill-inp';
  inp.placeholder='Type the missing word...';
  inp.style.cssText='width:100%;padding:10px;background:var(--s2);border:1px solid var(--ln);border-radius:8px;color:var(--t1);font-size:14px;box-sizing:border-box;margin-bottom:10px';
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkFill();});
  const btn=document.createElement('button');
  btn.textContent='Έλεγχος →';
  btn.style.cssText='width:100%;padding:10px;background:var(--bl);border-radius:8px;color:#fff;font-weight:700;cursor:pointer;border:none';
  btn.onclick=checkFill;
  div.appendChild(inp);
  div.appendChild(btn);
  el.appendChild(div);
  setTimeout(()=>inp.focus(),100);
}

function checkFill(){
  const inp=document.getElementById('fill-inp');
  if(!inp)return;
  const q=VS.q;
  const cw=q.sess[q.idx];
  const w=getAllW().find(x=>x.id===cw.id);
  if(!w)return;
  const ans=inp.value.trim().toLowerCase();
  const correct=ans===w.w.toLowerCase();
  setWS(w.id,correct);
  addXP(correct?15:3);
  vRec(correct,w,document.getElementById('vm'));
}

function closeTopModal(){
  const modals=['quick-modal','placement-modal','cefr-modal','il-modal','er-modal','onboard-modal'];
  for(const id of modals){
    const m=document.getElementById(id);
    if(m){m.remove();return;}
  }
  // Try generic fixed modal
  const fixed=document.querySelector('[style*="position:fixed"][style*="z-index"]');
  if(fixed)fixed.remove();
}

function exportVocabCSV(){
  const words=getAllW();
  const wb=getWB();
  const rows=[['Word','Greek','Example','Category','Score','Seen']];
  words.forEach(w=>{
    const s=wb[w.id]||{sc:0,seen:0};
    rows.push([w.w,w.g,w.e||'',w.cat,s.sc,s.seen||0]);
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');

  a.href=URL.createObjectURL(blob);
  a.download='vocabulary.csv';

}

function saveSentence(sentence){
  if(!sentence)return;
  const saved=DB.get('saved_sentences',[]);
  if(!saved.includes(sentence)){
    saved.push(sentence);
    DB.set('saved_sentences',saved);
    toast('✅ Πρόταση αποθηκεύτηκε!','var(--gr)');
  }
}

function showWeeklySummary(){
  const xpd=DB.get('xpd',{});
  const today=new Date();
  let totalXP=0,days=0;
  const rows=[];
  for(let i=6;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const k=d.toISOString().split('T')[0];
    const dayXP=xpd[k]||0;
    if(dayXP>0)days++;
    totalXP+=dayXP;
    rows.push('<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--ln)">'
      +'<span style="font-size:12px;color:var(--t3)">'+d.toLocaleDateString('el',{weekday:'short',month:'short',day:'numeric'})+'</span>'
      +'<span style="font-size:12px;font-weight:600;color:'+(dayXP>0?'var(--am)':'var(--t3)')+'">'+dayXP+' XP</span>'
      +'</div>');
  }
  const m=document.createElement('div');
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9997;display:flex;align-items:center;justify-content:center;padding:20px';
  m.onclick=(e)=>{if(e.target===m)m.remove();};
  m.innerHTML='<div style="background:var(--s1);border-radius:16px;padding:24px;max-width:400px;width:100%">'
    +'<div style="font-size:16px;font-weight:700;margin-bottom:4px">📊 Εβδομαδιαία Σύνοψη</div>'
    +'<div style="font-size:11px;color:var(--t3);margin-bottom:16px">'+days+'/7 ημέρες · '+totalXP+' XP σύνολο</div>'
    +rows.join('')
    +'<button onclick="closeTopModal()" style="margin-top:16px;padding:10px;background:var(--bl);border-radius:8px;color:#fff;font-weight:700;cursor:pointer;border:none;width:100%">OK</button>'
    +'</div>';
  document.body.appendChild(m);
}

function rClozeTest(){
  const el=document.querySelector('#reading .vm')||document.getElementById('reading');
  if(!el)return;
  const arts=READINGS||[];
  if(CLST.art===null){
    el.innerHTML='<div style="max-width:700px;margin:0 auto">'
      +'<div class="sl mb16">📝 CLOZE TESTS</div>'
      +'<div style="display:grid;gap:8px">'
      +arts.map(a=>'<button onclick="startCloze(this)" data-id="'+a.id+'" style="padding:14px 16px;background:var(--s2);border:1px solid var(--ln);border-radius:10px;cursor:pointer;text-align:left;transition:all .15s">'
        +'<div style="font-size:13px;font-weight:600">'+a.t+'</div>'
        +'<div style="font-size:11px;color:var(--t3);margin-top:4px">'+a.lv+' · '+a.time+'</div>'
        +'</button>').join('')
      +'</div></div>';
    return;
  }
  const art=arts.find(a=>a.id===CLST.art);
  if(!art){CLST.art=null;rClozeTest();return;}
  const vocab=art.vocab||[];
  const stripped=(typeof art.text==='string'?art.text.replace(/<[^>]+>/g,''):art.text);
  let clozed=stripped;
  vocab.forEach((w,i)=>{
    const re=new RegExp('\\b'+w+'\\b','i');
    clozed=clozed.replace(re,'<input id="clz-'+i+'" data-ans="'+w+'" placeholder="____" style="width:80px;padding:2px 6px;background:var(--s2);border:1px solid var(--ln);border-radius:4px;color:var(--t1);font-size:13px">');
  });
  el.innerHTML='<div style="max-width:700px;margin:0 auto">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
    +'<div class="sl">📝 '+art.t+'</div>'
    +'<button onclick="CLST.art=null;rClozeTest()" style="font-size:11px;color:var(--t3);background:none;border:none;cursor:pointer">← Πίσω</button>'
    +'</div>'
    +'<div style="font-size:14px;line-height:2;margin-bottom:20px">'+clozed+'</div>'
    +'<button onclick="checkCloze()" class="btn bp">Έλεγχος ✓</button>'
    +'</div>';
}
function checkCloze(){
  let correct=0,total=0;
  document.querySelectorAll('[id^=clz-]').forEach(inp=>{
    total++;
    const ans=inp.dataset.ans.toLowerCase();
    const val=inp.value.trim().toLowerCase();
    if(val===ans){correct++;inp.style.borderColor='var(--gr)';}
    else{inp.style.borderColor='var(--ro)';inp.placeholder=inp.dataset.ans;}
  });
  addXP(correct*5);
  toast(correct+'/'+total+' σωστές! +'+correct*5+' XP','var(--gr)');
}

function startRoleplay(btn){

function startCloze(btn){

/* ══ RESET PROGRESS ══ */
function resetAllProgress(){
  if(!confirm('Είσαι σίγουρος; Θα χαθούν ΟΛΟΙ οι βαθμοί, XP και πρόοδος!'))return;
  // Clear all progress keys
  const keep=['light_mode','player_name','notif_time','api_key','onboarded','placement_done','placement_lv'];
  const allKeys=Object.keys(localStorage);
  allKeys.forEach(k=>{
    if(!keep.some(kk=>k===kk||k.startsWith('persist_'))){
      localStorage.removeItem(k);
    }
  });
  // Reset state objects
  CONVST={scenario:null,history:[],turn:0,loading:false,done:false};
  RPST={scenario:null,history:[],turn:0,loading:false,done:false,scores:[]};
  CLST={art:null,answers:{},checked:false};
  CEFRST={active:false,idx:0,answers:{},done:false,score:0};
  PLST={active:false,idx:0,answers:{},done:false};
  TST={idx:0,tab:'theory',qa:{},qs:false,qsc:null,ta:{},tc:{},te:{},ts:{},tips:false,cmp:0};
  GST={topic:null,ea:{},es:false};
  VS={mode:'all',cat:'all',search:'',sbOpen:true,q:{mode:'mixed',sess:[],idx:0,res:[],fl:false,opts:[],sel:-1,fill:'',fd:false}};
  toast('✅ Πρόοδος επαναφέρθηκε!','var(--gr)');
  go('home');
}
