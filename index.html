function getTodayLesson(){
  const tk=todayK();
  const saved=DB.get('lesson_'+tk,null);
  if(saved)return saved;
  
  const allW=getAllW();
  const errors=DB.get('errors',{});
  const wb=getWB();
  
  // Smart word selection:
  // Priority 1: Words with errors (chronic mistakes)
  // Priority 2: Words never seen (introduce new)  
  // Priority 3: Words with low score seen recently
  
  let wordPick=null;
  
  // Check for chronic error words (3+ errors, score < 3)
  const errorWords=Object.entries(errors)
    .filter(([id,e])=>e.count>=2)
    .sort(([,a],[,b])=>b.count-a.count)
    .map(([id])=>allW.find(w=>w.id===id))
    .filter(w=>w&&(wb[w.id]?.sc||0)<3);
  
  if(errorWords.length>0){
    // Pick least recently practiced error word
    wordPick=errorWords[0];
  }
  
  if(!wordPick){
    // Find unseen words (never practiced)
    const unseenWords=allW.filter(w=>!wb[w.id]||wb[w.id].seen===0);
    if(unseenWords.length>0){
      // Pick based on difficulty level (B1 first, then B2, then C1)
      const byLevel=unseenWords.sort((a,b)=>a.d-b.d);
      wordPick=byLevel[0];
    }
  }
  
  if(!wordPick){
    // Fallback: word with lowest score
    const sorted=sortedW('all');
    wordPick=sorted[0]||allW[0];
  }
  
  // Smart grammar selection: pick chapter with most errors
  const gramErrors=DB.get('gramErr',{});
  const gramTopics=GRAM.map(g=>g.id);
  let gramTopic=gramTopics[new Date().getDate()%gramTopics.length];
  
  // If there are grammar errors, pick the most problematic chapter
  const topGramError=Object.entries(gramErrors)
    .sort(([,a],[,b])=>b.count-a.count)[0];
  if(topGramError&&gramTopics.includes(topGramError[0])){
    gramTopic=topGramError[0];
  }
  
  const lesson={
    date:tk,
    word:wordPick,
    gramTopic,
    isReview:errorWords.includes(wordPick),
    steps:[
      {id:'learn',label:'Μάθε τη λέξη',desc:'',done:false,xp:10},
      {id:'context',label:'Δες παραδείγματα',desc:'',done:false,xp:10},
      {id:'grammar',label:'Grammar tip',desc:'',done:false,xp:15},
      {id:'quiz',label:'Mini Quiz',desc:'',done:false,xp:20},
      {id:'write',label:'Γράψε πρόταση',desc:'',done:false,xp:25},
    ],
    quizQ:null,
    userSentence:'',
  };
  DB.set('lesson_'+tk,lesson);
  return lesson;
}

function genContextSentence(word,variant){
  // Generate alternative context sentences
  const templates=[
    [
      `It is important to ${word.w} in professional settings.`,
      `She decided to ${word.w} as soon as possible.`,
      `The ability to ${word.w} is highly valued.`,
    ],
    [
      `Many experts ${word.w} that communication is key.`,
      `You should ${word.w} carefully before deciding.`,
      `Learning to ${word.w} takes time and practice.`,
    ]
  ];
  // For nouns/adj use different templates
  const nounTemplates=[
    [
      `The ${word.w} of the situation was clear to everyone.`,
      `Good ${word.w} leads to better outcomes.`,
      `There is a strong connection between ${word.w} and success.`,
    ],
    [
      `A high level of ${word.w} is required for this role.`,
      `The team showed great ${word.w} throughout the project.`,
      `Without ${word.w}, progress is difficult.`,
    ]
  ];
  const pool=word.p==='verb'?templates:nounTemplates;
  return pool[variant-1]?.[Math.floor(Math.random()*3)]||word.e;
}

function markStep(idx){
  const lesson=getTodayLesson();
  if(lesson.steps[idx].done)return;
  lesson.steps[idx].done=true;
  saveTodayLesson(lesson);
  addXP(lesson.steps[idx].xp);
  // Step 1 (learn word) = mark word as seen in vocab
  if(idx===0&&lesson.word){
    const wb=getWB();
    const old=wb[lesson.word.id]||{sc:0,st:0,nr:0,seen:0};
    if(old.seen===0){
      wb[lesson.word.id]={...old,seen:1,nr:Date.now()+86400000};
      DB.set('wb',wb);
    }
  }
  // Step 4 (quiz) also calls setWS so that's handled in lessonQuizSel
  // All steps done
  if(lesson.steps.every(s=>s.done)){
    toast('🎉 Μάθημα ολοκληρώθηκε! +'+lesson.steps.reduce((s,x)=>s+x.xp,0)+' XP','var(--gr)');
    unlockAch('w10');
    // Mark word as learned in vocab system
    if(lesson.word) setWS(lesson.word.id, true);
  }
  rLessons();
}

function lessonQuizSel(i){
  const lesson=getTodayLesson();
  if(!lesson.quizQ||lesson.quizQ.done)return;
  lesson.quizQ.sel=i;
  const correct=lesson.quizQ.opts[i]===lesson.word.g;
  lesson.quizQ.done=true;
  if(correct){
    lesson.steps[3].done=true;
    addXP(lesson.steps[3].xp);
    setWS(lesson.word.id,true);
    toast('🎯 Σωστά! +'+lesson.steps[3].xp+' XP','var(--gr)');
  } else {
    setWS(lesson.word.id,false);
    trackError(lesson.word.id,'lesson');
    toast('💡 Σωστό ήταν: "'+lesson.word.g+'"','var(--ro)');
  }
  saveTodayLesson(lesson);
  rLessons();
}

function updateLessonSentence(val){
  const lesson=getTodayLesson();
  lesson.userSentence=val;
  saveTodayLesson(lesson);
}

/* ══ ERROR TRACKER ══ */
function trackError(wordId,type){
  const errors=DB.get('errors',{});
  if(!errors[wordId])errors[wordId]={count:0,types:[],lastErr:null};
  errors[wordId].count++;
  errors[wordId].types.push(type);
  errors[wordId].lastErr=todayK();
  DB.set('errors',errors);
}

function getTopErrors(n=10){
  const errors=DB.get('errors',{});
  return Object.entries(errors)
    .sort(([,a],[,b])=>b.count-a.count)
    .slice(0,n)
    .map(([id,e])=>({word:getAllW().find(w=>w.id===id),errors:e}))
    .filter(x=>x.word);
}

let BST={idx:0,placed:[],score:0,total:0,done:false,filter:'all',showResult:false};

function rBuilder(){

  // Shuffle the words for display
  const shuffled=[...sent.words].sort(()=>Math.random()-.5);
  const placedWords=BST.placed;
  const isCorrect=BST.showResult&&placedWords.join(' ').toLowerCase()===sent.answer.toLowerCase();
  const isWrong=BST.showResult&&!isCorrect;

  el.innerHTML=`<div class="sec fu" style="max-width:760px">
    <div class="sl mb4" style="color:var(--tl)">SENTENCE BUILDER</div>

      </div>
      <div class="fx ac g8">
        <span class="tag f9" style="background:var(--tl)1a;border:1px solid var(--tl)33;color:var(--tl)">${sent.lv}</span>
        <span class="f11 c3">${(BST.idx%filtered.length)+1}/${filtered.length}</span>

        :'<span class="f12 c3" style="padding:4px">Κλικ στις λέξεις παρακάτω για να φτιάξεις την πρόταση...</span>'

      </div>
    </div>

function placeWord(word,isUsed){
  if(isUsed||BST.showResult)return;
  BST.placed.push(word);
  rBuilder();
}

function removePlacedWord(idx,e){
  e.stopPropagation();
  BST.placed.splice(idx,1);
  rBuilder();
}

function removeLastWord(){
  if(BST.placed.length&&!BST.showResult){
    BST.placed.pop();
    rBuilder();
  }
}

function clearBuilder(){
  BST.placed=[];BST.showResult=false;rBuilder();
}

function checkBuilder(){
  if(!BST.placed.length)return;
  BST.showResult=true;
  BST.total++;
  const filtered=BST.filter==='all'?BUILDER_SENTENCES:BUILDER_SENTENCES.filter(s=>s.lv===BST.filter);
  const sent=filtered[BST.idx%filtered.length];
  const correct=BST.placed.join(' ').toLowerCase()===sent.answer.toLowerCase();
  if(correct){
    BST.score++;
    addXP(20);
    toast('🎯 Σωστά! +20 XP','var(--gr)');
  } else {
    addXP(5);
    toast('✗ Λάθος — δες τη σωστή πρόταση','var(--ro)');
  }
  rBuilder();
}

function nextBuilder(wasCorrect){
  BST.idx++;BST.placed=[];BST.showResult=false;rBuilder();
}

function showHint(){
  const filtered=BST.filter==='all'?BUILDER_SENTENCES:BUILDER_SENTENCES.filter(s=>s.lv===BST.filter);
  const sent=filtered[BST.idx%filtered.length];
  const firstWord=sent.answer.split(' ')[0];
  if(!BST.placed.length){
    BST.placed=[firstWord];
    toast('Hint: Αρχίζει με "'+firstWord+'"','var(--am)');
    rBuilder();
  } else {
    toast('💡 '+sent.tip,'var(--am)');
  }
}

function ffSelect(idx,opt){
  if(FFST.show)return;
  FFST.sel=idx;FFST.show=true;FFST.total++;
  const ff=FALSE_FRIENDS[FFST.qidx%FALSE_FRIENDS.length];
  const correct=opt===ff.real;
  if(correct){
    FFST.score++;addXP(15);
    toast('✓ Σωστό! "'+ff.en+'" = '+ff.real+' +15 XP','var(--gr)');
  } else {
    addXP(3);
    toast('✗ Λάθος! "'+ff.en+'" = '+ff.real,'var(--ro)');
  }
  if(FFST.total===FALSE_FRIENDS.length&&FFST.score===FALSE_FRIENDS.length)unlockAch('pq');
  rFalseFriends();
}

function ffNext(){
  FFST.qidx++;FFST.sel=-1;FFST.show=false;
  rFalseFriends();
}

  const el=document.getElementById('vocab');

  const q=COLLOCATIONS[CQST.idx%COLLOCATIONS.length];
  // Generate wrong options (other verbs)

  const opts=[q.verb,...wrongVerbs].sort(()=>Math.random()-.5);
  
  vm.innerHTML=`<div style="max-width:560px;margin:0 auto" class="fu">

function cqSel(idx,verb){
  if(CQST.sel!==null)return;
  CQST.sel=idx;CQST.total++;
  const q=COLLOCATIONS[CQST.idx%COLLOCATIONS.length];
  if(verb===q.verb){

  } else {

    toast('✗ Σωστό: "'+q.verb+' '+q.noun+'"','var(--ro)');

  rCollocations();
}

function toggleTask(id){
  const comp=DB.get('comp',{});const today=todayK();
  const cur=comp[today]||[];
  const wasMarked=cur.includes(id);
  comp[today]=wasMarked?cur.filter(x=>x!==id):[...cur,id];
  DB.set('comp',comp);
  if(!wasMarked){
    const plan_item=PLAN.find(p=>p.id===id);
    if(plan_item) addXP(5);
    toast('✓ '+( PLAN.find(p=>p.id===id)?.label||id),'var(--gr)');
  }
  const s=calcStreak();if(s>=7)unlockAch('s7');if(s>=30)unlockAch('s30');
  const td=Object.keys(comp).filter(k=>(comp[k]||[]).length>=3).length;
  if(td>=10)unlockAch('st10');
  buildTRNav();rTRContent();
}

function addWL(){
  if(!TRNW.w.trim())return;
  const log=DB.get('wlog',[]);
  log.unshift({...TRNW,date:todayK()});
  DB.set('wlog',log.slice(0,300));
  TRNW={w:'',g:'',e:''};
  rTRContent();
  toast('Λέξη καταχωρήθηκε ✓','var(--gr)');addXP(5);
}
function removeWL(i){DB.set('wlog',DB.get('wlog',[]).filter((_,j)=>j!==i));rTRContent();}

function exportData(){

function importData(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.wb){const wb=getWB();Object.assign(wb,d.wb);DB.set('wb',wb);}
      if(d.customW)DB.set('customW',d.customW);
      if(d.comp)DB.set('comp',d.comp);
      if(d.wlog)DB.set('wlog',d.wlog);
      if(d.xp!==undefined)DB.set('xp',d.xp);
      if(d.achs)DB.set('achs',d.achs);
      if(d.notes)DB.set('trnotes',d.notes);
      updXP();toast('Import επιτυχής ✓','var(--gr)');
      setTimeout(()=>go('home'),500);
    }catch(err){toast('Σφάλμα κατά το import!','var(--ro)');}
  };
  reader.readAsText(file);
}

let TIMER={active:false,secs:0,total:0,interval:null,mode:'study'};

function startTimer(){
  if(TIMER.active)return;
  TIMER.active=true;
  TIMER.secs=0;
  TIMER.mode='study';
  updateTimerDisplay();
  TIMER.interval=setInterval(()=>{
    TIMER.secs++;
    TIMER.total++;
    // Save every minute
    if(TIMER.secs%60===0){
      const mins=DB.get('study_mins_'+todayK(),0)+1;
      DB.set('study_mins_'+todayK(),mins);
    }
    // Pomodoro: 25 min study → 5 min break
    if(TIMER.secs===25*60){
      clearInterval(TIMER.interval);
      TIMER.active=false;
      showCelebration('⏱ 25 Λεπτά Μελέτης!','Εξαιρετικό! Κάνε 5 λεπτά διάλειμμα.',20,null,null);
      addXP(20);
      TIMER.secs=0;
    }
    updateTimerDisplay();
  },1000);
  document.getElementById('timer-btn').style.color='var(--gr)';
  toast('⏱ Ξεκίνησε ο χρονόμετρος μελέτης!','var(--gr)');
}

function stopTimer(){
  if(!TIMER.active)return;
  clearInterval(TIMER.interval);
  TIMER.active=false;
  const mins=Math.floor(TIMER.secs/60);
  const secs=TIMER.secs%60;
  toast(`⏱ Μελέτησες ${mins}:${String(secs).padStart(2,'0')} — καλή δουλειά!`,'var(--am)');
  TIMER.secs=0;
  updateTimerDisplay();
  document.getElementById('timer-btn').style.color='';
}

function toggleTimer(){
  TIMER.active?stopTimer():startTimer();
}

function updateTimerDisplay(){
  const btn=document.getElementById('timer-btn');
  if(!btn)return;
  if(TIMER.active){
    const mins=Math.floor(TIMER.secs/60);
    const secs=TIMER.secs%60;
    btn.textContent=`⏱ ${mins}:${String(secs).padStart(2,'0')}`;
  } else {
    btn.textContent='⏱';
  }
}

document.addEventListener('keydown',function(e){
  // Only in vocab quiz
  if(VS.mode!=='fc'&&VS.mode!=='mc'&&VS.mode!=='fi'&&VS.mode!=='mx'&&VS.mode!=='review')return;
  const vm=document.getElementById('vm');if(!vm)return;
  const q=VS.q;if(!q||!q.sess||!q.sess[q.idx])return;
  const em=effMode(q.idx);

  if(em==='fc'){
    if(e.code==='Space'&&!q.fl){e.preventDefault();VS.q.fl=true;vm&&rQCard(vm);}
    else if((e.key==='y'||e.key==='Enter')&&q.fl){e.preventDefault();vRec(true);}
    else if(e.key==='n'&&q.fl){e.preventDefault();vRec(false);}
  } else if(em==='mc'){
    const num=parseInt(e.key);
    if(num>=1&&num<=4&&q.sel<0){

  } else if(em==='fi'){

function buildWeeklySummary(){
  const comp=DB.get('comp',{});
  const wb=getWB();
  const last7=getLast7();
  const today=todayK();
  
  // Words learned this week
  const weeklyLearned=Object.entries(wb).filter(([id,s])=>{
    if(s.sc<3)return false;
    // Check if score reached 3 in the last 7 days (approximate via seen count)
    return true;
  });
  
  // Days studied this week  
  const daysStudied=last7.filter(d=>(comp[d]||[]).length>=3).length;
  
  // Tasks completed this week
  const tasksTotal=last7.reduce((sum,d)=>(comp[d]||[]).length+sum,0);
  
  // XP earned this week (approximate from current)
  const xp=getXP();
  
  // Words due for review
  const due=dueW().length;
  
  // Error words
  const errors=DB.get('errors',{});
  const topErrors=Object.entries(errors)
    .sort(([,a],[,b])=>b.count-a.count)
    .slice(0,3)
    .map(([id])=>getAllW().find(w=>w.id===id)?.w)
    .filter(Boolean);
  
  // Streak
  const streak=calcStreak();
  
  return {daysStudied,tasksTotal,xp,due,topErrors,streak,learnedCount:learnedW().length};
}

  gerunds:"Write 2 sentences: one with enjoy/avoid + gerund, one with want/decide + infinitive.",

async function checkForcedOutput(){
  const text=FOSTATE.text.trim();
  if(text.length<10){toast('Γράψε τουλάχιστον μια πρόταση!','var(--am)');return;}
  
  FOSTATE.checking=true;
  const modal=document.getElementById('fo-modal');

  const btn=document.getElementById('fo-check-btn');
  if(btn){btn.textContent='⏳ Ελέγχω...';btn.disabled=true;}
  
  const prompt=FORCED_OUTPUT_PROMPTS[FOSTATE.topic]||'';
  
  try{
    let fb;
    try{
      const raw=await callAI(
        `You are an English teacher checking a Greek learner's writing exercise. 
Be encouraging but accurate. Respond ONLY in valid JSON (no markdown):
{
  "score": <1-10>,
  "correct": [<list of things done well>],
  "errors": [{"wrong":"<exact text>","correct":"<correction>","explanation":"<why, in Greek>"}],
  "tip": "<one key grammar tip in Greek>",
  "pass": <true if score>=6>
}`,
        `Task: ${prompt}

Student wrote:
${text}`,
        800
      );
      fb=JSON.parse(raw.replace(/```json|```/g,'').trim());
    }catch(e){
      if(e.message==='NO_API_KEY'||e.message==='INVALID_KEY'){FOSTATE.checking=false;renderFOModal(prompt);return;}
      fb={score:7,correct:['Good effort!'],errors:[],tip:'Keep practising!',pass:true};
    }
    
    const col=fb.score>=8?'var(--gr)':fb.score>=6?'var(--am)':'var(--ro)';
    FOSTATE.result=`<div style="padding:12px;background:var(--s2);border-radius:8px;border-left:3px solid ${col}">
      <div class="fx ac jb mb8">
        <span class="f12 b" style="color:${col}">${fb.pass?'✓ Πέρασες!':'✗ Δοκίμασε ξανά'}</span>
        <span class="fp f20 b" style="color:${col}">${fb.score}/10</span>
      </div>
      ${fb.correct?.length?`<div class="f11 cgr mb6">${fb.correct.map(x=>'✓ '+x).join(' · ')}</div>`:''}
      ${fb.errors?.length?fb.errors.map(e=>`<div class="f11 mb4" style="padding:6px;background:var(--s3);border-radius:6px">
        <span class="cro" style="text-decoration:line-through">${e.wrong}</span> → <span class="cgr b">${e.correct}</span>
        <span class="c3 ml8" style="margin-left:6px">— ${e.explanation}</span>
      </div>`).join(''):''}
      <div class="f11 cam mt6">💡 ${fb.tip}</div>
    </div>`;
    
    if(fb.pass){addXP(30);toast('✓ Forced Output +30 XP!','var(--gr)');}
    if(fb.score===10)unlockAch('pq');
    
  }catch(e){
    FOSTATE.result='<div class="f11 c3">Σφάλμα — δοκίμασε ξανά.</div>';
  }
  
  FOSTATE.checking=false;
  const m=document.getElementById('fo-modal');
  if(m)m.innerHTML=renderFOModal(prompt);
}

function skipForcedOutput(){
  const m=document.getElementById('fo-modal');
  if(m)m.remove();
  FOSTATE={active:false,topic:null,type:null,text:'',checking:false,result:null};
}

  const wb=getWB();

  const pool=[...new Set([...errorWords,...seen])].slice(0,5);

async function checkERAnswer(idx,wid,word,gTranslation){
  const a=ERST.answers[idx]||{translation:'',example:'',collocation:'',score:0};
  if(!a.translation&&!a.example){toast('Γράψε τουλάχιστον τη μετάφραση!','var(--am)');return;}
  
  a.checking=true;
  ERST.answers[idx]=a;
  renderERModal();
  
  // Simple scoring without API for speed
  const trCorrect=gTranslation.toLowerCase().split('/').some(t=>
    a.translation.toLowerCase().includes(t.trim().split(' ')[0])
  );
  const exHasWord=a.example.toLowerCase().includes(word.toLowerCase().split(' ')[0]);
  
  let score=0;
  if(trCorrect)score+=4;
  if(exHasWord&&a.example.length>10)score+=3;
  if(a.collocation.length>3)score+=3;
  
  a.score=score;
  a.checking=false;
  
  const passed=score>=6;
  a.result=`<div class="fx ac jb">
    <div>
      <div class="f11 b mb4" style="color:${passed?'var(--gr)':'var(--am)'}">${passed?'✓ Καλή ανάκληση!':'Σωστό: "'+gTranslation+'"'}</div>
      ${!trCorrect?`<div class="f10 c3">Μετάφραση: <strong>${gTranslation}</strong></div>`:''}
    </div>
    <span class="fp f16 b" style="color:${passed?'var(--gr)':'var(--am)'}">${score}/10</span>
  </div>`;
  
  if(passed)setWS(wid,true); else setWS(wid,false);
  ERST.answers[idx]=a;
  
  setTimeout(()=>{
    ERST.idx++;
    renderERModal();
  },1200);
}

function erSkip(){
  if(!ERST.answers[ERST.idx])ERST.answers[ERST.idx]={word:ERST.words[ERST.idx].w,translation:'',example:'',collocation:'',score:0,checking:false,result:null};
  ERST.idx++;
  renderERModal();
}

        <button onclick="CLST.art=null;rClozeTest()" class="btn bgh">Πίσω</button>
      </div>`}
    </div>`;
  }

/* ══ ERROR PATTERN ANALYSIS ══ */
async function runErrorAnalysis(){
  const errors=DB.get('errors',{});
  const gramErrors=DB.get('gramErr',{});
  const allW=getAllW();
  
  if(Object.keys(errors).length<3&&Object.keys(gramErrors).length<2){
    toast('Κάνε περισσότερα quiz πρώτα για να έχω αρκετά δεδομένα!','var(--am)');
    return;
  }
  
  const modal=document.createElement('div');
  modal.id='ea-modal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9998;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML=`<div style="background:var(--s1);border:1px solid var(--ln2);border-radius:var(--r2);padding:24px;max-width:500px;width:100%;text-align:center">

    <div class="f12 c3">Αναλύω τα patterns στα λάθη σου...</div>
  </div>`;
  document.body.appendChild(modal);
  
  // Build error summary
  const topVocabErrors=Object.entries(errors)
    .sort(([,a],[,b])=>b.count-a.count).slice(0,8)
    .map(([id,e])=>{const w=allW.find(x=>x.id===id);return w?`${w.w} (${e.count} λάθη, τύπος: ${e.types.slice(-1)[0]||'quiz'})`:null;})
    .filter(Boolean);
  
  const topGramErrors=Object.entries(gramErrors)
    .sort(([,a],[,b])=>b.count-a.count).slice(0,5)
    .map(([id,e])=>{const g=GRAM.find(x=>x.id===id);return g?`${g.t} (${e.count} λάθη)`:null;})
    .filter(Boolean);

async function sendConvMsg(){
  const input=document.getElementById('conv-input')?.value?.trim();
  if(!input||CONVST.loading)return;
  
  CONVST.history.push({role:'user',content:input});
  CONVST.turn++;
  CONVST.loading=true;
  rAIConversation();
  
  const sc=CONV_SCENARIOS.find(x=>x.id===CONVST.scenario);
  const isLast=CONVST.turn>=6;
  
  try{
    const messages=CONVST.history.map(m=>({role:m.role,content:m.content}));
    const systemPrompt=sc.role+(isLast?'\n\nThis is the final exchange. After your response, provide JSON feedback as a separate code block:\n```json\n{"fluency":<1-10>,"vocabulary":<1-10>,"grammar":<1-10>,"good_phrases":["phrase1","phrase2"],"corrections":[{"said":"<wrong>","better":"<correct>","why":"<explanation in Greek>"}],"main_tip":"<key advice in Greek>"}\n```':'');
    
    const convKey=getAPIKey();
    if(!convKey){showAPIKeyModal();CONVST.loading=false;rAIConversation();return;}
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':convKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:600,
        system:systemPrompt,
        messages
      })
    });
    if(!response.ok){
      if(response.status===401){DB.set('anthropic_key','');showAPIKeyModal('invalid');}
      CONVST.loading=false;
      CONVST.history.push({role:'assistant',content:'Connection error. Please check your API key in Settings.'});
      rAIConversation();return;
    }
    const data=await response.json();
    const fullText=data.content?.[0]?.text||'I see. Please continue.';
    
    // Extract feedback if present
    const fbMatch=fullText.match(/```json\n([\s\S]+?)\n```/);
    let convResponse=fullText.replace(/```json[\s\S]+?```/,'').trim();
    
    CONVST.history.push({role:'assistant',content:convResponse});
    CONVST.loading=false;
    
    if(isLast&&fbMatch){
      try{
        CONVST.feedback=JSON.parse(fbMatch[1]);
        CONVST.done=true;
        addXP(30);
        toast('Συνομιλία ολοκληρώθηκε! +30 XP','var(--gr)');
      }catch(e){}
    }
    
  }catch(e){
    CONVST.loading=false;
    CONVST.history.push({role:'assistant',content:'Sorry, I had a connection issue. Please try again.'});
  }
  
  rAIConversation();
}

function getCEFRLevel(score,total){
  const pct=score/total*100;
  if(pct>=90)return{lv:'C1',desc:'Advanced',col:'var(--ro)',next:'C2'};
  if(pct>=75)return{lv:'B2+',desc:'Upper-Intermediate+',col:'var(--or)',next:'C1'};
  if(pct>=60)return{lv:'B2',desc:'Upper-Intermediate',col:'var(--am)',next:'B2+'};
  if(pct>=45)return{lv:'B1+',desc:'Intermediate+',col:'var(--gr)',next:'B2'};
  if(pct>=30)return{lv:'B1',desc:'Intermediate',col:'var(--bl)',next:'B1+'};
  return{lv:'A2+',desc:'Pre-Intermediate',col:'var(--vi)',next:'B1'};
}

  }

    const result=getCEFRLevel(CEFRST.score,CEFR_QUESTIONS.length);

    history.push({date:todayK(),score:CEFRST.score,level:result.lv});

        <div class="f14 c2 mt4">${result.desc}</div>
      </div>
      <div class="fp f20 mb8">${CEFRST.score}/${CEFR_QUESTIONS.length} σωστές</div>
      <div class="f12 c3 mb16">${Math.round(CEFRST.score/CEFR_QUESTIONS.length*100)}% — Επόμενο επίπεδο: <strong>${result.next}</strong></div>
      
      <div style="text-align:left;margin-bottom:16px">
        ${CEFR_QUESTIONS.map((q,i)=>`<div class="fx ac jb mb4 f11" style="padding:5px 8px;background:var(--s2);border-radius:6px">
          <span>${q.q.substring(0,45)}...</span>
          <span style="color:${CEFRST.answers[i]===q.a?'var(--gr)':'var(--ro)'};font-weight:700">${CEFRST.answers[i]===q.a?'✓':'✗'}</span>
        </div>`).join('')}
      </div>
      
      <div class="fx jc g10 fw">
        <button onclick="showCEFRCertificate(getCEFRLevel(CEFRST.score,CEFR_QUESTIONS.length).lv,CEFRST.score,CEFR_QUESTIONS.length)" class="btn bp bsm">🎓 Πιστοποιητικό</button>
        <button onclick="document.getElementById('cefr-modal').remove()" class="btn bgh bsm">Κλείσιμο</button>
        <button onclick="CEFRST={active:true,idx:0,answers:{},done:false,score:0};renderCEFRModal()" class="btn bgh bsm">Ξανά</button>
      </div>
    </div>`;
    addXP(CEFRST.score*5);
    return;
  }
  
  const q=CEFR_QUESTIONS[CEFRST.idx];
  const sel=CEFRST.answers[CEFRST.idx];
  const pct=Math.round((CEFRST.idx/CEFR_QUESTIONS.length)*100);
  const typeColors={vocab:'var(--bl)',grammar:'var(--vi)',tenses:'var(--gr)',collocation:'var(--am)',register:'var(--or)',idiom:'var(--ro)'};

        <span class="f11 c3">${CEFRST.idx+1}/${CEFR_QUESTIONS.length}</span>
      </div>
    </div>
    <div class="pb mb14" style="height:4px"><div class="pf" style="width:${pct}%;background:linear-gradient(90deg,var(--bl),var(--vi))"></div></div>

      let bg='var(--s2)',br='var(--ln)',fcol='var(--t2)';

      }

    }).join('')}
    ${sel!==undefined?`<button onclick="cefrNext()" class="btn bp w100" style="justify-content:center;margin-top:4px">→ ${CEFRST.idx<CEFR_QUESTIONS.length-1?'Επόμενο':'Αποτελέσματα'}</button>`:''}
  </div>`;
}

function cefrSelect(opt,optIdx){
  if(CEFRST.answers[CEFRST.idx]!==undefined)return;
  CEFRST.answers[CEFRST.idx]=opt;
  if(opt===CEFR_QUESTIONS[CEFRST.idx].a)CEFRST.score++;
  renderCEFRModal();
}

function cefrNext(){
  CEFRST.idx++;
  if(CEFRST.idx>=CEFR_QUESTIONS.length)CEFRST.done=true;
  renderCEFRModal();
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(reg=>{
        console.log('SW registered');
        // Force check for updates every time
        reg.update();
        // Listen for new SW taking control = new version loaded
        navigator.serviceWorker.addEventListener('controllerchange',()=>{
          if(!sessionStorage.getItem('sw_reloaded')){
            sessionStorage.setItem('sw_reloaded','1');
            window.location.reload();
          }
        });
      })
      .catch(err=>console.log('SW error:',err));
  });
}

function exportVocabCSV(){
  const allW=getAllW();
  const wb=getWB();
  const header='Word,Translation,PartOfSpeech,Level,Score,Seen,Example\n';
  const rows=allW.map(w=>{
    const s=wb[w.id]||{sc:0,seen:0};
    const clean=str=>'"'+(str||'').replace(/"/g,'""')+'"';
    return [clean(w.w),clean(w.g),clean(w.p),clean(w.cat),s.sc,s.seen,clean(w.e)].join(',');

  const blob=new Blob(['\uFEFF'+header+rows],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='english_master_vocabulary.csv';
  a.click();URL.revokeObjectURL(url);
  toast('✓ CSV εξήχθη! '+allW.length+' λέξεις','var(--gr)');
}

function exportLearnedCSV(){
  const allW=getAllW();
  const wb=getWB();
  const learned=allW.filter(w=>(wb[w.id]?.sc||0)>=3);
  const header='Word,Translation,Front,Back\n';
  // Anki-compatible format
  const rows=learned.map(w=>{
    const clean=str=>'"'+(str||'').replace(/"/g,'""')+'"';
    return [clean(w.w),clean(w.g),clean(w.w+' ('+w.p+')'),clean(w.g+'\\n\\n'+w.e)].join(',');

  const blob=new Blob(['\uFEFF'+header+rows],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='anki_import.csv';
  a.click();URL.revokeObjectURL(url);
  toast('✓ Anki CSV! '+learned.length+' εκμαθημένες λέξεις','var(--gr)');
}

/* ══ SPEECH RECOGNITION ══ */
let SR={active:false,rec:null,onResult:null,onError:null};

function speechSupported(){
  return !!(window.SpeechRecognition||window.webkitSpeechRecognition);
}

function startSpeech(expectedText, onResult, onError){
  if(!speechSupported()){
    if(onError)onError('not_supported');
    return;
  }
  if(SR.active){SR.rec?.stop();SR.active=false;}
  
  const Rec=window.SpeechRecognition||window.webkitSpeechRecognition;
  SR.rec=new Rec();
  SR.rec.lang='en-GB';
  SR.rec.interimResults=false;
  SR.rec.maxAlternatives=3;
  SR.active=true;
  SR.onResult=onResult;
  SR.onError=onError;
  
  SR.rec.onresult=(e)=>{
    SR.active=false;
    const results=Array.from(e.results[0]).map(r=>r.transcript.toLowerCase().trim());
    const expected=expectedText.toLowerCase().trim();
    
    // Score: exact match=100, close=50-90, wrong=0-40
    let score=0;
    let bestMatch='';
    for(const res of results){
      const s=pronunciationScore(expected,res);
      if(s>score){score=s;bestMatch=res;}
    }
    if(onResult)onResult({score,said:bestMatch,expected});
  };
  
  SR.rec.onerror=(e)=>{
    SR.active=false;
    if(onError)onError(e.error);
  };
  
  SR.rec.onerror=(e)=>{SR.active=false;if(SR.onError)SR.onError(e.error||'error');};
  SR.rec.onend=()=>{if(SR.active){SR.active=false;}};
  SR.rec.start();
}

function pronunciationScore(expected, said){
  if(!said)return 0;
  if(said===expected)return 100;
  // Word-level similarity
  const expWords=expected.split(' ');
  const saidWords=said.split(' ');
  let matched=0;
  for(const w of expWords){
    if(saidWords.some(s=>levenshtein(s,w)<=1))matched++;
  }
  const wordScore=Math.round((matched/expWords.length)*100);
  // Character similarity bonus
  const charScore=Math.round((1-levenshtein(expected,said)/Math.max(expected.length,said.length))*100);
  return Math.round((wordScore*0.7)+(charScore*0.3));
}

function levenshtein(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function practiceSentence(id){
  const saved=getSavedSentences();
  const s=saved.find(x=>x.id===id);
  if(!s)return;
  
  // Create fill-in-blank from sentence
  const words=s.text.split(' ');
  // Find a content word to blank (not articles, prepositions)
  const skipWords=['a','an','the','is','are','was','were','be','been','to','of','in','at','for','on','with','by','from','as','and','or','but','if','that','this','it','he','she','we','they','i'];
  const candidates=words.map((w,i)=>({w:w.replace(/[.,!?]/g,''),i})).filter(x=>x.w.length>3&&!skipWords.includes(x.w.toLowerCase()));
  
  if(!candidates.length){toast('Δεν βρέθηκε κατάλληλη λέξη για κενό','var(--t3)');return;}
  const target=candidates[Math.floor(Math.random()*candidates.length)];
  const blanked=s.text.split(' ').map((w,i)=>i===target.i?'_______':w).join(' ');
  
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9998;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML=`<div style="background:var(--s1);border:1px solid var(--ln2);border-radius:var(--r2);padding:24px;max-width:500px;width:100%">
    <div class="sl mb8">SENTENCE MINING — FILL IN BLANK</div>
    <div class="fp f14 mb16" style="line-height:2;color:var(--t1)">${blanked}</div>
    <input id="sm-input" placeholder="Συμπλήρωσε τη λέξη..." style="width:100%;padding:10px;background:var(--s2);border:1px solid var(--ln);border-radius:8px;color:var(--t1);font-size:14px;margin-bottom:12px"
      onkeydown="if(event.key==='Enter')checkSentence('${target.w}','${id}',this.closest('[style*=fixed]'))">
    <div class="fx g10">
      <button onclick="closeTopModal()" class="btn bgh">Παράλειψη</button>
      <button onclick="checkSentence('${target.w}','${id}',this.closest('[style*=fixed]'))" class="btn bp" style="flex:1;justify-content:center">✓ Έλεγχος</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  setTimeout(()=>document.getElementById('sm-input')?.focus(),100);
}

function checkSentence(expected, sentId, modal){
  const input=document.getElementById('sm-input');
  if(!input)return;
  const val=input.value.trim().toLowerCase();
  const exp=expected.toLowerCase();
  const correct=val===exp||levenshtein(val,exp)<=1;
  
  // Update review count
  const saved=getSavedSentences();
  const s=saved.find(x=>x.id===sentId);
  if(s){s.reviews++;s.score=correct?Math.min(100,(s.score||0)+20):(s.score||0);DB.set('saved_sentences',saved);}
  
  input.style.borderColor=correct?'var(--gr)':'var(--ro)';
  input.style.color=correct?'var(--gr)':'var(--ro)';
  
  if(correct){
    addXP(8);
    setTimeout(()=>{closeTopModal();toast('✓ Σωστά! +8 XP','var(--gr)');},500);
  } else {
    const hint=modal.querySelector('.hint-text')||document.createElement('div');
    hint.className='hint-text f12 mt8';
    hint.style.color='var(--ro)';
    hint.textContent='✗ Σωστό: "'+expected+'"';
    if(!modal.querySelector('.hint-text'))input.after(hint);
  }
}

/* ══ ADAPTIVE STUDY RECOMMENDATION ══ */
function getAdaptiveRecommendation(){
  const gramErrors=DB.get('gramErr',{});
  const wordErrors=DB.get('errors',{});
  const wb=getWB();
  const allW=getAllW();
  const today=todayK();
  const comp=DB.get('comp',{})[today]||[];
  
  const recs=[];
  
  // 1. Due words (highest priority)
  const due=dueW().length;
  if(due>5)recs.push({type:'vocab',priority:10,msg:`📅 ${due} λέξεις χρειάζονται επανάληψη τώρα`,action:"VS.mode='review';go('vocab')",icon:'📅'});
  
  // 2. Grammar chapter with most errors
  const topGramErr=Object.entries(gramErrors).sort(([,a],[,b])=>b.count-a.count)[0];
  if(topGramErr&&topGramErr[1].count>=2){
    const g=GRAM?.find(x=>x.id===topGramErr[0]);
    if(g)recs.push({type:'grammar',priority:8,msg:`⚠ "${g.t}" — ${topGramErr[1].count} λάθη. Επανάλαβε!`,action:`GST.topic='${g.id}';go('grammar')`,icon:'✏'});
  }
  
  // 3. Unseen words
  const unseen=allW.filter(w=>!wb[w.id]||wb[w.id].seen===0).length;
  if(unseen>0&&due<3)recs.push({type:'vocab',priority:6,msg:`📚 ${unseen} νέες λέξεις περιμένουν!`,action:"VS.mode='fc';go('vocab')",icon:'📚'});
  
  // 4. Tenses not done yet
  const tDone=DB.get('tDone',[]);
  if(tDone.length<9)recs.push({type:'tenses',priority:5,msg:`⏱ ${9-tDone.length} χρόνοι ακόμα να εξερευνήσεις`,action:"go('tenses')",icon:'⏱'});
  
  // 5. Writing practice (every 3 days)
  const lastWrite=DB.get('last_write','');
  const daysSince=lastWrite?Math.floor((Date.now()-new Date(lastWrite).getTime())/86400000):99;
  if(daysSince>=3)recs.push({type:'writing',priority:4,msg:`✍ ${daysSince} μέρες χωρίς Writing practice`,action:"go('writing')",icon:'✍'});
  
  return recs.sort((a,b)=>b.priority-a.priority).slice(0,3);
}

/* ══ EXPLAIN MY ANSWER ══ */
let EMA={active:false,loading:false,result:null};

async function explainAnswer(question, wrongAnswer, correctAnswer, context){
  if(EMA.loading)return;
  EMA.loading=true;
  EMA.result=null;
  
  // Show loading state in existing feedback area
  const feedbackEl=document.getElementById('ema-box');
  if(feedbackEl){
    feedbackEl.innerHTML='<div class="fx ac g8" style="color:var(--t3)"><div class="pulse" style="width:8px;height:8px;border-radius:50%;background:var(--bl)"></div><span class="f11">AI εξηγεί το λάθος σου...</span></div>';
  }
  
  try{
    const raw=await callAI(
      `You are an English grammar expert helping a Greek learner. 
When they answer incorrectly, explain WHY in simple Greek (2-3 sentences max).
Focus on the RULE, not just the answer. Be encouraging.
Respond ONLY with valid JSON: {"why":"<explanation in Greek>","rule":"<the grammar rule, in Greek>","tip":"<one memory tip in Greek>","example":"<another example sentence using the correct form>"}`,
      `Question: "${question}"\nStudent answered: "${wrongAnswer}"\nCorrect answer: "${correctAnswer}"\n${context?'Context: '+context:''}`,
      400
    );
    EMA.result=JSON.parse(raw.replace(/```json|```/g,'').trim());
  }catch(e){
    EMA.result={why:'Η σωστή απάντηση είναι "'+correctAnswer+'".',rule:'Δες τη θεωρία για περισσότερες λεπτομέρειες.',tip:'Εξάσκηση κάνει τον δάσκαλο!',example:''};
  }
  
  EMA.loading=false;
  
  // Render result
  if(feedbackEl&&EMA.result){
    feedbackEl.innerHTML=`<div style="padding:10px 12px;background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.2);border-radius:8px;margin-top:8px">
      <div class="sl mb6 cbl">🧠 ΓΙΑΤΙ ΗΤΑΝ ΛΑΘΟΣ</div>
      <div class="f12 c2 mb6" style="line-height:1.7">${EMA.result.why}</div>
      <div class="f11 mb4" style="color:var(--vi)"><strong>Κανόνας:</strong> ${EMA.result.rule}</div>
      ${EMA.result.example?`<div class="f11 mb4" style="color:var(--gr)"><strong>Παράδειγμα:</strong> "${EMA.result.example}"</div>`:''}
      <div class="f11" style="color:var(--am)">💡 ${EMA.result.tip}</div>
    </div>`;
  }
}

function getCurrentStage(){
  for(let i=0;i<LEARNING_PATH.length;i++){
    const stage=LEARNING_PATH[i];
    const allDone=stage.milestones.every(m=>m.check());
    if(!allDone)return i;
  }
  return LEARNING_PATH.length-1;
}

function getLearningPathHTML(){
  const current=getCurrentStage();
  return LEARNING_PATH.map((stage,i)=>{
    const done=stage.milestones.every(m=>m.check());
    const active=i===current;
    const locked=i>current+1;
    const progress=stage.milestones.filter(m=>m.check()).length;
    const pct=Math.round(progress/stage.milestones.length*100);
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:${active?'rgba('+stage.col.replace('var(--','').replace(')','')+',.08)':'var(--s2)'};border:1px solid ${active?stage.col+'44':'var(--ln)'};${locked?'opacity:.4':''}">
      <div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;background:${done?stage.col:active?stage.col+'22':'var(--s3)'};flex-shrink:0">${done?'✓':stage.ic}</div>
      <div style="flex:1;min-width:0">
        <div class="fx ac jb">
          <span class="f12 b" style="color:${active?stage.col:'var(--t2)'}">${stage.title}</span>
          <span class="tag f9" style="background:${stage.col}1a;border:1px solid ${stage.col}33;color:${stage.col}">${stage.lv}</span>

          <div style="height:100%;width:${pct}%;background:${stage.col};border-radius:4px;transition:width .5s"></div>

async function rpSend(){
  const input=document.getElementById('rp-input');
  if(!input||!input.value.trim()||RPST.loading)return;
  
  const userText=input.value.trim();
  const sc=ROLEPLAY_SCENARIOS.find(x=>x.id===RPST.scenario);
  const turn=sc.turns[RPST.turn];
  
  // Score the response
  const targetWordsUsed=sc.target_words.filter(w=>userText.toLowerCase().includes(w)).length;
  const wordScore=Math.round((targetWordsUsed/sc.target_words.length)*40);
  const lengthScore=Math.min(30,Math.round(userText.split(' ').length*2));
  const baseScore=30;
  const score=Math.min(100,baseScore+wordScore+lengthScore);
  
  RPST.history.push({role:'user',text:userText,score});
  RPST.scores.push(score);
  RPST.turn++;
  RPST.loading=true;
  rRoleplay();
  
  if(RPST.turn>=sc.turns.length){
    RPST.loading=false;
    RPST.done=true;
    rRoleplay();
    return;
  }
  
  // AI responds with next turn
  await new Promise(r=>setTimeout(r,800));
  RPST.loading=false;
  const nextTurn=sc.turns[RPST.turn];
  RPST.history.push({role:'ai',text:nextTurn.ai});
  rRoleplay();
}

      let bg='var(--s2)',br='var(--ln)',col='var(--t2)';
      if(sel!==undefined){
        if(opt===q.a){bg='rgba(34,214,124,.08)';br='rgba(34,214,124,.4)';col='var(--gr)';}
        else if(opt===sel&&opt!==q.a){bg='rgba(240,56,112,.08)';br='rgba(240,56,112,.4)';col='var(--ro)';}
      }
      return `<button onclick="placementSelect('${opt.replace(/'/g,"\\'")}',${i})" style="width:100%;padding:11px 14px;border-radius:9px;text-align:left;font-size:13px;margin-bottom:7px;cursor:${sel!==undefined?'default':'pointer'};background:${bg};border:1px solid ${br};color:${col};transition:all .15s">${opt}</button>`;
    }).join('')}
    ${sel!==undefined?`<button onclick="placementNext()" class="btn bp w100 mt4" style="justify-content:center">
      ${PLST.idx<PLACEMENT_Q.length-1?'Επόμενο →':'Δες αποτέλεσμα 🎯'}
    </button>`:''}
    <div class="f10 c3 tc mt10">Μην ανησυχείς — δεν υπάρχουν λάθος απαντήσεις στο placement!</div>
  </div>`;
}

function placementSelect(opt){
  if(PLST.answers[PLST.idx]!==undefined)return;
  PLST.answers[PLST.idx]=opt;
  renderPlacementModal();
}

function placementNext(){
  PLST.idx++;
  if(PLST.idx>=PLACEMENT_Q.length)PLST.done=true;
  renderPlacementModal();
}

/* ══ HESITATION TIME TRACKING ══ */
let Q_START_TIME=0;

function startQTimer(){Q_START_TIME=Date.now();}

function getQHesitation(){
  const ms=Date.now()-Q_START_TIME;
  if(ms<2000)return 'fast';    // < 2s = fast
  if(ms<5000)return 'normal';  // 2-5s = normal
  if(ms<10000)return 'slow';   // 5-10s = slow
  return 'very_slow';           // > 10s = very slow
}

function getHesitationPenalty(){
  const h=getQHesitation();
  if(h==='slow')return 1;     // Reduce SM-2 interval slightly
  if(h==='very_slow')return 2; // Reduce more
  return 0;
}

function applyTheme(){
  const light=DB.get('light_mode',false);

    root.style.setProperty('--bg','#f0f4f8');
    root.style.setProperty('--s1','#ffffff');
    root.style.setProperty('--s2','#f7f9fc');
    root.style.setProperty('--s3','#edf2f7');

    root.style.setProperty('--ln2','#cbd5e0');

/* ══ NOTIFICATIONS ══ */
async function requestNotifications(){
  if(!('Notification' in window)){toast('Ο browser δεν υποστηρίζει notifications','var(--am)');return;}
  const perm=await Notification.requestPermission();
  if(perm==='granted'){
    DB.set('notif_enabled',true);
    scheduleNotifications();
    toast('✓ Notifications ενεργοποιήθηκαν!','var(--gr)');
    rSettings();
    setTimeout(()=>new Notification('English Master 📚',{body:'Θα σου θυμίζω να μελετάς κάθε μέρα!'}),500);
  } else {toast('Notifications απορρίφθηκαν','var(--t3)');}
}
function scheduleNotifications(){
  if(!DB.get('notif_enabled',false))return;
  const time=DB.get('notif_time','20:00');
  const [h,m]=time.split(':').map(Number);
  const now=new Date(),target=new Date();
  target.setHours(h,m,0,0);
  if(target<=now)target.setDate(target.getDate()+1);
  setTimeout(()=>{
    if(!DB.get('notif_enabled',false))return;
    const streak=calcStreak(),due=dueW().length;
    const msg=due>0?due+' λέξεις για επανάληψη! 📚':'Συνέχισε τη μελέτη σου! '+(streak>0?'🔥 '+streak+' ημέρες streak':'');
    new Notification('English Master',{body:msg});
    scheduleNotifications();
  },target.getTime()-now.getTime());
}
function disableNotifications(){
  DB.set('notif_enabled',false);
  toast('Notifications απενεργοποιήθηκαν','var(--t3)');
  rSettings();
}

/* ══ LEADERBOARD ══ */
function getWeekKey(){return 'week_'+Math.floor(Date.now()/604800000);}
function updateLeaderboard(){
  const xpd=DB.get('xpd',{});
  const today=new Date();
  const ws=new Date(today);ws.setDate(today.getDate()-today.getDay());
  let weekXP=0;
  for(let d=0;d<7;d++){const dt=new Date(ws);dt.setDate(ws.getDate()+d);weekXP+=(xpd[dt.toISOString().split('T')[0]]||0);}
  const name=DB.get('player_name','')||'Player';
  const entry={name,xp:weekXP,streak:calcStreak(),words:learnedW().length,ts:Date.now()};
  const lb=DB.get('local_lb',[]);
  const ei=lb.findIndex(e=>e.name===name);
  if(ei>=0)lb[ei]=entry;else lb.push(entry);
  lb.sort((a,b)=>b.xp-a.xp);
  DB.set('local_lb',lb.slice(0,20));
  return{weekXP,rank:lb.findIndex(e=>e.name===name)+1,total:lb.length};
}

      const isMe=e.name===playerName;
      const medal=['🥇','🥈','🥉'][i]||('#'+(i+1));
      return '<div style="padding:9px 12px;border-radius:8px;margin-bottom:5px;background:'+(isMe?'rgba(246,188,24,.06)':'var(--s2)')+';border:1px solid '+(isMe?'rgba(246,188,24,.3)':'var(--ln)')+'"><div class="fx ac jb"><div class="fx ac g8"><span class="f14" style="min-width:28px;color:'+(isMe?'var(--am)':'var(--t3)')+'">'+medal+'</span><div><div class="f12 b '+(isMe?'':'c2')+'">'+e.name+(isMe?' 👤':'')+'</div><div class="f9 c3">'+e.streak+'🔥 · '+e.words+' λέξεις</div></div></div><div class="fp f15 b" style="color:'+(isMe?'var(--am)':'var(--t2)')+'">'+e.xp+' XP</div></div></div>';
    }).join('')}
    <div class="card c-info mt12"><div class="f11 c2">💡 Το leaderboard είναι local — δείχνει τους χρήστες σε αυτή τη συσκευή.</div></div>
    <button onclick="closeTopModal()" class="btn bgh w100 mt10" style="justify-content:center">Κλείσιμο</button>
  </div>`;
  document.body.appendChild(modal);
}
document.addEventListener('DOMContentLoaded',()=>{
  applyTheme();
  updXP();
  rHome();
  // Offline detection
  function updateOnlineStatus(){
    const banner=document.getElementById('offline-banner');
    if(banner) banner.style.display=navigator.onLine?'none':'block';
  }
  window.addEventListener('online',updateOnlineStatus);
  window.addEventListener('offline',()=>{updateOnlineStatus();toast('📡 Offline — AI features μη διαθέσιμα','var(--am)');});
  updateOnlineStatus();
  // Check achievements on load
  const lc=learnedW().length;
  if(lc>=10)unlockAch('w10');if(lc>=50)unlockAch('w50');if(lc>=100)unlockAch('w100');if(lc>=200)unlockAch('w200');
  const s=calcStreak();if(s>=7)unlockAch('s7');if(s>=30)unlockAch('s30');
  const td=Object.keys(DB.get('comp',{})).filter(k=>(DB.get('comp',{})[k]||[]).length>=3).length;
  if(td>=10)unlockAch('st10');
  // Daily notification
  initTheme();
  applyTheme();
  showOnboarding();
  checkStreakWarning();
  scheduleNotifications();
  scheduleNotifications();
  // Merge extra readings
  if(typeof EXTRA_READINGS!=='undefined')READINGS.push(...EXTRA_READINGS.filter(r=>!READINGS.find(x=>x.id===r.id)));
  // Merge extra vocabulary
  if(typeof EXTRA_WORDS!=='undefined')EXTRA_WORDS.forEach(w=>{if(!WORDS.find(x=>x.id===w.id))WORDS.push(w);});
  checkWeeklySummary();
  if(DB.get('nf',false)&&DB.get('lastR','')!==todayK()&&Notification.permission==='granted'){
    DB.set('lastR',todayK());
    setTimeout(()=>{try{new Notification('📗 English Master',{body:'Ώρα για τη σημερινή σου μελέτη! 🎯'});}catch(e){}},3000);
  }
});
</script>
