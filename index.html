<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#07080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="English App">
<title>English Learning System v2</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07080f;--bg2:#0c0d16;--bg3:#111827;--bg4:#1a1f2e;
  --border:#1f2937;--border2:#2d3748;
  --text:#e8e4dc;--text2:#9ca3af;--text3:#4b5563;
  --accent:#0ea5e9;--accent2:#6366f1;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;
  --pink:#fb7185;--orange:#f97316;--purple:#a78bfa;--cyan:#06b6d4;
  --cinzel:"Cinzel",serif;--inter:"Inter",sans-serif;--radius:10px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--inter);overflow:hidden;}
button{cursor:pointer;font-family:var(--inter);border:none;transition:all 0.15s;}
button:hover{filter:brightness(1.1);}
button:active{transform:scale(0.97);}
input,textarea,select{font-family:var(--inter);outline:none;color:var(--text);}
a{text-decoration:none;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
#app{display:flex;flex-direction:column;height:100vh;}
#topnav{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:54px;flex-shrink:0;z-index:100;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.brand-text{font-family:var(--cinzel);font-size:15px;color:#f3f0ea;}
.nav-tabs{display:flex;gap:1px;}
.nav-tab{padding:6px 13px;background:transparent;border-bottom:2px solid transparent;font-size:11px;color:var(--text3);font-weight:500;transition:all 0.15s;}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.nav-right{display:flex;gap:8px;align-items:center;}
.xp-badge{background:linear-gradient(135deg,var(--yellow),var(--orange));border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;color:#07080f;}
#installBtn{display:none;padding:5px 12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:6px;color:#fff;font-size:10px;font-family:var(--cinzel);}
#content{flex:1;overflow:hidden;}
.panel{display:none;height:100%;overflow-y:auto;}
.panel.active{display:block;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.card-green{background:#061a0f;border-color:#14532d;}
.card-blue{background:#060d1a;border-color:#1e3a5f;}
.btn{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn-success{background:linear-gradient(135deg,var(--green),var(--cyan));color:#fff;}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-sm{padding:6px 14px;font-size:11px;}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;}
.pbar{background:var(--bg3);border-radius:4px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:4px;transition:width 0.4s ease;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.flex{display:flex;}.ai{align-items:center;}.jb{justify-content:space-between;}.jc{justify-content:center;}
.gap4{gap:4px;}.gap8{gap:8px;}.gap10{gap:10px;}.gap12{gap:12px;}
.mb4{margin-bottom:4px;}.mb8{margin-bottom:8px;}.mb10{margin-bottom:10px;}.mb12{margin-bottom:12px;}.mb16{margin-bottom:16px;}.mb20{margin-bottom:20px;}.mb24{margin-bottom:24px;}
.mt4{margin-top:4px;}.mt8{margin-top:8px;}.mt12{margin-top:12px;}
.tc{text-align:center;}.tr{text-align:right;}.italic{font-style:italic;}.mono{font-family:monospace;}
.cinzel{font-family:var(--cinzel);}
.f10{font-size:10px;}.f11{font-size:11px;}.f12{font-size:12px;}.f13{font-size:13px;}.f14{font-size:14px;}
.c2{color:var(--text2);}.c3{color:var(--text3);}.ca{color:var(--accent);}.cg{color:var(--green);}.cy{color:var(--yellow);}.cr{color:var(--red);}.cp{color:var(--purple);}.co{color:var(--orange);}.cpk{color:var(--pink);}
.w100{width:100%;}.max600{max-width:600px;margin:0 auto;}.max800{max-width:800px;margin:0 auto;}
.slabel{font-family:var(--cinzel);font-size:9px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 20px;font-size:13px;z-index:9999;transition:transform 0.3s;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
#achPop{position:fixed;top:70px;right:16px;background:linear-gradient(135deg,#1a1400,#0d1400);border:1px solid var(--yellow);border-radius:12px;padding:14px 18px;z-index:9998;transform:translateX(200px);transition:transform 0.4s;}
#achPop.show{transform:translateX(0);}
.app-card{border-radius:12px;padding:20px;cursor:pointer;transition:transform 0.2s;border:1px solid transparent;}
.app-card:hover{transform:translateY(-4px);}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.stat-val{font-family:var(--cinzel);font-size:20px;font-weight:600;}
.cat-btn{padding:10px 6px;border-radius:8px;border:2px solid var(--border);background:var(--bg3);color:var(--text3);text-align:center;font-size:9px;transition:all 0.15s;cursor:pointer;}
.cat-btn.active{background:var(--bg4);}
.mode-btn{padding:9px 5px;border-radius:8px;border:2px solid var(--border);background:var(--bg3);color:var(--text3);text-align:center;font-size:9px;cursor:pointer;transition:all 0.15s;}
.mode-btn.active{border-color:var(--yellow);color:var(--yellow);background:var(--bg4);}
.vstudy{display:flex;flex-direction:column;align-items:center;padding:18px;min-height:100%;}
.card-main{width:100%;max-width:560px;background:var(--bg2);border-radius:14px;padding:22px;}
.mcq-opt{width:100%;padding:10px 13px;border-radius:8px;text-align:left;font-size:13px;transition:all 0.12s;cursor:pointer;margin-bottom:6px;}
.tsidebar{width:185px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:10px 0;}
.tbtn{display:block;width:100%;text-align:left;padding:8px 12px;background:transparent;border-left:3px solid transparent;transition:all 0.12s;cursor:pointer;}
.tbtn.active{background:var(--bg3);}
.tmain{flex:1;overflow-y:auto;padding:20px 24px;}
.ttab{padding:6px 13px;background:transparent;border-bottom:2px solid transparent;color:var(--text3);font-size:10px;font-weight:500;cursor:pointer;}
.ttab.active{border-bottom-color:var(--tcolor,var(--accent));color:var(--tcolor,var(--accent));}
.qopt{width:100%;padding:8px 11px;border-radius:6px;text-align:left;font-size:12px;font-family:monospace;transition:all 0.12s;cursor:pointer;margin-bottom:6px;}
.gram-topic{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all 0.15s;}
.gram-topic:hover{border-color:var(--border2);}
.rq-opt{width:100%;padding:10px 13px;border-radius:7px;text-align:left;font-size:13px;transition:all 0.12s;cursor:pointer;margin-bottom:6px;}
.article-body{font-size:14px;line-height:1.9;color:var(--text2);}
.article-body p{margin-bottom:14px;}
.article-body strong{color:var(--text);}
.heatmap{display:flex;flex-wrap:wrap;gap:3px;}
.hm-cell{width:12px;height:12px;border-radius:2px;}
.tnav{display:flex;gap:1px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;overflow-x:auto;}
.tnav-btn{padding:8px 13px;background:transparent;border-bottom:2px solid transparent;color:var(--text3);font-size:10px;white-space:nowrap;font-weight:500;cursor:pointer;}
.tnav-btn.active{border-bottom-color:var(--accent);color:var(--accent);}
.task-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:7px;cursor:pointer;border:1px solid var(--border);transition:all 0.13s;}
.task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:all 0.15s;}
.wl-input{padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;width:100%;}
.wl-row{display:flex;gap:10px;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;align-items:flex-start;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
.toggle{width:44px;height:24px;background:var(--border2);border-radius:12px;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;}
.toggle.on{background:var(--green);}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform 0.2s;}
.toggle.on::after{transform:translateX(20px);}
body.light{--bg:#f0f2f8;--bg2:#fff;--bg3:#f5f7fa;--bg4:#e8ecf4;--border:#e2e8f0;--border2:#cbd5e0;--text:#1a202c;--text2:#4a5568;--text3:#718096;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fadein{animation:fadeIn 0.3s ease;}
@media(max-width:640px){.tsidebar{width:140px;}.nav-tabs{display:none;}}
</style>
</head>
<body>
<div id="app">
<nav id="topnav">
  <div class="brand">
    <div class="brand-icon">📚</div>
    <div><div class="brand-text">English System</div><div style="font-family:var(--cinzel);font-size:9px;letter-spacing:3px;color:var(--text3);">LEARNING APP v2</div></div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="nav('home')" id="tab-home">🏠 Home</button>
    <button class="nav-tab" onclick="nav('vocab')" id="tab-vocab">📚 Vocabulary</button>
    <button class="nav-tab" onclick="nav('tenses')" id="tab-tenses">⏱ Tenses</button>
    <button class="nav-tab" onclick="nav('grammar')" id="tab-grammar">✏ Grammar</button>
    <button class="nav-tab" onclick="nav('reading')" id="tab-reading">📄 Reading</button>
    <button class="nav-tab" onclick="nav('stats')" id="tab-stats">📊 Stats</button>
    <button class="nav-tab" onclick="nav('tracker')" id="tab-tracker">📅 Tracker</button>
    <button class="nav-tab" onclick="nav('settings')" id="tab-settings">⚙ Settings</button>
  </div>
  <div class="nav-right">
    <div id="xpBar" style="display:flex;align-items:center;gap:8px;">
      <span class="xp-badge" id="lvlBadge">Lv 1</span>
      <div style="width:80px;"><div style="font-size:9px;color:var(--text3);margin-bottom:2px;font-family:var(--cinzel);" id="xpText">0 XP</div><div class="pbar" style="height:4px;"><div class="pbar-fill" id="xpFill" style="width:0%;background:linear-gradient(90deg,var(--yellow),var(--orange));"></div></div></div>
    </div>
    <button id="installBtn" onclick="doInstall()">⬇ Install</button>
  </div>
</nav>
<div id="content">
  <div id="home" class="panel active"><div id="home-c" style="padding:24px 20px;overflow-y:auto;height:100%;"></div></div>
  <div id="vocab" class="panel"><div id="vocab-c" style="height:100%;display:flex;flex-direction:column;overflow-y:auto;"></div></div>
  <div id="tenses" class="panel" style="display:none;height:100%;"><div class="tsidebar" id="tsb"></div><div class="tmain" id="tmn"></div></div>
  <div id="grammar" class="panel"><div id="gram-c" style="padding:20px;max-width:700px;margin:0 auto;"></div></div>
  <div id="reading" class="panel"><div id="read-c" style="padding:20px;max-width:720px;margin:0 auto;"></div></div>
  <div id="stats" class="panel"><div id="stats-c" style="padding:20px;max-width:800px;margin:0 auto;"></div></div>
  <div id="tracker" class="panel" style="display:none;height:100%;flex-direction:column;">
    <div class="tnav" id="tnav"></div>
    <div id="tcnt" style="padding:16px 20px;max-width:760px;overflow-y:auto;flex:1;"></div>
  </div>
  <div id="settings" class="panel"><div id="set-c" style="padding:20px;max-width:600px;margin:0 auto;"></div></div>
</div>
</div>
<div id="toast"></div>
<div id="achPop"></div>
<script>
// STORAGE
const S={get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}};

// PWA
let dPr=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dPr=e;document.getElementById('installBtn').style.display='block';});
function doInstall(){if(!dPr)return;dPr.prompt();dPr.userChoice.then(()=>{dPr=null;document.getElementById('installBtn').style.display='none';});}

// TOAST
function toast(msg,col='var(--accent)'){const t=document.getElementById('toast');t.textContent=msg;t.style.borderColor=col;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// XP & LEVELS
const LVS=[{n:'Beginner',x:0},{n:'Elementary',x:100},{n:'Pre-Intermediate',x:300},{n:'Intermediate',x:600},{n:'Upper-Intermediate',x:1000},{n:'Advanced',x:1500},{n:'Proficient',x:2200},{n:'Expert',x:3000},{n:'Master',x:4000},{n:'Legend',x:5500}];
function getXP(){return S.get('xp',0);}
function addXP(n){const old=getXP();const nw=old+n;S.set('xp',nw);const ol=getLv(old);const nl=getLv(nw);if(nl>ol)showAch(`🎉 Level Up! ${LVS[nl].n}`);updateXPBar();return nw;}
function getLv(xp){let l=0;for(let i=0;i<LVS.length;i++){if(xp>=LVS[i].x)l=i;}return l;}
function updateXPBar(){const xp=getXP();const lv=getLv(xp);const cur=LVS[lv].x;const nxt=LVS[lv+1]?LVS[lv+1].x:cur+1000;const pct=Math.min(((xp-cur)/(nxt-cur))*100,100);document.getElementById('lvlBadge').textContent=`Lv ${lv+1}`;document.getElementById('xpText').textContent=`${xp} XP`;document.getElementById('xpFill').style.width=pct+'%';}

// ACHIEVEMENTS
const ACHS=[{id:'first_word',n:'Πρώτη Λέξη!',i:'🌱',d:'Έμαθες την πρώτη σου λέξη'},{id:'streak7',n:'Εβδομάδα!',i:'🔥',d:'7 μέρες streak'},{id:'streak30',n:'Μήνας!',i:'🏆',d:'30 μέρες streak'},{id:'words50',n:'50 Λέξεις',i:'📚',d:'50 λέξεις εκμαθημένες'},{id:'words100',n:'100 Λέξεις',i:'🎯',d:'100 λέξεις εκμαθημένες'},{id:'quiz_perfect',n:'Τέλειο Quiz!',i:'⭐',d:'Τέλειο σκορ'},{id:'reading1',n:'Πρώτο Κείμενο',i:'📖',d:'Reading comprehension'},{id:'grammar1',n:'Grammar Pro',i:'✏',d:'Grammar exercise'},{id:'all_tenses',n:'Tense Master',i:'⏱',d:'Όλοι οι χρόνοι'}];
function getAchs(){return S.get('achs',[]);}
function unlockAch(id){const done=getAchs();if(done.includes(id))return;done.push(id);S.set('achs',done);const a=ACHS.find(x=>x.id===id);if(a){showAch(`${a.i} ${a.n}`);addXP(50);}}
function showAch(msg){const p=document.getElementById('achPop');p.innerHTML=`<div class="f10 cy cinzel mb4" style="letter-spacing:1px;">ACHIEVEMENT UNLOCKED</div><div class="f13">${msg}</div>`;p.classList.add('show');setTimeout(()=>p.classList.remove('show'),3000);}

// NAV
function nav(id){
  document.querySelectorAll('.panel').forEach(p=>{p.classList.remove('active');p.style.display='none';});
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  const panel=document.getElementById(id);
  if(id==='tenses'||id==='tracker')panel.style.display='flex'; else panel.style.display='block';
  panel.classList.add('active');
  const tab=document.getElementById('tab-'+id);if(tab)tab.classList.add('active');
  if(id==='home')renderHome();
  else if(id==='vocab')renderVHome();
  else if(id==='tenses')renderTenses();
  else if(id==='grammar')renderGrammar();
  else if(id==='reading')renderReading();
  else if(id==='stats')renderStats();
  else if(id==='tracker')renderTracker();
  else if(id==='settings')renderSettings();
}

// WORD DATA
const CATS=[
  {id:'aviation',label:'Aviation/CAMO',icon:'✈',color:'#38bdf8',words:[
    {w:'airworthiness',g:'αξιοπλοΐα',p:'noun',e:'The CAMO is responsible for the continuing airworthiness of the aircraft.',d:2,f:['airworthy','unairworthy']},
    {w:'compliance',g:'συμμόρφωση',p:'noun',e:'Full compliance with EASA Part-CAMO is mandatory.',d:1,f:['comply','compliant','non-compliance']},
    {w:'rectification',g:'αποκατάσταση',p:'noun',e:'Rectification of all findings must be completed before RTS.',d:2,f:['rectify']},
    {w:'discrepancy',g:'αναντιστοιχία',p:'noun',e:'A discrepancy was found in the DFDR data.',d:2,f:[]},
    {w:'serviceable',g:'εν λειτουργία',p:'adj',e:'The component must be serviceable before installation.',d:1,f:['serviceability','unserviceable']},
    {w:'unserviceable',g:'εκτός λειτουργίας',p:'adj',e:'The part was tagged unserviceable after the inspection.',d:1,f:[]},
    {w:'endorsement',g:'επικύρωση',p:'noun',e:'The CRS requires an endorsement from a licensed engineer.',d:2,f:['endorse']},
    {w:'deferred',g:'αναβεβλημένος',p:'adj',e:'The defect was deferred under MEL item 29-01.',d:2,f:['defer','deferral']},
    {w:'corrosion',g:'διάβρωση',p:'noun',e:'Corrosion was found on the landing gear attachment fittings.',d:1,f:['corrode','corroded']},
    {w:'overhaul',g:'γενική επισκευή',p:'noun',e:'The engine is due for overhaul at 3,500 flight hours.',d:2,f:[]},
    {w:'amendment',g:'τροποποίηση',p:'noun',e:'An amendment to the AMP was submitted to the authority.',d:2,f:['amend']},
    {w:'supersede',g:'αντικαθιστώ',p:'verb',e:'This revision supersedes all previous versions.',d:3,f:[]},
    {w:'mandatory',g:'υποχρεωτικός',p:'adj',e:'AD 2023-0045 is a mandatory terminating action.',d:1,f:['mandate']},
    {w:'fatigue',g:'κόπωση υλικού',p:'noun',e:'Fatigue cracks were detected during the borescope inspection.',d:2,f:[]},
    {w:'traceability',g:'ιχνηλασιμότητα',p:'noun',e:'Full traceability of the part from manufacturer is required.',d:3,f:['traceable']},
    {w:'deviation',g:'απόκλιση',p:'noun',e:'Any deviation from the approved procedure must be reported.',d:2,f:['deviate']},
    {w:'finding',g:'εύρημα',p:'noun',e:'All findings from the audit must be closed within 30 days.',d:1,f:[]},
    {w:'calibration',g:'βαθμονόμηση',p:'noun',e:'All measuring tools require calibration before use.',d:2,f:['calibrate']},
    {w:'snag',g:'ελάττωμα/βλάβη',p:'noun',e:'A recurring snag was identified on the avionics system.',d:2,f:[]},
    {w:'airframe',g:'ατράκτος αεροσκάφους',p:'noun',e:'No structural damage was found on the airframe.',d:2,f:[]},
    {w:'propagation',g:'εξάπλωση',p:'noun',e:'Crack propagation was assessed by the NDT engineer.',d:3,f:[]},
    {w:'embodiment',g:'ενσωμάτωση',p:'noun',e:'The embodiment of SB 2405 is recorded in the AMP.',d:3,f:[]},
    {w:'concession',g:'παρέκκλιση',p:'noun',e:'A concession was raised for the minor surface corrosion.',d:3,f:[]},
    {w:'wear',g:'φθορά',p:'noun',e:'Excessive wear was observed on the brake assembly.',d:1,f:['worn']},
    {w:'release to service',g:'αποδέσμευση RTS',p:'noun',e:'The CRS was signed before release to service.',d:2,f:[]},
    {w:'borescope',g:'ενδοσκόπιο',p:'noun',e:'A borescope inspection revealed deposits in the combustor.',d:2,f:[]},
    {w:'squawk',g:'καταχώριση βλάβης',p:'noun',e:'The crew reported a squawk on the hydraulic system.',d:2,f:[]},
    {w:'airworthiness directive',g:'οδηγία αξιοπλοΐας AD',p:'noun',e:'The AD requires compliance within 100 flight hours.',d:1,f:[]},
    {w:'service bulletin',g:'δελτίο υπηρεσίας SB',p:'noun',e:'The SB was evaluated for applicability to our fleet.',d:1,f:[]},
    {w:'terminating action',g:'οριστική ενέργεια',p:'noun',e:'The AD requires a terminating action within 500FH.',d:2,f:[]},

let vSt={cat:'all',mode:'mixed',size:10,screen:'home',session:[],idx:0,results:[],flipped:false,mcqSel:null,mcqOpts:[],fill:'',fillDone:false};
function getPool(){return vSt.cat==='all'?AW:AW.filter(w=>w.catId===vSt.cat);}
function getSorted(){return [...getPool()].sort((a,b)=>{const pa=vP[wKey(a)],pb=vP[wKey(b)];const now=Date.now();const ad=pa.nextReview<=now?0:1,bd=pb.nextReview<=now?0:1;if(ad!==bd)return ad-bd;if(pa.score!==pb.score)return pa.score-pb.score;return pa.seen-pb.seen;});}
function genMCQ(w){const others=AW.filter(x=>x.w!==w.w).sort(()=>Math.random()-0.5).slice(0,3).map(x=>x.g);vSt.mcqOpts=[...others,w.g].sort(()=>Math.random()-0.5);}
function getMode(idx){if(vSt.mode!=='mixed')return vSt.mode;return['flashcard','mcq','fill'][idx%3];}
function startVS(){vSt.session=getSorted().slice(0,vSt.size);vSt.idx=0;vSt.results=[];vSt.flipped=false;vSt.mcqSel=null;vSt.fill='';vSt.fillDone=false;if(getMode(0)==='mcq')genMCQ(vSt.session[0]);vSt.screen='study';renderVStudy();}
function recordV(correct){
  const cw=vSt.session[vSt.idx];const key=wKey(cw);const old=vP[key];
  const ns=correct?old.streak+1:0;const sc=Math.max(0,Math.min(5,old.score+(correct?1:-1)));
  vP[key]={score:sc,streak:ns,nextReview:Date.now()+SM2[Math.min(ns,SM2.length-1)]*3600000,seen:old.seen+1};
  saveVP();vSt.results.push({word:cw,correct});
  if(correct)addXP(sc===1?5:sc>=3?15:10);
  const lc=lCount();
  if(vSt.results.length===1&&old.seen===0)unlockAch('first_word');
  if(lc>=50)unlockAch('words50');if(lc>=100)unlockAch('words100');
  const next=vSt.idx+1;
  if(next>=vSt.session.length){vSt.screen='results';renderVResults();return;}
  vSt.idx=next;vSt.flipped=false;vSt.mcqSel=null;vSt.fill='';vSt.fillDone=false;
  if(getMode(next)==='mcq')genMCQ(vSt.session[next]);
  renderVStudy();
}

let tSt={idx:0,tab:'theory',qa:{},qs:false,qsc:null,ta:{},tc:{},tips:false};
function renderTenses(){
  const sb=document.getElementById('tsb');
  sb.innerHTML=`<div style="padding:0 12px 10px;border-bottom:1px solid var(--border);margin-bottom:6px;"><div class="slabel mb2">GRAMMAR</div><div style="font-family:var(--cinzel);font-size:15px;color:#f3f0ea;">Tenses</div></div>`+
  TENSES.map((t,i)=>`<button class="tbtn ${tSt.idx===i?'active':''}" onclick="tSt.idx=${i};tSt.tab='theory';tSt.qa={};tSt.qs=false;tSt.qsc=null;tSt.ta={};tSt.tc={};tSt.tips=false;renderTMain()" style="border-left-color:${tSt.idx===i?t.color:'transparent'};">
    <div style="font-family:var(--cinzel);font-size:10px;color:${tSt.idx===i?t.color:'var(--text3)'};">${t.name}</div>
    <div class="f10 c3 mono">${t.tag}</div>
  </button>`).join('');
  renderTMain();
}
function renderTMain(){
  const t=TENSES[tSt.idx];
  document.documentElement.style.setProperty('--tcolor',t.color);
  const tabs=['theory','forms','examples','translation','quiz'].map(id=>{
    const ls={theory:'Θεωρία',forms:'Τύποι',examples:'Παραδείγματα',translation:'Μετάφραση',quiz:`Quiz (${t.quiz.length})`};
    return `<button class="ttab ${tSt.tab===id?'active':''}" onclick="tSt.tab='${id}';tSt.qa={};tSt.qs=false;tSt.qsc=null;tSt.ta={};tSt.tc={};renderTMain()">${ls[id]}</button>`;
  }).join('');
  let body='';
  if(tSt.tab==='theory'){
    body=`<div class="card mb12 fadein"><div class="slabel mb10" style="color:${t.color};">ΧΡΗΣΕΙΣ</div>${t.uses.map((u,i)=>`<div style="margin-bottom:10px;padding-bottom:10px;${i<t.uses.length-1?'border-bottom:1px solid var(--border)':''}"><div style="font-family:var(--cinzel);font-size:11px;color:#c8c4bc;margin-bottom:3px;">${i+1}. ${u.split(':')[0]}${u.includes(':')?':':''}</div>${u.includes(':')?`<div class="f11 c3 italic" style="padding-left:12px;">"${u.split(':').slice(1).join(':')}"</div>`:''}</div>`).join('')}</div>
    <div class="card mb12"><div class="slabel mb8" style="color:var(--purple);">SIGNAL WORDS</div><div style="display:flex;flex-wrap:wrap;gap:5px;">${t.kw.map(k=>`<span class="tag" style="background:#1a103050;border:1px solid #3b2a6b;color:var(--purple);">${k}</span>`).join('')}</div></div>
    ${t.tips?.length?`<div class="card card-green"><button onclick="tSt.tips=!tSt.tips;renderTMain()" style="background:none;border:none;color:var(--green);font-family:var(--cinzel);font-size:9px;letter-spacing:2px;">${tSt.tips?'▾':'▸'} TIPS & ΠΑΓΙΔΕΣ</button>${tSt.tips?t.tips.map(tp=>`<div class="mt8 f12 cg" style="line-height:1.6;padding-left:12px;">💡 ${tp}</div>`).join(''):''}`):''}`.replace(/undefined/g,'')+'</div>':''}</div>`;
  }else if(tSt.tab==='forms'){
    body=t.forms.map(([l,v])=>`<div class="card mb8 fadein"><div style="font-family:var(--cinzel);font-size:10px;color:${t.color};margin-bottom:8px;">${l}</div><div class="mono f12 c2" style="line-height:1.6;padding-left:8px;border-left:2px solid ${t.color}40;">${v}</div></div>`).join('');
  }else if(tSt.tab==='examples'){
    body=t.examples.map((ex,i)=>`<div class="card mb8 fadein"><div style="display:flex;gap:10px;"><span style="font-family:var(--cinzel);font-size:13px;color:${t.color};">${i+1}</span><div><div class="f14 mb6" style="line-height:1.6;">${ex.en}</div><div class="f11 c3 italic">${ex.gr}</div></div></div></div>`).join('');
  }else if(tSt.tab==='translation'){
    body=`<div class="f12 c3 mb14">Μετέφρασε στα αγγλικά:</div>`+t.trans.map((tr,i)=>`<div class="card mb10 fadein"><div class="f14 mb10 italic" style="color:${t.color};">🇬🇷 ${tr.gr}</div>
    <textarea id="tr${i}" rows="2" oninput="tSt.ta[${i}]=this.value" ${tSt.tc[i]?'disabled':''} placeholder="Γράψε εδώ τη μετάφρασή σου..." style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;padding:9px;font-family:var(--inter);line-height:1.5;resize:none;margin-bottom:8px;">${tSt.ta[i]||''}</textarea>
    ${!tSt.tc[i]?`<button onclick="tSt.tc[${i}]=true;renderTMain()" ${!(tSt.ta[i]||'').trim()?'disabled':''} style="padding:7px 16px;background:${t.color};border:none;border-radius:6px;color:#07080f;font-family:var(--cinzel);font-size:10px;opacity:${!(tSt.ta[i]||'').trim()?0.4:1};">ΑΠΟΚΑΛΥΨΗ</button>`:
    `<div class="card card-green"><div class="slabel mb4">ΑΠΑΝΤΗΣΗ</div><div class="f13 cg">🇬🇧 ${tr.en}</div></div>`}</div>`).join('');
  }else if(tSt.tab==='quiz'){
    const qrows=t.quiz.map((q,qi)=>{
      const opts=q.opts.map(opt=>{
        let bg='var(--bg3)',br='var(--border)',col='var(--text3)';
        if(tSt.qa[qi]===opt){bg='var(--bg4)';br=t.color;col=t.color;}
        if(tSt.qs){if(opt===q.a){bg='#061a0f';br='#10b981';col='var(--green)';}else if(tSt.qa[qi]===opt){bg='#180808';br='#ef4444';col='var(--red)';}}
        return `<button class="qopt" onclick="if(!tSt.qs){tSt.qa[${qi}]='${opt.replace(/'/g,"\\'")}';renderTMain();}" style="background:${bg};border:1px solid ${br};color:${col};">${opt}</button>`;
      }).join('');
      return `<div class="card mb10 fadein"><div class="f13 mb10" style="line-height:1.6;"><span style="font-family:var(--cinzel);color:${t.color};margin-right:7px;">${qi+1}.</span>${q.q}</div><div class="g2 mb8">${opts}</div>${tSt.qs?`<div class="f11"><span style="color:${tSt.qa[qi]===q.a?'var(--green)':'var(--red)'}">${tSt.qa[qi]===q.a?'✓ Σωστό! ':'✗ Σωστό: "'+q.a+'" — '}</span><span class="c3">${q.ex}</span></div>`:''}</div>`;
    }).join('');
    const allA=Object.keys(tSt.qa).length>=t.quiz.length;
    body=qrows+(!tSt.qs?`<button onclick="if(${allA}){let c=0;TENSES[tSt.idx].quiz.forEach((q,i)=>{if(tSt.qa[i]===q.a)c++;});tSt.qsc=c;tSt.qs=true;if(c===TENSES[tSt.idx].quiz.length)unlockAch('quiz_perfect');addXP(c*5);checkAllTenses();renderTMain();}" style="padding:10px 22px;background:${t.color};border:none;border-radius:7px;color:#07080f;font-family:var(--cinzel);font-size:11px;letter-spacing:1px;opacity:${allA?1:0.4};">ΥΠΟΒΟΛΗ</button>`:
    `<div style="display:flex;align-items:center;gap:12px;"><div class="card" style="border-color:${tSt.qsc===t.quiz.length?'var(--yellow)':tSt.qsc>=Math.ceil(t.quiz.length*.6)?'var(--green)':'var(--accent2)'};border-width:2px;"><span class="f11 c3">Αποτέλεσμα: </span><span style="font-family:var(--cinzel);font-size:20px;color:${tSt.qsc===t.quiz.length?'var(--yellow)':tSt.qsc>=Math.ceil(t.quiz.length*.6)?'var(--green)':'var(--accent2)'};">${tSt.qsc}/${t.quiz.length}</span></div><button onclick="tSt.qa={};tSt.qs=false;tSt.qsc=null;renderTMain()" style="padding:10px 16px;background:transparent;border:1px solid ${t.color};border-radius:7px;color:${t.color};font-family:var(--cinzel);font-size:10px;">ΕΠΑΝΑΛΗΨΗ</button></div>`);
  }
  document.getElementById('tmn').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;"><div style="width:7px;height:32px;background:${t.color};border-radius:2px;flex-shrink:0;"></div><div><h2 style="font-family:var(--cinzel);font-size:18px;color:#f3f0ea;margin:0;">${t.name}</h2><div class="f11 c3">${t.greek}</div></div><span class="tag" style="margin-left:auto;background:${t.color}20;border:1px solid ${t.color}50;color:${t.color};">${t.tag}</span></div>
    <div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;">${tabs}</div>${body}`;
}
function checkAllTenses(){const done=S.get('tDone',[]);if(tSt.qs&&!done.includes(tSt.idx)){done.push(tSt.idx);S.set('tDone',done);}if(done.length>=TENSES.length)unlockAch('all_tenses');}

   <p>A CAMO is responsible for <strong>developing and maintaining the Aircraft Maintenance Programme (AMP)</strong>, monitoring the implementation of maintenance, reviewing all maintenance documentation, and ensuring that all Airworthiness Directives (ADs) and Service Bulletins (SBs) are evaluated and actioned appropriately.</p>
   <p>One of the most important documents in continuing airworthiness is the <strong>Certificate of Release to Service (CRS)</strong>. This document must be issued after each maintenance task and certifies that the work has been carried out in accordance with the approved data and that the aircraft is in a condition for safe operation.</p>

   text:`<p>Airworthiness Directives (ADs) are legally binding regulations issued by aviation authorities to correct unsafe conditions in aircraft. In Europe, ADs are issued by <strong>EASA</strong> and must be complied with within the timeframe specified. Non-compliance with an AD can result in the aircraft being grounded until the required action is taken.</p>

   text:`<p>Non-Destructive Testing (NDT) is a group of analysis techniques used in the aviation industry to evaluate the properties of a material, component, or system without causing damage. Unlike destructive testing, NDT allows for the examination of a part while preserving its ability to be returned to service.</p>
   <p>Several NDT methods are commonly used in aviation. <strong>Visual Inspection (VI)</strong> is the most basic form and involves examining surfaces for cracks, corrosion, or other defects. <strong>Eddy Current Testing (ET)</strong> uses electromagnetic induction to detect surface and near-surface flaws and is particularly effective for detecting fatigue cracks.</p>
   <p><strong>Ultrasonic Testing (UT)</strong> uses high-frequency sound waves to detect internal defects and measure material thickness. <strong>Dye Penetrant Inspection (DPI)</strong> is used to reveal surface-breaking defects in non-porous materials by applying a coloured or fluorescent dye to the surface.</p>

    <div class="setting-row mb20"><div><div style="font-family:var(--cinzel);font-size:12px;color:#c8c4bc;">Υπενθυμίσεις</div><div class="f11 c3">Browser notifications</div></div><div class="toggle ${nf?'on':''}" onclick="toggleNotifs()"></div></div>
    <div class="card mb12"><div class="slabel mb10 cg">💾 BACKUP & RESTORE</div>
      <div class="g2"><button onclick="exportData()" class="btn btn-success btn-sm w100" style="font-family:var(--cinzel);letter-spacing:1px;">⬇ EXPORT</button><button onclick="document.getElementById('importFile').click()" class="btn btn-outline btn-sm w100" style="font-family:var(--cinzel);letter-spacing:1px;">⬆ IMPORT</button></div>
      <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(this)">
      <div class="f11 c3 mt8">Export: αποθηκεύει όλη την πρόοδό σου σε JSON. Import: επαναφέρει από αρχείο.</div>
    </div>
    <div class="card mb12"><div class="slabel mb10 ca">📊 ΣΤΑΤΙΣΤΙΚΑ</div>
      <div class="g2">${[['📚',lCount()+'/'+AW.length,'Λέξεις'],['⭐',getXP()+' XP','Σύνολο XP'],['🏆',getAchs().length+'/'+ACHS.length,'Achievements'],['🔥',calcStreak(),'Streak']].map(([i,v,l])=>`<div class="stat-box"><div style="font-size:18px;">${i}</div><div class="stat-val ca" style="font-size:14px;">${v}</div><div class="f10 c3 mt4">${l}</div></div>`).join('')}</div>
    </div>
    <div class="card" style="border-color:#7f1d1d;background:#180808;"><div class="slabel mb8 cr">⚠ ΕΠΙΚΙΝΔΥΝΗ ΖΩΝΗ</div>
      <button onclick="if(confirm('Είσαι σίγουρος; Όλη η πρόοδός σου θα διαγραφεί!')){resetAll();}" style="padding:8px 18px;background:transparent;border:1px solid var(--red);border-radius:7px;color:var(--red);font-family:var(--cinzel);font-size:11px;letter-spacing:1px;">🗑 RESET ΟΛΗΣ ΤΗΣ ΠΡΟΟΔΟΥ</button>
      <div class="f11 c3 mt8">Διαγράφει όλα τα δεδομένα — λέξεις, streak, XP, achievements.</div>
    </div>
  </div>`;
}
function toggleLight(){const cur=S.get('lightMode',false);S.set('lightMode',!cur);document.body.classList.toggle('light',!cur);renderSettings();}
function toggleNotifs(){const cur=S.get('notifs',false);if(!cur){Notification.requestPermission().then(p=>{if(p==='granted'){S.set('notifs',true);toast('Notifications ενεργοποιήθηκαν! ✓','var(--green)');}else{toast('Δεν δόθηκε άδεια','var(--red)');}renderSettings();});}else{S.set('notifs',false);renderSettings();}}
function exportData(){
  const data={vP:vP,trkComp:S.get('trkComp',{}),trkWL:S.get('trkWL',[]),xp:getXP(),achs:getAchs(),trkNotes:S.get('trkNotes',''),tDone:S.get('tDone',[]),exportDate:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`english-backup-${todayKey()}.json`;a.click();
  toast('Backup αποθηκεύτηκε! ✓','var(--green)');
}
function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{try{const data=JSON.parse(e.target.result);if(data.vP){vP=data.vP;saveVP();}if(data.trkComp)S.set('trkComp',data.trkComp);if(data.trkWL)S.set('trkWL',data.trkWL);if(data.xp)S.set('xp',data.xp);if(data.achs)S.set('achs',data.achs);if(data.trkNotes)S.set('trkNotes',data.trkNotes);if(data.tDone)S.set('tDone',data.tDone);updateXPBar();toast('Import επιτυχής! ✓','var(--green)');setTimeout(()=>nav('home'),500);}catch(err){toast('Σφάλμα κατά το import!','var(--red)');}};
  reader.readAsText(file);
}
function resetAll(){localStorage.clear();vP=initP();saveVP();S.set('xp',0);updateXPBar();toast('Reset ολοκληρώθηκε','var(--red)');setTimeout(()=>nav('home'),500);}

// INIT
document.addEventListener('DOMContentLoaded',()=>{
  if(S.get('lightMode',false))document.body.classList.add('light');
  updateXPBar();renderHome();
  const nf=S.get('notifs',false);const lr=S.get('lastR','');
  if(nf&&lr!==todayKey()&&Notification.permission==='granted'){S.set('lastR',todayKey());setTimeout(()=>{new Notification('📚 English Learning',{body:'Ώρα για τη σημερινή σου μελέτη! 🎯'});},3000);}
});
</script>
</body>
</html>
